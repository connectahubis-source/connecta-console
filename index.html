<style>
:root {
  /* SKY BLUE PALETTE - 空の青基調 */
  --sky-50:      #f0f7ff;   /* 朝の空 */
  --sky-100:     #d8eaff;   /* 薄空 */
  --sky-200:     #b8dcff;   /* 春の空 */
  --sky-300:     #8cc5ff;   /* 真昼の空 */
  --sky-400:     #5ba8f5;   /* ミッドブルー */
  --sky-500:     #2c89e8;   /* メインブルー */
  --sky-600:     #1c6dd0;   /* 深い青 */
  --sky-700:     #1656b0;   /* 黄昏 navy */
  --sky-800:     #103e85;   /* 夕暮れ */
  --sky-900:     #0a2960;   /* 夜空 */

  /* 互換: 旧変数を新色にマップ */
  --navy:        var(--sky-700);
  --navy-deep:   var(--sky-900);
  --navy-soft:   var(--sky-500);
  --navy-bright: var(--sky-500);

  --coral:       #ff7a59;
  --coral-soft:  #ffd5c6;

  --ink-rich:    #0a1628;
  --paper:       #ffffff;
  --paper-2:     var(--sky-50);
  --paper-warm:  var(--sky-50);

  --line:        var(--sky-100);
  --line-strong: var(--sky-200);
  --ink:         var(--sky-900);
  --ink-mute:    var(--sky-700);
  --ink-faint:   var(--sky-500);

  --sans: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
  --jp:   'Zen Kaku Gothic New', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  --jp-serif: 'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
  --serif: 'Cormorant Garamond', 'Noto Serif JP', Georgia, serif;
  --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  --r-sm: 4px;
  --r-md: 12px;
  --r-lg: 24px;
  --r-xl: 32px;

  /* 空のグラデーション */
  --sky-grad: linear-gradient(180deg, var(--sky-50) 0%, var(--sky-100) 30%, var(--sky-200) 65%, var(--sky-300) 100%);
  --sky-grad-deep: linear-gradient(180deg, var(--sky-300) 0%, var(--sky-500) 50%, var(--sky-700) 100%);
  --sky-grad-soft: linear-gradient(180deg, #ffffff 0%, var(--sky-50) 100%);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: var(--paper); color: var(--ink); font-family: var(--sans); }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

@keyframes cca-rise { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: none } }
@keyframes cca-slide-left { from { opacity: 0; transform: translateX(-40px) } to { opacity: 1; transform: none } }
@keyframes cca-fade { from { opacity: 0 } to { opacity: 1 } }
@keyframes cca-scroll-line {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(0.4); }
}
@keyframes cca-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.4); }
}

/* スクロールビルドイン: 下から上にせり上がる */
@keyframes cca-build-in {
  from { opacity: 0; transform: translateY(60px) scale(0.96); filter: blur(8px); }
  to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
@keyframes cca-build-in-big {
  from { opacity: 0; transform: translateY(80px); filter: blur(12px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

/* 雲のようなふわふわ */
@keyframes cca-float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(20px, -15px) scale(1.05); }
  66% { transform: translate(-10px, 10px) scale(0.98); }
}
@keyframes cca-float-slow {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-30px, 20px); }
}

/* グラデーション流れる */
@keyframes cca-gradient-flow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* スプリング感のあるバウンス */
@keyframes cca-bounce-in {
  0% { opacity: 0; transform: scale(0.85); }
  60% { opacity: 1; transform: scale(1.04); }
  100% { transform: scale(1); }
}

/* Ken Burnsエフェクト */
@keyframes cca-ken-burns {
  0% { transform: scale(1) translate(0, 0); }
  100% { transform: scale(1.1) translate(-2%, -1%); }
}

@keyframes cca-marker {
  0% { transform: scaleX(0); transform-origin: left; }
  100% { transform: scaleX(1); transform-origin: left; }
}

/* ===== スクロール連動ビルドイン ===== */
.build-in {
  opacity: 0;
  transform: translateY(50px);
  transition: opacity .9s cubic-bezier(.2, .8, .2, 1),
              transform .9s cubic-bezier(.2, .8, .2, 1),
              filter .9s ease;
  filter: blur(6px);
  will-change: opacity, transform, filter;
}
.build-in.visible {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}
.build-in-d1 { transition-delay: 0.08s; }
.build-in-d2 { transition-delay: 0.16s; }
.build-in-d3 { transition-delay: 0.24s; }
.build-in-d4 { transition-delay: 0.32s; }
.build-in-d5 { transition-delay: 0.40s; }
.build-in-d6 { transition-delay: 0.48s; }

/* ===== Flip ボタン (白↔青の色反転) ===== */
.btn-flip {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 36px;
  background: var(--paper);
  color: var(--sky-700);
  border: 2px solid var(--sky-700);
  font-family: var(--jp);
  font-size: 16px;
  font-weight: 700;
  border-radius: 999px;
  cursor: pointer;
  overflow: hidden;
  transition: color .35s ease, border-color .35s ease, transform .25s ease, box-shadow .35s ease;
  z-index: 1;
  text-decoration: none;
}
.btn-flip::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--sky-700);
  transform: translateY(100%);
  transition: transform .45s cubic-bezier(.4, 0, .2, 1);
  z-index: -1;
}
.btn-flip:hover {
  color: var(--paper);
  transform: translateY(-3px);
  box-shadow: 0 14px 32px -8px rgba(22, 86, 176, 0.5);
}
.btn-flip:hover::before {
  transform: translateY(0);
}

.btn-flip-inverse {
  background: var(--sky-700);
  color: var(--paper);
  border-color: var(--sky-700);
}
.btn-flip-inverse::before {
  background: var(--paper);
}
.btn-flip-inverse:hover {
  color: var(--sky-700);
}

/* ===== Lift Card (持ち上がり + 色反転) ===== */
.lift-card {
  transition: transform .4s cubic-bezier(.2, .8, .2, 1),
              box-shadow .4s ease,
              background-color .4s ease,
              color .4s ease,
              border-color .4s ease;
  cursor: pointer;
}
.lift-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 24px 50px -16px rgba(22, 86, 176, 0.3);
}

.lift-card-flip {
  transition: transform .4s cubic-bezier(.2, .8, .2, 1),
              box-shadow .4s ease,
              background-color .45s ease,
              color .45s ease,
              border-color .4s ease;
  cursor: pointer;
}
.lift-card-flip:hover {
  transform: translateY(-10px);
  background: var(--sky-700) !important;
  border-color: var(--sky-700) !important;
  box-shadow: 0 24px 50px -14px rgba(22, 86, 176, 0.5);
}
.lift-card-flip:hover,
.lift-card-flip:hover * {
  color: var(--paper) !important;
}

/* ===== リンクの下線スライドアニメ ===== */
.link-slide {
  position: relative;
  text-decoration: none;
  color: inherit;
  display: inline-block;
}
.link-slide::after {
  content: '';
  position: absolute;
  left: 0; bottom: -3px;
  width: 100%;
  height: 2px;
  background: currentColor;
  transform: scaleX(0);
  transform-origin: right;
  transition: transform .45s cubic-bezier(.65, 0, .35, 1);
}
.link-slide:hover::after {
  transform: scaleX(1);
  transform-origin: left;
}

/* ===== 写真エフェクト ===== */
.photo-mono {
  filter: contrast(1.05) saturate(1.05);
  position: relative;
  overflow: hidden;
}
.photo-kenburns {
  animation: cca-ken-burns 24s ease-in-out infinite alternate;
  transform-origin: center;
}

/* ===== 下線アクセント (空色) ===== */
.accent-underline {
  background: linear-gradient(transparent 62%, var(--sky-300) 62%, var(--sky-300) 88%, transparent 88%);
  padding: 0 4px;
}

/* ===== 雲SVGの動き ===== */
.cloud-float-1 { animation: cca-float 18s ease-in-out infinite; }
.cloud-float-2 { animation: cca-float-slow 22s ease-in-out infinite; }
.cloud-float-3 { animation: cca-float 26s ease-in-out infinite; }

/* ===== モバイル対応 ===== */
@media (max-width: 880px) {
  .hero-grid {
    grid-template-columns: 1fr !important;
  }
  .upcoming-grid {
    grid-template-columns: 1fr !important;
  }
  .hero-side-blur {
    width: 100% !important;
    background: linear-gradient(180deg, rgba(10, 41, 96, 0.7) 0%, rgba(10, 41, 96, 0.4) 70%, transparent 100%) !important;
  }
}

/* 写真プレースホルダー (placeholder 画像なし時のフォールバック) */
.photo {
  background:
    repeating-linear-gradient(
      135deg,
      oklch(0.92 0.02 260) 0 14px,
      oklch(0.96 0.01 260) 14px 28px
    );
  position: relative;
  overflow: hidden;
}
.photo--navy {
  background:
    linear-gradient(135deg, oklch(0.30 0.13 260), oklch(0.18 0.08 260)),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 2px, transparent 2px 12px);
}
.photo--coral {
  background:
    linear-gradient(135deg, oklch(0.75 0.18 35), oklch(0.55 0.20 30));
}

/* ボタン */
.btn-primary {
  background: var(--coral);
  color: #fff;
  border: 0;
  padding: 14px 22px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: transform .2s ease, box-shadow .2s ease;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 30px -10px var(--coral); }
.btn-ghost {
  background: rgba(255,255,255,0.10);
  color: #fff;
  border: 0;
  padding: 14px 22px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  backdrop-filter: blur(8px);
  transition: background .2s ease;
}
.btn-ghost:hover { background: rgba(255,255,255,0.18); }
.btn-outline {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  transition: all .2s;
}
.btn-outline:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* レスポンシブ: スマホ */
@media (max-width: 767px) {
  .desktop-only { display: none !important; }
}
@media (min-width: 768px) {
  .mobile-only { display: none !important; }
}
</style>
</head>

<div id="root">
  <!-- フォールバック: スクリプトが読み込まれない、JS無効、エラー時に表示 -->
  <div id="fallback" style="padding:60px 24px;font-family:system-ui;color:#333;text-align:center;">
    <h1 style="font-size:24px;margin-bottom:12px;">connec+a</h1>
    <p style="color:#666;font-size:14px;">読み込み中...</p>
    <noscript>
      <p style="color:#d44;margin-top:20px;">JavaScript を有効にしてください。</p>
    </noscript>
  </div>
</div>

<!-- グローバルエラーハンドラ -->
<script>
window.addEventListener('error', function(e) {
  console.error('[Global Error]', e.message, e.filename, e.lineno);
  var fallback = document.getElementById('fallback');
  if (fallback) {
    fallback.innerHTML = '<h1 style="color:#d44;font-size:20px;margin-bottom:12px;">エラーが発生しました</h1>'
      + '<p style="color:#666;font-size:13px;margin-bottom:8px;">' + (e.message || '不明なエラー') + '</p>'
      + '<p style="color:#999;font-size:11px;font-family:monospace;">' + (e.filename || '') + ':' + (e.lineno || '') + '</p>'
      + '<p style="color:#666;font-size:13px;margin-top:20px;">ブラウザのキャッシュをクリアして再度お試しください。</p>';
  }
});
</script>

async function fetchEvents() {
  // 15秒タイムアウト: GAS応答が極端に遅い場合でも永久loadingを防ぐ
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000);
  try {
    const url = `${CONFIG.GAS_URL}?action=listEvents&_t=${Date.now()}`;
    console.log('[Participants] fetchEvents: requesting', url);
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    console.log('[Participants] fetchEvents: HTTP', res.status, res.ok ? 'OK' : 'FAIL');
    if (!res.ok) {
      console.error('[Participants] fetchEvents HTTP error:', res.status);
      return [];
    }
    const json = await res.json();
    console.log('[Participants] fetchEvents: response shape', {
      hasOk: 'ok' in json,
      ok: json.ok,
      hasData: 'data' in json,
      dataIsArray: Array.isArray(json.data),
      dataLength: Array.isArray(json.data) ? json.data.length : 'N/A',
      keys: Object.keys(json),
    });
    // GAS標準レスポンス形状: { ok: true, data: [...], user: {...} }
    if (json && json.ok && Array.isArray(json.data)) {
      console.log(`[Participants] fetchEvents: ${json.data.length} events received`);
      return json.data;
    }
    // 互換: 直接配列が返るパターンも許容
    if (Array.isArray(json)) {
      console.log(`[Participants] fetchEvents: ${json.length} events received (legacy shape)`);
      return json;
    }
    console.warn('[Participants] unexpected response shape:', json);
    return [];
  } catch (err) {
    clearTimeout(timeoutId);
    if (err.name === 'AbortError') {
      console.error('[Participants] fetchEvents timeout (15s)');
    } else {
      console.error('[Participants] fetchEvents error:', err);
    }
    return [];
  }
}

// 単一イベント取得 (詳細ページ用)
async function fetchEvent(eventId) {
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 15000);
  try {
    const params = encodeURIComponent(JSON.stringify({ eventId }));
    const url = `${CONFIG.GAS_URL}?action=getEvent&params=${params}&_t=${Date.now()}`;
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    if (!res.ok) return null;
    const json = await res.json();
    if (json && json.ok && json.data) return json.data;
    return null;
  } catch (err) {
    clearTimeout(timeoutId);
    console.error('[Participants] fetchEvent error:', err);
    return null;
  }
}

// 日付を YYYY.MM.DD DAY 形式に
function formatEventDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${dayNames[d.getDay()]}`;
}

// 時刻を「HH:MM」形式に正規化
// 入力例:
//   "10:00"               → "10:00"
//   "10:00:00"            → "10:00"
//   "1899-12-30T09:00:00.000Z" → "09:00" (Tの直後を抽出、TZ依存なし)
//   Date オブジェクト       → "HH:MM"
//   "" / null / undefined  → ""
function fmtTime(t) {
  if (!t && t !== 0) return '';
  if (typeof t === 'string') {
    // HH:MM 形式 (先頭から)
    const simple = t.match(/^(\d{1,2}):(\d{2})/);
    if (simple) return `${simple[1].padStart(2, '0')}:${simple[2]}`;
    // ISO 形式: T直後の HH:MM を抽出 (TZ解釈に依存しない)
    const isoMatch = t.match(/T(\d{2}):(\d{2})/);
    if (isoMatch) return `${isoMatch[1]}:${isoMatch[2]}`;
  }
  if (t instanceof Date) {
    const hh = String(t.getHours()).padStart(2, '0');
    const mm = String(t.getMinutes()).padStart(2, '0');
    return `${hh}:${mm}`;
  }
  return String(t);
}

// 時刻範囲を「HH:MM—HH:MM」または「HH:MMから」のように整形
// start, end のいずれかが空の場合も対応
function fmtTimeRange(start, end) {
  const s = fmtTime(start);
  const e = fmtTime(end);
  if (s && e) return `${s}—${e}`;
  if (s) return s;
  if (e) return `〜${e}`;
  return '';
}

// 公開イベントのフィルタ (表記揺れに強い実装)
function filterPublicEvents(events) {
  if (!Array.isArray(events)) {
    console.warn('[Participants] filterPublicEvents: events is not array', events);
    return [];
  }
  // 公開状態とみなすステータス値 (表記揺れ吸収)
  const PUBLIC_STATUSES = ['公開中', '満員', '公開', 'published', 'public', 'open'];
  const filtered = events.filter(e => PUBLIC_STATUSES.includes(e.status));
  // デバッグログ: 受信件数とフィルタ後件数を表示
  console.log(`[Participants] filterPublicEvents: ${events.length} received → ${filtered.length} public`);
  if (events.length > 0 && filtered.length === 0) {
    // 受信したのに全部フィルタで落ちる場合、ステータス値を一覧表示
    const statuses = [...new Set(events.map(e => e.status))];
    console.warn('[Participants] all events filtered out. Found statuses:', statuses);
    console.warn('[Participants] expected one of:', PUBLIC_STATUSES);
  }
  return filtered;
}

// LANG HOOK (localStorage 保存)

function useLang() {
  const [lang, setLangState] = useState(() => {
    const saved = localStorage.getItem('cca-lang');
    return saved && ['ja', 'easy', 'en'].includes(saved) ? saved : 'ja';
  });
  const setLang = (l) => {
    setLangState(l);
    localStorage.setItem('cca-lang', l);
  };
  return [lang, setLang];
}

// ============================================================================
// ROUTING (hash-based)
// ============================================================================
function useRoute() {
  const [hash, setHash] = useState(window.location.hash || '#/');
  useEffect(() => {
    const handler = () => {
      setHash(window.location.hash || '#/');
      window.scrollTo(0, 0);
    };
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  return hash.replace(/^#/, '') || '/';
}

// ============================================================================
// UTM TRACKING (Phase 1: 取得 + localStorage 保存のみ。送信は次セッション)
// ============================================================================
function captureUTM() {
  const params = new URLSearchParams(window.location.search);
  const utm = {
    source: params.get('utm_source') || '',
    medium: params.get('utm_medium') || '',
    campaign: params.get('utm_campaign') || '',
    referrer: document.referrer || '',
    capturedAt: new Date().toISOString(),
  };
  if (utm.source || utm.medium || utm.campaign) {
    localStorage.setItem('cca-utm-first', JSON.stringify(utm));
    console.log('[UTM] captured:', utm);
  }
  // セッションIDを発行
  if (!localStorage.getItem('cca-session-id')) {
    localStorage.setItem('cca-session-id', 'S-' + Math.random().toString(36).slice(2, 14));
  }
  return utm;
}

// ============================================================================
function Reveal({ delay = 0, children, y = 30, blur = true, style = {}, ...rest }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => {
        if (e.isIntersecting) setShown(true);
      }),
      { threshold: 0.12, rootMargin: '0px 0px -60px 0px' }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: shown ? 1 : 0,
      transform: shown ? 'none' : `translateY(${y}px) scale(${shown ? 1 : 0.97})`,
      filter: shown ? 'blur(0)' : (blur ? 'blur(8px)' : 'none'),
      transition: `opacity .9s ${delay}ms cubic-bezier(.2,.8,.2,1), transform .9s ${delay}ms cubic-bezier(.2,.8,.2,1), filter .9s ${delay}ms ease`,
      willChange: 'opacity, transform, filter',
      ...style,
    }} {...rest}>{children}</div>
  );
}

// 大型ビルドイン (ヒーロー、主要セクション用)
function BuildIn({ delay = 0, children, y = 80, style = {}, ...rest }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;

      }),

  }, []);
  return (

    }} {...rest}>{children}</div>

}

// 方向指定ビルドイン (left/right/up/down)
function BuildInDir({ delay = 0, dir = 'up', distance = 80, children, style = {}, ...rest }) {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) setShown(true); }),
      { threshold: 0.05, rootMargin: '0px 0px -80px 0px' }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  const offset = {
    up:    `translateY(${distance}px)`,
    down:  `translateY(-${distance}px)`,
    left:  `translateX(${distance}px)`,
    right: `translateX(-${distance}px)`,
  }[dir];
  return (
    <div ref={ref} style={{
      opacity: shown ? 1 : 0,
      transform: shown ? 'none' : offset,
      filter: shown ? 'blur(0)' : 'blur(10px)',
      transition: `opacity 1.0s ${delay}ms cubic-bezier(.16,.84,.32,1), transform 1.0s ${delay}ms cubic-bezier(.16,.84,.32,1), filter .9s ${delay}ms ease`,
      willChange: 'opacity, transform, filter',
      ...style,
    }} {...rest}>{children}</div>
  );
}

function CountUp({ to, suffix = '', duration = 1400 }) {
  const [n, setN] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => {
        if (entries[0].isIntersecting) {
          const start = performance.now();
          const step = (now) => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            setN(Math.round(to * eased));
            if (t < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
          io.disconnect();
        }
      },
      { threshold: 0.5 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, [to]);
  return <span ref={ref}>{n.toLocaleString()}{suffix}</span>;
}

// インライン版 (style 対応、ヒーロー埋め込み用)
function CountUpInline({ to, suffix = '', duration = 1400, style = {} }) {
  const [n, setN] = useState(0);

  useEffect(() => {
    const el = ref.current;

    const io = new IntersectionObserver(

            const eased = 1 - Math.pow(1 - t, 3);
            setN(Math.round(to * eased));
            if (t < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
          io.disconnect();
        }
      },
      { threshold: 0.3 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, [to]);
  return <span ref={ref} style={style}>{n.toLocaleString()}{suffix}</span>;
}

            <LangPicker lang={lang} setLang={setLang} t={t} transparent={false} mobile />

function LangPicker({ lang, setLang, t, transparent, mobile }) {
  const [open, setOpen] = useState(false);
  const langs = [
    { code: 'ja', label: '日本語', short: 'JA' },
    { code: 'easy', label: 'やさしい にほんご', short: 'EZ' },
    { code: 'en', label: 'English', short: 'EN' },
  ];
  const current = langs.find(l => l.code === lang) || langs[0];

  if (mobile) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <div style={{ fontSize: 11, color: 'var(--ink-mute)', fontFamily: 'var(--mono)', letterSpacing: '0.1em' }}>LANGUAGE</div>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {langs.map(l => (
            <button key={l.code} onClick={() => setLang(l.code)} style={{
              padding: '8px 14px',
              borderRadius: 999,
              border: `1px solid ${lang === l.code ? 'var(--ink)' : 'var(--line)'}`,
              background: lang === l.code ? 'var(--ink)' : 'transparent',
              color: lang === l.code ? 'var(--paper)' : 'var(--ink)',
              fontSize: 12, fontWeight: 500,
            }}>{l.label}</button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ position: 'relative' }}>
      <button onClick={() => setOpen(!open)} style={{
        background: transparent ? 'rgba(255,255,255,0.10)' : 'var(--paper-2)',
        color: transparent ? '#fff' : 'var(--ink)',
        border: 0,
        padding: '7px 14px',
        borderRadius: 999,
        fontSize: 11, fontWeight: 500, letterSpacing: '0.05em',
        fontFamily: 'var(--mono)',
        backdropFilter: transparent ? 'blur(8px)' : 'none',
      }}>{current.short} ▾</button>
      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 8px)', right: 0,
          background: '#fff',
          border: '1px solid var(--line)',
          borderRadius: 12,
          padding: 6,
          minWidth: 200,
          boxShadow: '0 10px 30px rgba(0,0,0,0.12)',
          zIndex: 50,
        }}>
          {langs.map(l => (
            <button key={l.code} onClick={() => { setLang(l.code); setOpen(false); }} style={{
              display: 'block', width: '100%',
              padding: '10px 14px',
              border: 0,
              background: lang === l.code ? 'var(--paper-2)' : 'transparent',
              color: 'var(--ink)',
              textAlign: 'left',
              fontSize: 13, fontWeight: lang === l.code ? 600 : 400,
              borderRadius: 8,
              fontFamily: 'var(--jp)',
            }}>{l.label}</button>
          ))}
        </div>
      )}
    </div>
  );
}

    home: '100vh',

                </BuildIn>
              );
            })}
          </div>
        </div>
      </section>
    </div>
  );
}

// ============================================================================
// EVENTS LIST PAGE
// ============================================================================
function PageEvents({ lang, t, events, loading }) {
  const [category, setCategory] = useState('all');

  const visibleEvents = filterPublicEvents(events);
  const categories = useMemo(() => {
    const set = new Set();
    visibleEvents.forEach(e => { if (e.category) set.add(e.category); });
    return Array.from(set).sort();
  }, [visibleEvents]);

  const filtered = category === 'all'
    ? visibleEvents
    : visibleEvents.filter(e => e.category === category);

  return (
    <div>
      {/* Navy Hero (トップと統一感) */}
      <PageHero
        variant="events"
        marker={`EVENTS / ${new Date().getFullYear()}`}
        markerRight="ALL UPCOMING"
        eyebrow={`${visibleEvents.length} ${lang === 'en' ? 'events' : lang === 'easy' ? 'イベント' : '件'} · ${lang === 'en' ? 'OPEN NOW' : '受付中'}`}
        title={t.sections.allEvents}
        subtitle={lang === 'en'
          ? 'Browse all upcoming events organized by connec+a.'
          : lang === 'easy'
          ? 'これから ある イベントを ぜんぶ みる。'
          : 'connec+a が主催する、すべての開催予定イベント。'}
      />

      {/* Filter */}
      <section style={{ padding: '40px 24px 0', maxWidth: 1280, margin: '0 auto' }}>
        <div style={{
          display: 'flex',
          alignItems: 'center',
          gap: 12,
          flexWrap: 'wrap',
          paddingBottom: 16,
          borderBottom: '1px solid var(--line)',
        }}>
          <span style={{
            fontFamily: 'var(--mono)', fontSize: 11,
            color: 'var(--ink-mute)', letterSpacing: '0.1em',
            marginRight: 8,
          }}>{t.filter.category}:</span>
          <FilterPill label={t.filter.all} active={category === 'all'} onClick={() => setCategory('all')} />
          {categories.map(cat => (
            <FilterPill key={cat} label={cat} active={category === cat} onClick={() => setCategory(cat)} />
          ))}
          <div style={{ flex: 1 }} />
          <span style={{ fontSize: 13, color: 'var(--ink-mute)' }}>
            {filtered.length} {lang === 'en' ? 'events' : lang === 'easy' ? 'イベント' : '件'}
          </span>
        </div>
      </section>

      {/* Events grid */}
      <section style={{ padding: '40px 24px 120px', maxWidth: 1280, margin: '0 auto' }}>
        {loading ? (
          <div style={{ padding: 80, textAlign: 'center', color: 'var(--ink-mute)' }}>{t.loading}</div>
        ) : filtered.length === 0 ? (
          <div style={{ padding: 80, textAlign: 'center', color: 'var(--ink-mute)' }}>{t.noEvents}</div>
        ) : (
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))',
            gap: 24,
          }}>
            {filtered.map((ev, i) => (
              <Reveal key={ev.id} delay={(i % 6) * 50}>
                <EventCard ev={ev} lang={lang} t={t} />
              </Reveal>
            ))}
          </div>
        )}
      </section>
    </div>
  );
}

function FilterPill({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      padding: '8px 16px',
      borderRadius: 999,
      border: `1px solid ${active ? 'var(--ink)' : 'var(--line)'}`,
      background: active ? 'var(--ink)' : 'transparent',
      color: active ? 'var(--paper)' : 'var(--ink)',
      fontSize: 13, fontWeight: 500,
      transition: 'all .15s',
    }}>{label}</button>
  );
}

// SIMPLE STUB PAGE (about/news/contact/login/signup/event-detail)

// ============================================================================
// PAGE: EVENT DETAIL
// ============================================================================
function PageEventDetail({ lang, t, eventId }) {
  const [ev, setEv] = useState(null);
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedSessionIds, setSelectedSessionIds] = useState([]);  // 複数選択対応 (配列)

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      const eventData = await fetchEvent(eventId);
      if (cancelled) return;
      setEv(eventData);
      if (eventData && eventData.format === 'multi') {
        const sessData = await fetchEventSessions(eventId);
        if (!cancelled) setSessions(sessData);
      }
      setLoading(false);
    }
    load();
    return () => { cancelled = true; };
  }, [eventId]);

  // ローディング中
  if (loading) {
    return (
      <div style={{ minHeight: '100vh', paddingTop: 200, textAlign: 'center', color: 'var(--ink-mute)' }}>
        {t.loading}
      </div>
    );
  }

  // イベントが見つからない
  if (!ev) {
    return (
      <div style={{ minHeight: '100vh', paddingTop: 200, padding: '200px 24px 80px', maxWidth: 800, margin: '0 auto', textAlign: 'center' }}>
        <h1 style={{ fontFamily: 'var(--jp)', fontSize: 'clamp(28px, 4vw, 42px)', fontWeight: 900, margin: '0 0 20px' }}>{t.detail.notFound}</h1>
        <p style={{ color: 'var(--ink-mute)' }}>Event ID: {eventId}</p>
        <div style={{ marginTop: 40 }}>
          <a href="#/events" className="btn-outline">{t.detail.back}</a>
        </div>
      </div>
    );
  }

  const isFull = ev.status === '満員' || (ev.capacity > 0 && ev.registered >= ev.capacity);
  const spotsLeft = Math.max(0, (ev.capacity || 0) - (ev.registered || 0));
  const isMulti = ev.format === 'multi' && sessions.length > 0;

  // 日付パース (YYYY-MM-DD → 各部品)
  const dateObj = ev.date ? new Date(ev.date + 'T00:00:00') : null;
  const yyyy = dateObj ? dateObj.getFullYear() : '';
  const mm = dateObj ? String(dateObj.getMonth() + 1).padStart(2, '0') : '';
  const dd = dateObj ? String(dateObj.getDate()).padStart(2, '0') : '';
  const dayOfWeek = dateObj ? ['SUN','MON','TUE','WED','THU','FRI','SAT'][dateObj.getDay()] : '';

  // Google Maps URL 生成
  const venueQuery = ev.address || ev.venue || '';
  const mapsHref = venueQuery
    ? `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(venueQuery)}`
    : '';
  const venueValue = ev.online ? (ev.zoomURL ? 'Zoom' : t.detail.meta.online) : (ev.venue || '—');
  const venueHref = ev.online && ev.zoomURL ? ev.zoomURL : mapsHref;
  const venueLinkLabel = ev.online ? t.detail.openInZoom : t.detail.openInMaps;

  // 申込ボタンクリック
  const handleRegister = () => {
    alert(t.detail.registerSoon);
  };

  // Issue番号 (E-2601 → 026)
  const issueNum = ev.id ? ev.id.replace(/^E-/, '').replace(/^2/, '0') : '000';

  return (
    <article style={{ background: 'var(--paper)' }}>
      {/* Navy Hero (トップと統一感) */}
      <PageHero
        variant="detail"
        marker={`${t.detail.issue} ${issueNum} · ${yyyy} · ${ev.id}`}
        markerRight={t.detail.eventLog}
        category={ev.category || 'EVENT'}
        title={ev.title}
        subtitle={ev.summary ? ev.summary.split('\n')[0] : ''}
        metaLine={`${yyyy}.${mm}.${dd} · ${dayOfWeek}${ev.time ? ` · ${ev.time}` : ''}`}
      />

      {/* ============================================================ */}
      {/* ARTICLE BODY (1カラム、エディトリアル) */}
      {/* ============================================================ */}
      <main style={{
        maxWidth: 720,
        margin: '0 auto',
        padding: 'clamp(80px, 12vh, 140px) clamp(24px, 6vw, 40px) 160px',
      }}>
        {/* 戻るリンク (上品に) */}
        <Reveal>
          <a href="#/events" style={{
            display: 'inline-block',
            fontFamily: 'var(--mono)',
            fontSize: 12,
            color: 'var(--ink-mute)',
            letterSpacing: '0.15em',
            marginBottom: 80,
            textDecoration: 'none',
            transition: 'color .2s, transform .2s',
          }}
          onMouseEnter={(e) => { e.target.style.color = 'var(--ink)'; e.target.style.transform = 'translateX(-4px)'; }}
          onMouseLeave={(e) => { e.target.style.color = 'var(--ink-mute)'; e.target.style.transform = 'none'; }}>
            ← {t.detail.back.replace('← ', '')}
          </a>
        </Reveal>

        {/* INFORMATION 段落 (multi/single分岐) */}
        <Reveal delay={100}>
          <SectionLabel>{t.detail.info}</SectionLabel>
        </Reveal>

        {isMulti ? (
          /* === Multi: スワイプ可能なセッション切替UI === */
          <Reveal delay={150}>
            <MultiSessionInfo sessions={sessions} lang={lang} t={t} />
          </Reveal>
        ) : (
          /* === Single: 既存のシンプル表示 === */
          <Reveal delay={150}>
            <div style={{
              fontFamily: 'var(--jp)',
              fontSize: 18,
              lineHeight: 2.1,
              color: 'var(--ink)',
              marginBottom: 64,
            }}>
              {/* 日時行 */}
              <InfoLine label={t.detail.tags.date}>
                <strong style={editorialBold}>{yyyy}.{mm}.{dd} ({dayOfWeek})</strong>
                {ev.time && <> · {ev.time}</>}
              </InfoLine>

              {/* 会場行 */}
              <InfoLine label={t.detail.tags.venue}>
                {ev.online ? (
                  <>
                    <strong style={editorialBold}>{venueValue}</strong>
                    {venueHref && (
                      <> · <EditorialLink href={venueHref}>{venueLinkLabel}</EditorialLink></>
                    )}
                  </>
                ) : (
                  <>
                    <strong style={editorialBold}>{venueValue}</strong>
                    {mapsHref && (
                      <> · <EditorialLink href={mapsHref}>{venueLinkLabel}</EditorialLink></>
                    )}
                  </>
                )}
              </InfoLine>

              {/* 定員行 */}
              <InfoLine label={t.detail.tags.capacity}>
                {ev.capacity ? (
                  <>
                    <strong style={editorialBold}>{ev.capacity}{t.detail.seats}</strong>
                    <span style={{ color: 'var(--ink-mute)' }}>
                      （{lang === 'en' ? 'currently' : '現在'} {ev.registered || 0}/{ev.capacity}{lang === 'ja' ? '、' : ', '}
                      {lang === 'en' ? `${spotsLeft} ${t.detail.seatsRemaining}` : `${t.detail.seatsRemaining}${spotsLeft}${t.detail.seats}`}）
                    </span>
                  </>
                ) : '—'}
              </InfoLine>

              {/* 参加費行 */}
              <InfoLine label={t.detail.tags.fee}>
                {ev.fee && ev.fee > 0 ? (
                  <strong style={editorialBold}>¥{ev.fee.toLocaleString()}</strong>
                ) : (
                  <strong style={{ ...editorialBold, color: 'var(--coral)' }}>{t.detail.free}</strong>
                )}
              </InfoLine>
            </div>
          </Reveal>
        )}

        {/* 概要 (本文) */}
        {ev.summary && (
          <Reveal delay={150}>
            <SectionLabel>{t.detail.about}</SectionLabel>
            <div style={{
              fontFamily: 'var(--jp)',
              fontSize: 18,
              lineHeight: 2.1,
              color: 'var(--ink)',
              whiteSpace: 'pre-wrap',
              marginBottom: 64,
              letterSpacing: '0.01em',
            }}>{ev.summary}</div>
          </Reveal>
        )}

        {/* セッション選択 (multi イベントのみ、複数選択可能) */}
        {isMulti && (
          <Reveal delay={150}>
            <SectionLabel>{t.detail.sessions}</SectionLabel>

            {/* 説明 + 全選択コントロール */}
            <div style={{
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              flexWrap: 'wrap',
              gap: 12,
              marginBottom: 24,
            }}>
              <p style={{
                fontFamily: 'var(--jp)',
                fontSize: 15,
                lineHeight: 1.7,
                color: 'var(--ink-mute)',
                margin: 0,
              }}>{t.detail.sessionSelect}</p>

              <div style={{ display: 'flex', gap: 8, fontFamily: 'var(--jp)', fontSize: 13, fontWeight: 600 }}>
                <button
                  onClick={() => {
                    const available = sessions.filter(s => !(s.capacity > 0 && s.registered >= s.capacity)).map(s => s.id);
                    setSelectedSessionIds(available);

                  style={{
                    background: 'transparent',
                    border: '1px solid var(--sky-200)',
                    color: 'var(--sky-700)',
                    padding: '6px 14px',
                    borderRadius: 999,

                      border: '1px solid var(--line)',

                      transition: 'all .2s',
                    }}
                    onMouseEnter={(e) => { e.target.style.background = 'var(--paper-2)'; }}

                background: 'var(--coral-soft)',

          marginTop: 80,
          textAlign: 'center',
          fontFamily: 'var(--mono)',

              letterSpacing: '0.2em',
              marginBottom: 6,
              fontWeight: 500,
            }}>
              {ev.fee && ev.fee > 0 ? `¥ ${ev.fee.toLocaleString()}` : t.detail.free.toUpperCase()}
              {' · '}
              {isFull ? t.detail.eventClosed : (
                lang === 'en'
                  ? `${spotsLeft} ${t.detail.seatsRemaining}`
                  : `${t.detail.seatsRemaining} ${spotsLeft} ${t.detail.seats}`
              )}
            </div>
            <div style={{
              fontFamily: 'var(--jp)',
              fontSize: 16,
              fontWeight: 700,
              color: 'var(--ink)',
              lineHeight: 1.3,
            }}>{ev.title}</div>
          </div>
          <button onClick={handleRegister} disabled={isFull || (isMulti && selectedSessionIds.length === 0)} style={{
            background: isFull ? 'var(--ink-faint)' : 'var(--ink)',
            color: 'var(--paper)',
            border: 0,
            padding: '16px 36px',
            fontFamily: 'var(--mono)',
            fontSize: 13,
            fontWeight: 700,
            borderRadius: 999,
            cursor: isFull ? 'not-allowed' : 'pointer',
            opacity: (isMulti && selectedSessionIds.length === 0) ? 0.5 : 1,
            transition: 'all .25s',
            letterSpacing: '0.18em',
          }}
          onMouseEnter={(e) => {
            if (!isFull) {
              e.target.style.background = 'var(--coral)';
              e.target.style.transform = 'translateY(-2px)';
            }
          }}
          onMouseLeave={(e) => {
            if (!isFull) {
              e.target.style.background = 'var(--ink)';
              e.target.style.transform = 'none';
            }
          }}>
            {isFull
              ? t.card.closed.toUpperCase()
              : isMulti
                ? (selectedSessionIds.length > 1
                    ? t.detail.sessionsRegister.replace('{n}', selectedSessionIds.length).toUpperCase()
                    : t.detail.sessionRegister.toUpperCase())
                : t.detail.registerNow.toUpperCase()
            } →
          </button>
        </div>
      </div>

      <div style={{ height: 110 }}></div>
    </article>
  );
}

// ============================================================================
// MULTI SESSION INFO (multi イベントの「くわしいこと」、スワイプ切替)
// ============================================================================
function MultiSessionInfo({ sessions, lang, t }) {
  const [idx, setIdx] = useState(0);
  const containerRef = useRef(null);
  const touchStartX = useRef(null);

  if (!sessions || sessions.length === 0) {
    return (
      <div style={{ color: 'var(--ink-mute)', padding: '20px 0', fontFamily: 'var(--jp)' }}>
        セッション情報を読み込み中...
      </div>
    );
  }

  const total = sessions.length;
  const current = sessions[idx];

  // 日付パース
  const dateObj = current.date ? new Date(current.date + 'T00:00:00') : null;
  const yyyy = dateObj ? dateObj.getFullYear() : '';
  const mm = dateObj ? String(dateObj.getMonth() + 1).padStart(2, '0') : '';
  const dd = dateObj ? String(dateObj.getDate()).padStart(2, '0') : '';
  const dayOfWeek = dateObj ? ['日','月','火','水','木','金','土'][dateObj.getDay()] : '';
  const dayOfWeekEn = dateObj ? ['SUN','MON','TUE','WED','THU','FRI','SAT'][dateObj.getDay()] : '';

  // セッションの会場/online
  const sVenue = current.online ? (current.zoomURL ? 'Zoom' : 'オンライン') : (current.venue || '—');
  const sAddress = current.address || current.venue || '';
  const sMapsHref = sAddress ? `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(sAddress)}` : '';
  const sLinkHref = current.online && current.zoomURL ? current.zoomURL : sMapsHref;
  const sLinkLabel = current.online ? t.detail.openInZoom : t.detail.openInMaps;

  // 定員/残席
  const sCap = current.capacity || 0;
  const sReg = current.registered || 0;
  const sLeft = Math.max(0, sCap - sReg);

  // 参加費
  const sFee = current.fee;

  const goPrev = () => setIdx(i => (i > 0 ? i - 1 : total - 1));
  const goNext = () => setIdx(i => (i < total - 1 ? i + 1 : 0));

  // タッチスワイプ対応
  const handleTouchStart = (e) => {
    touchStartX.current = e.touches[0].clientX;
  };
  const handleTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (Math.abs(dx) > 50) {
      if (dx > 0) goPrev(); else goNext();
    }
    touchStartX.current = null;
  };

  return (
    <div style={{ marginBottom: 64 }}>
      {/* マルチ開催バッジ */}
      <div style={{
        display: 'inline-flex',
        alignItems: 'center',
        gap: 10,
        background: 'var(--sky-100)',
        color: 'var(--sky-800)',
        padding: '7px 16px',
        borderRadius: 999,
        fontFamily: 'var(--jp)',
        fontSize: 12,
        fontWeight: 700,
        marginBottom: 24,
      }}>
        <span style={{ fontSize: 14 }}>📅</span>
        <span>{t.detail.multiBadge} · {t.detail.multiTotal} {total} {t.detail.multiSessions}</span>
      </div>

      {/* セッション切替タブ */}
      <div style={{
        display: 'flex',
        gap: 8,
        marginBottom: 24,
        flexWrap: 'wrap',
      }}>
        {sessions.map((s, i) => {
          const sd = s.date ? new Date(s.date + 'T00:00:00') : null;
          const label = sd
            ? `${sd.getMonth() + 1}/${sd.getDate()}`
            : `${t.detail.sessionDay} ${i + 1}`;
          const isActive = i === idx;
          const isFull = s.capacity > 0 && (s.registered || 0) >= s.capacity;
          return (
            <button
              key={s.id || i}
              onClick={() => setIdx(i)}
              style={{
                padding: '10px 18px',
                background: isActive ? 'var(--sky-700)' : 'transparent',
                color: isActive ? '#fff' : 'var(--sky-800)',
                border: `1.5px solid ${isActive ? 'var(--sky-700)' : 'var(--sky-200)'}`,
                borderRadius: 999,
                fontFamily: 'var(--jp)',
                fontSize: 13,
                fontWeight: 700,
                cursor: 'pointer',
                transition: 'all .25s',
                opacity: isFull && !isActive ? 0.5 : 1,
                position: 'relative',
              }}
              onMouseEnter={(e) => {
                if (!isActive) {
                  e.target.style.background = 'var(--sky-50)';
                  e.target.style.borderColor = 'var(--sky-400)';
                }
              }}
              onMouseLeave={(e) => {
                if (!isActive) {
                  e.target.style.background = 'transparent';
                  e.target.style.borderColor = 'var(--sky-200)';
                }
              }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 10, fontWeight: 600, marginRight: 6, opacity: 0.7 }}>
                {String(i + 1).padStart(2, '0')}
              </span>
              {label}
              {isFull && <span style={{ marginLeft: 6, fontSize: 10, color: isActive ? '#fff' : 'var(--coral)' }}>●</span>}
            </button>
          );
        })}
      </div>

      {/* セッション詳細 (スワイプ可能) */}
      <div
        ref={containerRef}
        onTouchStart={handleTouchStart}
        onTouchEnd={handleTouchEnd}
        style={{
          background: 'var(--paper-2)',
          borderRadius: 16,
          padding: 'clamp(20px, 3vw, 32px)',
          fontFamily: 'var(--jp)',
          fontSize: 17,
          lineHeight: 2.0,
          color: 'var(--ink)',
          position: 'relative',
          minHeight: 320,
          transition: 'opacity .25s ease',
        }}
        key={`session-${idx}`}
      >
        {/* セッション番号ヘッダー */}
        <div style={{
          display: 'flex',
          alignItems: 'baseline',
          justifyContent: 'space-between',
          marginBottom: 20,
          flexWrap: 'wrap',
          gap: 12,
        }}>
          <div>
            <div style={{
              fontFamily: 'var(--mono)',
              fontSize: 11,
              color: 'var(--coral)',
              letterSpacing: '0.25em',
              fontWeight: 700,
              marginBottom: 4,
            }}>
              {t.detail.sessionDay} {idx + 1} / {total}
            </div>
            {current.name && (
              <div style={{
                fontFamily: 'var(--jp)',
                fontSize: 18,
                fontWeight: 700,
                color: 'var(--sky-900)',
              }}>{current.name}</div>
            )}
          </div>
        </div>

        {/* 日時 */}
        <InfoLine label={t.detail.tags.date}>
          {dateObj ? (
            <>
              <strong style={editorialBold}>{yyyy}.{mm}.{dd} ({dayOfWeek})</strong>
              {(current.startTime || current.endTime) && (
                <> · {fmtTimeRange(current.startTime, current.endTime)}</>
              )}
            </>
          ) : '—'}
        </InfoLine>

        {/* 会場 */}
        <InfoLine label={t.detail.tags.venue}>
          <strong style={editorialBold}>{sVenue}</strong>
          {sLinkHref && (
            <> · <EditorialLink href={sLinkHref}>{sLinkLabel}</EditorialLink></>
          )}
        </InfoLine>

        {/* 定員 */}
        <InfoLine label={t.detail.tags.capacity}>
          {sCap ? (
            <>
              <strong style={editorialBold}>{sCap}{t.detail.seats}</strong>
              <span style={{ color: 'var(--ink-mute)' }}>
                （{sReg}/{sCap}{lang === 'ja' ? '、' : ', '}
                {lang === 'en' ? `${sLeft} ${t.detail.seatsRemaining}` : `${t.detail.seatsRemaining}${sLeft}${t.detail.seats}`}）
              </span>
            </>
          ) : '—'}
        </InfoLine>

        {/* 参加費 (セッションごと) */}
        <InfoLine label={t.detail.tags.fee}>
          {sFee && sFee > 0 ? (
            <strong style={editorialBold}>¥{sFee.toLocaleString()}</strong>
          ) : (
            <strong style={{ ...editorialBold, color: 'var(--coral)' }}>{t.detail.free}</strong>
          )}
        </InfoLine>

        {/* 前/次ナビゲーション */}
        <div style={{
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          marginTop: 24,
          paddingTop: 20,
          borderTop: '1px dotted var(--line)',
          gap: 12,
        }}>
          <button
            onClick={goPrev}
            style={{
              background: 'transparent',
              border: 0,
              color: 'var(--sky-700)',
              fontFamily: 'var(--jp)',
              fontSize: 13,
              fontWeight: 700,
              cursor: 'pointer',
              padding: '8px 4px',
              display: 'inline-flex',
              alignItems: 'center',
              gap: 6,
              transition: 'transform .2s',
            }}
            onMouseEnter={(e) => { e.currentTarget.style.transform = 'translateX(-3px)'; }}
            onMouseLeave={(e) => { e.currentTarget.style.transform = 'none'; }}
          >
            <span style={{ fontSize: 16 }}>←</span>
            <span>{t.detail.sessionPrev}</span>
          </button>
          <span style={{
            fontFamily: 'var(--mono)',
            fontSize: 11,
            color: 'var(--ink-mute)',
            letterSpacing: '0.18em',
            fontWeight: 600,
          }}>
            {String(idx + 1).padStart(2, '0')} / {String(total).padStart(2, '0')}
          </span>
          <button
            onClick={goNext}
            style={{
              background: 'transparent',
              border: 0,
              color: 'var(--sky-700)',
              fontFamily: 'var(--jp)',
              fontSize: 13,
              fontWeight: 700,
              cursor: 'pointer',
              padding: '8px 4px',
              display: 'inline-flex',
              alignItems: 'center',
              gap: 6,
              transition: 'transform .2s',
            }}
            onMouseEnter={(e) => { e.currentTarget.style.transform = 'translateX(3px)'; }}
            onMouseLeave={(e) => { e.currentTarget.style.transform = 'none'; }}
          >
            <span>{t.detail.sessionNext}</span>
            <span style={{ fontSize: 16 }}>→</span>
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// APP
// ============================================================================
function App() {
  const [lang, setLang] = useLang();
  const route = useRoute();
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const t = I18N[lang] || I18N.ja;

  // UTM 取得 (初回)
  useEffect(() => {
    captureUTM();
  }, []);

  // イベントデータ取得
  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      const data = await fetchEvents();
      if (!cancelled) {
        setEvents(data);
        setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // ルーティング
  let Page;
  let pageTitle = '';
  const isHome = route === '/';
  const matchEvent = route.match(/^\/events\/(.+)/);

  if (isHome) {
    Page = <PageHome lang={lang} t={t} events={events} loading={loading} />;
  } else if (route === '/events') {
    Page = <PageEvents lang={lang} t={t} events={events} loading={loading} />;
  } else if (matchEvent) {
    Page = <PageEventDetail lang={lang} t={t} eventId={matchEvent[1]} />;
  } else if (route === '/about') {
    pageTitle = t.nav.about;
    Page = <PageStub lang={lang} t={t} title={pageTitle} />;
  } else if (route === '/news') {
    pageTitle = t.nav.news;
    Page = <PageStub lang={lang} t={t} title={pageTitle} />;
  } else if (route === '/contact') {
    pageTitle = t.nav.contact;
    Page = <PageStub lang={lang} t={t} title={pageTitle} />;
  } else if (route === '/login') {
    pageTitle = t.nav.login;
    Page = <PageStub lang={lang} t={t} title={pageTitle} />;
  } else if (route === '/signup') {
    pageTitle = t.nav.signup;
    Page = <PageStub lang={lang} t={t} title={pageTitle} />;
  } else if (route === '/mypage') {
    pageTitle = lang === 'en' ? 'My Page' : 'マイページ';
    Page = <PageStub lang={lang} t={t} title={pageTitle} />;
  } else {
    pageTitle = '404';
    Page = <PageStub lang={lang} t={t} title="Not Found" />;
  }

  return (
    <React.Fragment>
      <Nav lang={lang} setLang={setLang} t={t} transparent={isHome} />
      <main>{Page}</main>
      <Footer lang={lang} t={t} />
    </React.Fragment>
  );
}

try {
  const rootEl = document.getElementById('root');
  // フォールバックをクリア
  rootEl.innerHTML = '';
  ReactDOM.createRoot(rootEl).render(<App />);
} catch (err) {
  console.error('[App Boot Error]', err);
  const fallback = document.getElementById('fallback');
  if (fallback) {
    fallback.innerHTML = '<h1 style="color:#d44;">起動エラー</h1>'
      + '<p style="color:#666;font-family:monospace;font-size:12px;">' + (err.message || err) + '</p>';
  }
}
</script>
