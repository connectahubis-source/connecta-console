/**
 * チャット画面。Slack風UI。
 * 注意: page クラスではなく独自レイアウト (height: calc(100vh - 52px)) で全画面占有する。
 */
function PageChat(){
  const [channels, setChannels] = useState([]);
  const [members, setMembers] = useState([]);
  const [messages, setMessages] = useState([]);   // 現在のチャンネルのメッセージ
  const [channelLoading, setChannelLoading] = useState(false);   // 現在チャンネルの初回ロード中フラグ
  const [activeChannelId, setActiveChannelId] = useState("");
  // ログイン中のユーザー (window.currentUser から取得、認証必須)
  const currentUserId = (window.currentUser && window.currentUser.member && window.currentUser.member.id) || "";
  const currentUserName = (window.currentUser && window.currentUser.member && window.currentUser.member.name) || "";
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [draft, setDraft] = useState("");
  const [sending, setSending] = useState(false);
  const [draftMentions, setDraftMentions] = useState([]);   // [memberId, ...]
  const [mentionPopup, setMentionPopup] = useState(null);   // {query, position}
  const [editingChannel, setEditingChannel] = useState(null);   // 新規チャンネル作成 or 編集モーダル

  // localStorage の代替: メモリ内マップ (key: userId+channelId, value: 最後に読んだ MessageID)
  const [readMap, setReadMap] = useState({});
  const [unreadCounts, setUnreadCounts] = useState({});   // {channelId: count}
  const [allMessages, setAllMessages] = useState({});     // {channelId: [...]} 未読カウント計算用キャッシュ

  const messageEndRef = useRef(null);
  const inputRef = useRef(null);

  // ========== 初期データ取得 ==========

  async function fetchInitial() {
    setLoading(true);
    setError(null);
    try {
      const [chs, mems] = await Promise.all([
        window.fetchData('listChannels'),
        window.fetchData('listMembers'),
      ]);
      const activeChannels = (Array.isArray(chs) ? chs : []).filter(c => c.status !== "archived");
      const activeMembers = (Array.isArray(mems) ? mems : []).filter(m => !m.leftAt);
      setChannels(activeChannels);
      setMembers(activeMembers);
      // デフォルトチャンネル選択
      if (activeChannels.length > 0 && !activeChannelId) {
        setActiveChannelId(activeChannels[0].id);
      }
      // 注: 全チャネルプリフェッチは廃止 (起動時の負荷を抑える)
      // 必要に応じてユーザーが切り替えた時にキャッシュ経由で取得される
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { fetchInitial(); }, []);

  // ========== チャンネル別メッセージ取得 ==========

  async function fetchMessages(channelId, isInitial) {
    if (!channelId) return;
    try {
      const msgs = await window.fetchData('listMessages', {channelId});
      if (Array.isArray(msgs)) {
        // 差分マージ: 同じ内容なら更新しない (React の不要な再レンダ防止)
        setMessages(prev => mergeMessages(prev, msgs));
        setAllMessages(prev => ({...prev, [channelId]: msgs}));
        // 自動スクロール (初回のみ、メッセージがある場合のみ)
        if (isInitial && msgs.length > 0) {
          setTimeout(() => {
            if (messageEndRef.current) messageEndRef.current.scrollIntoView({behavior: 'auto'});
          }, 50);
        }
      }
    } catch (err) {
      // ポーリング失敗時はサイレント (既存メッセージを維持)
    }
  }

  /**
   * 既存メッセージとサーバー応答をマージする。
   * - 同じ ID のメッセージはサーバー版で上書き
   * - サーバーに無いが既存にあるメッセージ（送信直後の楽観的更新等）は保持
   * - 配列の中身が完璚に同じなら、参照そのものを返して再レンダ防止
   */
  function mergeMessages(prev, serverMsgs) {
    if (!Array.isArray(prev)) return serverMsgs;
    if (!Array.isArray(serverMsgs)) return prev;

    // 1. 中身完全一致チェック (再レンダ防止のため)
    if (prev.length === serverMsgs.length) {
      const sameOrder = prev.every((m, i) => m.id === serverMsgs[i].id && m.sentAt === serverMsgs[i].sentAt);
      if (sameOrder) return prev;   // 中身同じなら参照を変えない
    }

    // 2. 差分マージ: サーバーのメッセージ + ローカルにのみ存在するメッセージ
    const serverIds = new Set(serverMsgs.map(m => m.id));
    const localOnly = prev.filter(m => !serverIds.has(m.id));
    // 結合してから sentAt でソート
    const merged = [...serverMsgs, ...localOnly];
    merged.sort((a, b) => {
      const ta = new Date(a.sentAt).getTime() || 0;
      const tb = new Date(b.sentAt).getTime() || 0;
      return ta - tb;
    });
    return merged;
  }

  // チャンネル切替時の処理:
  // 1. キャッシュ (allMessages[channelId]) があれば即座に表示 (体感的な瞬時切替)
  // 2. バックグラウンドで fetchMessages を呼んで最新化
  useEffect(() => {
    if (!activeChannelId) {
      setMessages([]);
      setChannelLoading(false);
      return;
    }
    // キャッシュから即時表示 (前回ポーリングで取得済みのデータがあれば瞬時に表示)
    const cached = allMessages[activeChannelId];
    if (cached !== undefined) {
      // キャッシュあり (空配列でもOK = サーバーからメッセージなしと確認済み)
      setMessages(cached);
      setChannelLoading(false);
      // バックグラウンドで最新化
      fetchMessages(activeChannelId, false);
    } else {
      // キャッシュなし → ローディング状態にして取得
      setMessages([]);
      setChannelLoading(true);
      fetchMessages(activeChannelId, true).finally(() => setChannelLoading(false));
    }
  }, [activeChannelId]);

  /**
   * バックグラウンドポーリング: アクティブ以外のチャンネルだけ取得 (未読カウント用)。
   * アクティブチャンネルは fetchMessages で別途処理。
   */
  async function fetchBackgroundChannels() {
    if (channels.length === 0) return;
    const otherChannels = channels.filter(c => c.id !== activeChannelId);
    if (otherChannels.length === 0) return;
    try {
      const results = await Promise.all(
        otherChannels.map(c => window.fetchData('listMessages', {channelId: c.id}).catch(() => null))
      );
      setAllMessages(prev => {
        const updated = {...prev};
        otherChannels.forEach((c, i) => {
          if (Array.isArray(results[i])) updated[c.id] = results[i];
        });
        return updated;
      });
    } catch (err) {
      // サイレント
    }
  }

  // ポーリング: アクティブチャンネル 10秒、他チャンネル 30秒
  useEffect(() => {
    if (channels.length === 0 || !activeChannelId) return;

    // アクティブチャンネル: 10秒ごと
    const activeInterval = setInterval(() => {
      fetchMessages(activeChannelId, false);
    }, 10000);

    // 他チャンネル (未読カウント用): 30秒ごと
    const backgroundInterval = setInterval(() => {
      fetchBackgroundChannels();
    }, 30000);

    return () => {
      clearInterval(activeInterval);
      clearInterval(backgroundInterval);
    };
  }, [channels, activeChannelId]);

  // 未読カウント計算 (allMessages or readMap が変わったら再計算)
  useEffect(() => {
    if (!currentUserId || channels.length === 0) {
      setUnreadCounts({});
      return;
    }
    const counts = {};
    channels.forEach(c => {
      const msgs = allMessages[c.id] || [];
      const lastRead = readMap[`${currentUserId}__${c.id}`];
      if (!lastRead) {
        // 一度も読んでいないなら全部未読 (自分の発言は除く)
        counts[c.id] = msgs.filter(m => m.senderId !== currentUserId).length;
      } else {
        const lastReadIdx = msgs.findIndex(m => m.id === lastRead);
        if (lastReadIdx === -1) {
          // 読んだメッセージがログから消えている (削除されたなど) → 念のため0
          counts[c.id] = 0;
        } else {
          counts[c.id] = msgs.slice(lastReadIdx + 1).filter(m => m.senderId !== currentUserId).length;
        }
      }
    });
    setUnreadCounts(counts);
  }, [allMessages, readMap, currentUserId, channels]);

  // チャンネル切替 or メッセージ取得後、現在チャンネルを既読化
  useEffect(() => {
    if (!activeChannelId || !currentUserId) return;
    if (messages.length > 0) {
      const last = messages[messages.length - 1];
      setReadMap(prev => ({...prev, [`${currentUserId}__${activeChannelId}`]: last.id}));
    } else {
      // 空チャンネル: ダミーキーで「読んだ」フラグ
      setReadMap(prev => ({...prev, [`${currentUserId}__${activeChannelId}`]: 'EMPTY'}));
    }
  }, [activeChannelId, messages, currentUserId]);

  // ========== 自分宛メンション数 ==========

  const myMentions = (() => {
    if (!currentUserId) return 0;
    let count = 0;
    Object.entries(allMessages).forEach(([chId, msgs]) => {
      const lastRead = readMap[`${currentUserId}__${chId}`];
      const startIdx = lastRead ? (msgs.findIndex(m => m.id === lastRead) + 1) : 0;
      msgs.slice(startIdx).forEach(m => {
        if (m.mentions && m.mentions.includes(currentUserId) && m.senderId !== currentUserId) count++;
      });
    });
    return count;
  })();

  // ========== 送信処理 ==========

  async function handleSend() {
    if (!draft.trim()) return;
    if (!currentUserId) { window.toast.warn('送信者を選択してください'); return; }
    if (!activeChannelId) { window.toast.warn('チャンネルを選択してください'); return; }
    setSending(true);
    try {
      const result = await window.postData('createMessage', {
        channelId: activeChannelId,
        senderId: currentUserId,
        body: draft.trim(),
        mentions: draftMentions,
      });
      // 即座に画面反映 (送信した自分のメッセージは即時表示)
      if (result && result.message) {
        setMessages(prev => mergeMessages(prev, [...prev, result.message]));
        setAllMessages(prev => ({
          ...prev,
          [activeChannelId]: [...(prev[activeChannelId] || []), result.message]
        }));
      }
      setDraft("");
      setDraftMentions([]);
      // 末尾にスクロール
      setTimeout(() => {
        if (messageEndRef.current) messageEndRef.current.scrollIntoView({behavior: 'smooth'});
      }, 50);
    } catch (err) {
      window.toast.error('送信に失敗しました: ' + err.message);
    } finally {
      setSending(false);
    }
  }

  async function handleDeleteMessage(msgId) {
    if (!await window.confirmDialog({
      title: 'メッセージを削除しますか?',
      body: '物理削除されます。元に戻せません。',
      danger: true,
      confirmLabel: '削除',
    })) return;
    try {
      await window.postData('deleteMessage', {messageId: msgId});
      setMessages(prev => prev.filter(m => m.id !== msgId));
      setAllMessages(prev => ({
        ...prev,
        [activeChannelId]: (prev[activeChannelId] || []).filter(m => m.id !== msgId)
      }));
      window.toast.success('削除しました');
    } catch (err) {
      window.toast.error('削除に失敗しました: ' + err.message);
    }
  }

  // ========== メンション処理 ==========

  function handleDraftChange(e) {
    const value = e.target.value;
    setDraft(value);

    // カーソル位置の直前を見て @ なら候補を表示
    const cursorPos = e.target.selectionStart;
    const before = value.substring(0, cursorPos);
    const m = before.match(/@(\S*)$/);
    if (m) {
      setMentionPopup({query: m[1].toLowerCase(), startPos: cursorPos - m[0].length});
    } else {
      setMentionPopup(null);
    }
  }

  function applyMention(member) {
    if (!mentionPopup) return;
    const before = draft.substring(0, mentionPopup.startPos);
    const after = draft.substring(inputRef.current ? inputRef.current.selectionStart : draft.length);
    const newDraft = `${before}@${member.name} ${after}`;
    setDraft(newDraft);
    setDraftMentions(prev => prev.includes(member.id) ? prev : [...prev, member.id]);
    setMentionPopup(null);
    setTimeout(() => {
      if (inputRef.current) {
        inputRef.current.focus();
        const pos = before.length + member.name.length + 2;   // @ + name + space
        inputRef.current.setSelectionRange(pos, pos);
      }
    }, 10);
  }

  const mentionCandidates = mentionPopup
    ? members.filter(m => m.name.toLowerCase().includes(mentionPopup.query) || (m.email || '').toLowerCase().includes(mentionPopup.query)).slice(0, 5)
    : [];

  // ========== チャンネル管理 ==========

  async function handleCreateChannel(payload) {
    try {
      await window.postData('createChannel', payload);
      window.toast.success('チャンネルを作成しました');
      setEditingChannel(null);
      await fetchInitial();
    } catch (err) {
      window.toast.error('作成に失敗: ' + err.message);
    }
  }

  async function handleUpdateChannel(channelId, payload) {
    try {
      await window.postData('updateChannel', {channelId, fields: payload});
      window.toast.success('更新しました');
      setEditingChannel(null);
      await fetchInitial();
    } catch (err) {
      window.toast.error('更新に失敗: ' + err.message);
    }
  }

  async function handleArchiveChannel(channelId, name) {
    if (!await window.confirmDialog({
      title: `#${name} をアーカイブしますか?`,
      body: 'チャンネルが非表示になります。メッセージは残ります。',
      danger: true,
      confirmLabel: 'アーカイブ',
    })) return;
    try {
      await window.postData('deleteChannel', {channelId});
      if (activeChannelId === channelId) setActiveChannelId("");
      window.toast.success('アーカイブしました');
      await fetchInitial();
    } catch (err) {
      window.toast.error('失敗: ' + err.message);
    }
  }

  // ========== 表示用補助 ==========

  const activeChannel = channels.find(c => c.id === activeChannelId);
  const currentMember = members.find(m => m.id === currentUserId);

  function formatTime(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    if (isNaN(d.getTime())) return '';
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toTimeString().substring(0, 5);
    }
    return `${d.getMonth() + 1}/${d.getDate()} ${d.toTimeString().substring(0, 5)}`;
  }

  // メッセージ本文の @memberName をハイライト
  function renderBody(msg) {
    if (!msg.mentions || msg.mentions.length === 0) return msg.body;
    let body = msg.body;
    // 自分宛メンションのみ強調
    const isMyMention = msg.mentions.includes(currentUserId);
    if (isMyMention) {
      // 簡単に: @の後ろの文字をハイライト
      const parts = body.split(/(@\S+)/g);
      return parts.map((p, i) => {
        if (p.startsWith('@')) {
          return <span key={i} style={{background:'var(--coral-50)',color:'var(--coral)',padding:'1px 4px',borderRadius:3,fontWeight:600}}>{p}</span>;
        }
        return p;
      });
    }
    return body;
  }

  return (
    <div className="page" data-page="chat" style={{padding:0,maxWidth:'none',height:'calc(100vh - 52px)',display:'flex',flexDirection:'column'}}>
      {/* ヘッダー: 現在のユーザー選択 */}
      <div style={{padding:"10px 20px",borderBottom:'1px solid var(--line)',background:'var(--white)',display:'flex',alignItems:'center',gap:14}}>
        <div style={{flex:1}}>
          <div style={{fontFamily:'var(--serif)',fontSize:22,letterSpacing:'-.015em'}}>チャット</div>
          <div style={{fontSize:11,color:'var(--ink4)'}}>運営メンバー間の連絡。10秒ごとに自動更新。</div>
        </div>
        {myMentions > 0 && (
          <div style={{padding:'6px 10px',background:'var(--coral-50)',color:'var(--coral)',borderRadius:8,fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
            <Icon n="bell" s={14}/>
            自分宛 {myMentions} 件
          </div>
        )}
        {currentUserName && (
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',background:'var(--bg2)',borderRadius:8,fontSize:12}}>
            <Icon n="user" s={14}/>
            <span>送信者: <b>{currentUserName}</b></span>
          </div>
        )}
      </div>

      {error && <div style={{padding:"10px 20px",background:'var(--red-50)',color:'var(--red)',fontSize:12}}><b>エラー:</b> {error}</div>}

      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* チャンネル一覧サイドバー */}
        <div style={{width:240,borderRight:'1px solid var(--line)',background:'var(--white)',display:'flex',flexDirection:'column'}}>
          <div style={{padding:"10px 14px",borderBottom:'1px solid var(--line)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',letterSpacing:'.1em'}}>CHANNELS</div>
            {window.canDo('channels.create') && (
              <button className="btn btn-soft btn-sm btn-icon" onClick={()=>setEditingChannel({mode:'create', values:{}})} title="チャンネル作成"><Icon n="plus" s={12}/></button>
            )}
          </div>
          <div style={{flex:1,overflowY:'auto',padding:"6px 6px"}}>
            {channels.length === 0 ? (
              <div style={{padding:14,fontSize:11,color:'var(--ink5)',textAlign:'center'}}>{loading ? '読み込み中…' : 'チャンネルがありません'}</div>
            ) : channels.map(c => {
              const isActive = c.id === activeChannelId;
              const unread = unreadCounts[c.id] || 0;
              return (
                <div key={c.id}
                  onClick={()=>setActiveChannelId(c.id)}
                  onMouseEnter={(e)=>{
                    if (!isActive) e.currentTarget.style.background = 'var(--bg2)';
                  }}
                  onMouseLeave={(e)=>{
                    if (!isActive) e.currentTarget.style.background = 'transparent';
                  }}
                  style={{
                    padding:'6px 10px',marginBottom:2,borderRadius:6,cursor:'pointer',
                    background: isActive ? `var(--${c.color}-50)` : 'transparent',
                    color: isActive ? `var(--${c.color})` : 'var(--ink2)',
                    fontWeight: isActive ? 600 : 500,
                    display:'flex',alignItems:'center',gap:6,fontSize:13,
                    transition: 'background-color 80ms ease',
                    userSelect: 'none',
                  }}>
                  <span style={{color:`var(--${c.color})`,fontWeight:700}}>#</span>
                  <span style={{flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</span>
                  {unread > 0 && (
                    <span style={{background:'var(--coral)',color:'white',borderRadius:8,padding:'1px 6px',fontSize:10,fontWeight:700,minWidth:16,textAlign:'center'}}>
                      {unread > 99 ? '99+' : unread}
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* メッセージエリア */}
        <div style={{flex:1,display:'flex',flexDirection:'column',background:'var(--bg)'}}>
          {!activeChannel ? (
            <div className="empty" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
              <Icon n="chat" s={32}/>
              <div style={{fontSize:13,marginTop:8}}>チャンネルを選択してください</div>
            </div>
          ) : (
            <>
              {/* チャンネルヘッダー */}
              <div style={{padding:"12px 20px",borderBottom:'1px solid var(--line)',background:'var(--white)',display:'flex',alignItems:'center',gap:14}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:'var(--serif)',fontSize:18,letterSpacing:'-.015em',color:`var(--${activeChannel.color})`}}>
                    # {activeChannel.name}
                  </div>
                  {activeChannel.desc && <div style={{fontSize:11,color:'var(--ink4)',marginTop:2}}>{activeChannel.desc}</div>}
                </div>
                {window.canDo('channels.update') && (
                  <button className="btn btn-soft btn-sm" onClick={()=>setEditingChannel({mode:'edit', values:activeChannel})}>
                    <Icon n="edit" s={12}/> 編集
                  </button>
                )}
                {channels.length > 1 && window.canDo('channels.delete') && (
                  <button className="btn btn-soft btn-sm" onClick={()=>handleArchiveChannel(activeChannel.id, activeChannel.name)} style={{color:'var(--coral)'}}>
                    <Icon n="trash" s={12}/>
                  </button>
                )}
              </div>

              {/* メッセージリスト */}
              <div style={{flex:1,overflowY:'auto',padding:"14px 20px"}}>
                {channelLoading ? (
                  <div className="empty" style={{padding:'40px 20px',display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                    <Spinner/>
                    <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>メッセージを読み込み中…</div>
                  </div>
                ) : messages.length === 0 ? (
                  <div className="empty" style={{padding:'40px 20px'}}>
                    <Icon n="chat" s={24}/>
                    <div style={{fontSize:13,marginTop:8}}>まだメッセージがありません</div>
                    <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>最初のメッセージを送信してみましょう</div>
                  </div>
                ) : messages.map((msg, i) => {
                  const isMine = msg.senderId === currentUserId;
                  const prevMsg = i > 0 ? messages[i-1] : null;
                  const sameSender = prevMsg && prevMsg.senderId === msg.senderId &&
                                    (new Date(msg.sentAt).getTime() - new Date(prevMsg.sentAt).getTime() < 5*60*1000);
                  const isMention = msg.mentions && msg.mentions.includes(currentUserId);
                  return (
                    <div key={msg.id} style={{
                      marginBottom: sameSender ? 2 : 12,
                      padding:'4px 8px',
                      borderRadius:6,
                      background: isMention ? 'var(--coral-50)' : 'transparent',
                    }}>
                      {!sameSender && (
                        <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:2}}>
                          <span style={{fontWeight:700,fontSize:13,color:'var(--ink)'}}>{msg.senderName || '不明'}</span>
                          <span style={{fontSize:10.5,color:'var(--ink4)',fontFamily:'var(--mono)'}}>{formatTime(msg.sentAt)}</span>
                          {isMention && <span style={{fontSize:10,color:'var(--coral)',fontWeight:600}}>@自分宛</span>}
                        </div>
                      )}
                      <div style={{display:'flex',alignItems:'flex-start',gap:8,fontSize:13,lineHeight:1.5,color:'var(--ink2)',whiteSpace:'pre-wrap'}}>
                        <div style={{flex:1,wordBreak:'break-word'}}>{renderBody(msg)}</div>
                        {(isMine || window.canDo('chat.deleteOthers')) && (
                          <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>handleDeleteMessage(msg.id)} style={{opacity:0.4}} title={isMine ? "削除" : "削除 (管理者権限)"}>
                            <Icon n="trash" s={11}/>
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
                <div ref={messageEndRef}></div>
              </div>

              {/* 入力エリア */}
              <div style={{padding:14,background:'var(--white)',borderTop:'1px solid var(--line)',position:'relative'}}>
                {mentionPopup && mentionCandidates.length > 0 && (
                  <div style={{position:'absolute',bottom:'100%',left:14,right:14,background:'white',border:'1px solid var(--line)',borderRadius:8,boxShadow:'0 -4px 12px rgba(0,0,0,0.08)',marginBottom:6,maxHeight:200,overflowY:'auto'}}>
                    {mentionCandidates.map(m => (
                      <div key={m.id} onClick={()=>applyMention(m)} style={{padding:'8px 12px',cursor:'pointer',display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid var(--line)'}}
                        onMouseEnter={(e)=>e.currentTarget.style.background='var(--bg2)'}
                        onMouseLeave={(e)=>e.currentTarget.style.background='white'}>
                        <div style={{width:24,height:24,borderRadius:6,background:`var(--${m.accent || 'indigo'}-50)`,color:`var(--${m.accent || 'indigo'})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>{m.initial || m.name.charAt(0)}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600}}>{m.name}</div>
                          <div style={{fontSize:11,color:'var(--ink4)'}}>{m.dept || '—'}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{border:'1px solid var(--line2)',borderRadius:10,padding:10,background:'var(--white)'}}>
                  <textarea
                    ref={inputRef}
                    style={{border:'none',outline:'none',width:'100%',fontSize:13,padding:'4px 2px',resize:'none',fontFamily:'inherit',background:'transparent'}}
                    rows={2}
                    placeholder={currentUserId ? `# ${activeChannel.name} にメッセージ... (@でメンション)` : '送信者を上で選択してください'}
                    value={draft}
                    onChange={handleDraftChange}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                        e.preventDefault();
                        handleSend();
                      }
                      if (e.key === 'Escape') setMentionPopup(null);
                    }}
                    disabled={!currentUserId || sending}/>
                  <div style={{display:'flex',gap:4,alignItems:'center',marginTop:6}}>
                    <span style={{fontSize:10,color:'var(--ink4)'}}>
                      {currentMember && <>送信者: <b>{currentMember.name}</b> · </>}
                      Cmd/Ctrl + Enter で送信
                      {draftMentions.length > 0 && <> · メンション {draftMentions.length}人</>}
                    </span>
                    <div style={{flex:1}}></div>
                    <button className="btn btn-indigo btn-sm" onClick={handleSend} disabled={!draft.trim() || sending || !currentUserId}>
                      <Icon n="send" s={12}/> {sending ? '送信中…' : '送信'}
                    </button>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      </div>

      {editingChannel && (
        <ChannelModal
          mode={editingChannel.mode}
          initialValues={editingChannel.values}
          onSave={editingChannel.mode === 'create' ? handleCreateChannel : (payload => handleUpdateChannel(editingChannel.values.id, payload))}
          onCancel={()=>setEditingChannel(null)}
        />
      )}
    </div>
  );
}

/**
 * チャンネル作成・編集モーダル。
 */
function ChannelModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [name, setName] = useState(init.name || "");
  const [desc, setDesc] = useState(init.desc || "");
  const [color, setColor] = useState(init.color || "indigo");
  const [dept, setDept] = useState(init.dept || "");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!name.trim()) { setError("チャンネル名は必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({name: name.trim(), desc: desc.trim(), color, dept});
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:480,maxWidth:'94%'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="chat" s={16}/> {mode === "create" ? "チャンネルを作成" : "チャンネルを編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="field">
            <label className="field-label">チャンネル名 <span className="field-req">*</span></label>
            <input className="input input-lg" value={name} onChange={e=>setName(e.target.value.replace(/\s/g,'-'))} placeholder="例: ift-2026spring"/>
            <div className="field-hint">小文字・ハイフン推奨。スペースは自動で - に変換</div>
          </div>
          <div className="field">
            <label className="field-label">説明</label>
            <input className="input" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="このチャンネルの目的"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">カラー</label>
              <div className="select-wrap">
                <select className="input select" value={color} onChange={e=>setColor(e.target.value)}>
                  <option value="indigo">Indigo (青)</option>
                  <option value="coral">Coral (赤)</option>
                  <option value="teal">Teal (青緑)</option>
                  <option value="violet">Violet (紫)</option>
                  <option value="amber">Amber (黄)</option>
                  <option value="green">Green (緑)</option>
                </select>
              </div>
            </div>
            <div className="field">
              <label className="field-label">紐付け部署 (任意)</label>
              <div className="select-wrap">
                <select className="input select" value={dept} onChange={e=>setDept(e.target.value)}>
                  <option value="">未指定</option>
                  <option>運営本部</option>
                  <option>IFT</option>
                  <option>community</option>
                  <option>hub</option>
                  <option>order made</option>
                  <option>広報班</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving}>
            {saving ? '保存中…' : (mode === "create" ? '作成' : '更新')}
          </button>
        </div>
      </div>
    </div>
  );
}

/**
 * テンプレート作成・編集モーダル。
 */
function TemplateModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [name, setName] = useState(init.name || "");
  const [category, setCategory] = useState(init.category || "メール");
  const [body, setBody] = useState(init.body || "");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!name.trim()) { setError("名称は必須です"); return; }
    if (!category) { setError("カテゴリは必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({ name: name.trim(), category, body });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:600,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="file" s={16}/> {mode === "create" ? "テンプレートを作成" : "テンプレートを編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">名称 <span className="field-req">*</span></label>
              <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="例: 申込確認メール"/>
            </div>
            <div className="field">
              <label className="field-label">カテゴリ <span className="field-req">*</span></label>
              <div className="select-wrap">
                <select className="input select" value={category} onChange={e=>setCategory(e.target.value)}>
                  <option>メール</option>
                  <option>SNS</option>
                  <option>チャット</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">本文</label>
            <textarea className="input" style={{height:200,padding:12,resize:'vertical',fontFamily:'var(--mono)',fontSize:12}} value={body} onChange={e=>setBody(e.target.value)} placeholder="テンプレート本文を入力..."/>
            <div className="field-hint">変数置換 {`{{name}}`} {`{{event}}`} 等に対応</div>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving}>
            {saving ? '保存中…' : (mode === "create" ? '作成' : '更新')}
          </button>
        </div>
      </div>
    </div>
  );
}

function PageTemplates(){
  const [templates, setTemplates] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("all");
  const [query, setQuery] = useState("");
  const [modalMode, setModalMode] = useState(null);
  const [editingT, setEditingT] = useState(null);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listTemplates');
        if (!cancelled) setTemplates(Array.isArray(data) ? data : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  async function handleSave(fields) {
    if (modalMode === "create") {
      await window.postData('createTemplate', fields);
    } else if (modalMode === "edit" && editingT) {
      await window.postData('updateTemplate', { tplId: editingT.id, fields });
    }
    window.location.reload();
  }

  async function handleDelete(tplId) {
    const t = templates.find(x => x.id === tplId);
    if (!t) return;
    if (!await window.confirmDialog({title:`「${t.name}」を削除しますか?`, body:'物理削除されます。元に戻せません。', danger:true, confirmLabel:'削除'})) return;
    setTemplates(prev => prev.filter(x => x.id !== tplId));
    try {
      await window.postData('deleteTemplate', { tplId });
    } catch (err) {
      window.location.reload();
    }
  }

  const visible = templates.filter(t => {
    if (filter !== "all" && t.category !== filter) return false;
    if (query) {
      const q = query.toLowerCase();
      return (t.name || '').toLowerCase().includes(q) || (t.preview || '').toLowerCase().includes(q);
    }
    return true;
  });

  return (
    <div className="page" data-page="templates">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>コミュニケーション</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>定型文</span></div>
          <h1>定型文 <i>ライブラリ</i></h1>
          <div className="ph-sub">メール・SNS・チャットのテンプレートを集約管理。</div>
        </div>
        <div className="ph-right">
          {window.canDo('templates.create') && (
            <button className="btn btn-indigo" onClick={()=>{setEditingT(null); setModalMode("create");}}>
              <Icon n="plus" s={14}/> 新規作成
            </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="row mb16">
        {[["all","すべて"],["メール","メール"],["SNS","SNS"],["チャット","チャット"]].map(([k,l]) => (
          <div key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>{l}</div>
        ))}
        <div style={{flex:1}}></div>
        <div className="search-bar" style={{width:260}}>
          <Icon n="search" s={14}/><input className="input" placeholder="検索..." value={query} onChange={e=>setQuery(e.target.value)}/>
        </div>
      </div>

      {!loading && visible.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 40px'}}>
            <Icon n="file" s={28}/>
            <div style={{fontFamily:'var(--serif)',fontSize:20,marginTop:6,color:'var(--ink2)'}}>
              {templates.length === 0 ? 'テンプレートがまだありません' : '該当するテンプレートがありません'}
            </div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>

            </div>
          </div>
        </div>
      ) : (
        <div className="grid-3">
          {visible.map(t => (

                  <div style={{display:'flex',gap:4}}>
                    {window.canDo('templates.update') && <button className="btn btn-soft btn-sm btn-icon" title="編集" onClick={(ev)=>{ev.stopPropagation(); setEditingT(t); setModalMode("edit");}}><Icon n="edit" s={11}/></button>}
                    {window.canDo('templates.delete') && <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={(ev)=>{ev.stopPropagation(); handleDelete(t.id);}}><Icon n="trash" s={11}/></button>}
                  </div>
                </div>
                <div style={{fontFamily:'var(--serif)',fontSize:18,letterSpacing:'-.015em',marginBottom:6}}>{t.name}</div>
                <div style={{fontSize:12,color:'var(--ink3)',lineHeight:1.6,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden',minHeight:58}}>{t.preview || '(本文なし)'}</div>
                <div className="row between mt12" style={{paddingTop:10,borderTop:'1px dashed var(--line)',fontSize:11,color:'var(--ink4)'}}>
                  <span>{t.uses || 0}回 使用</span>
                  <span className="mono">{t.updatedAt || '—'}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {modalMode && (
        <TemplateModal
          mode={modalMode}
          initialValues={modalMode === "edit" ? editingT : null}
          onSave={handleSave}
          onCancel={()=>{setModalMode(null); setEditingT(null);}}
        />
      )}
    </div>
  );
}

/**
 * 参加者作成・編集モーダル。
 * mode: "create" | "edit"
 * initialValues: 編集時の既存値 (createなら null)
 * onSave(fields): 保存ハンドラ
 * onCancel(): 閉じるハンドラ
 */
function ParticipantModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [name, setName] = useState(init.name || "");
  const [kana, setKana] = useState(init.kana || "");
  const [email, setEmail] = useState(init.email || "");
  const [age, setAge] = useState(init.age ? String(init.age) : "");
  const [gender, setGender] = useState(init.gender || "");
  const [dept, setDept] = useState(init.dept || "");
  const [tagsInput, setTagsInput] = useState((init.tags || []).join(", "));
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!name.trim() || !kana.trim() || !email.trim()) {
      setError("氏名、カナ、メールは必須です");
      return;
    }
    setSaving(true);
    setError(null);
    const tags = tagsInput.split(',').map(t => t.trim()).filter(Boolean);
    const fields = {
      name: name.trim(),
      kana: kana.trim(),
      email: email.trim(),
      age: Number(age) || 0,
      gender: gender,
      dept: dept,
      tags: tags,
    };
    try {
      await onSave(fields);
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:520,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title">
            <Icon n="user" s={16}/>
            {mode === "create" ? "参加者を追加" : "参加者を編集"}
          </div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel} title="閉じる"><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && (
            <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>
              {error}
            </div>
          )}
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">氏名 <span className="field-req">*</span></label>
              <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="例: 田中 陽子"/>
            </div>
            <div className="field">
              <label className="field-label">カナ <span className="field-req">*</span></label>
              <input className="input" value={kana} onChange={e=>setKana(e.target.value)} placeholder="例: タナカ ヨウコ"/>
            </div>
          </div>
          <div className="field">
            <label className="field-label">メール <span className="field-req">*</span></label>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@example.com"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">年齢</label>
              <input className="input" type="number" min="0" max="150" value={age} onChange={e=>setAge(e.target.value)}/>
            </div>
            <div className="field">
              <label className="field-label">性別</label>
              <div className="select-wrap">
                <select className="input select" value={gender} onChange={e=>setGender(e.target.value)}>
                  <option value="">未指定</option>
                  <option value="女性">女性</option>
                  <option value="男性">男性</option>
                  <option value="その他">その他</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">所属</label>
            <div className="select-wrap">
              <select className="input select" value={dept} onChange={e=>setDept(e.target.value)}>
                <option value="">未指定</option>
                <option value="運営本部">運営本部</option>
                <option value="IFT班">IFT班</option>
                <option value="hub班">hub班</option>
                <option value="community班">community班</option>
                <option value="order made班">order made班</option>
                <option value="広報班">広報班</option>
                <option value="一般参加者">一般参加者</option>
              </select>
            </div>
          </div>
          <div className="field">
            <label className="field-label">タグ (カンマ区切り)</label>
            <input className="input" value={tagsInput} onChange={e=>setTagsInput(e.target.value)} placeholder="例: 常連, リーダー"/>

        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving}>
            {saving ? '保存中…' : (mode === "create" ? '追加' : '更新')}
          </button>
        </div>
      </div>
    </div>
  );
}

function PageParticipants(){
  const [sel, setSel] = useState(null);
  const [filter, setFilter] = useState("全員");
  const [query, setQuery] = useState("");

  // データ層: 初期は空配列、マウント時に API から取得
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  // モーダル制御
  const [modalMode, setModalMode] = useState(null);   // null | "create" | "edit"
  const [editingP, setEditingP] = useState(null);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listParticipants');
        if (!cancelled) setParticipants(Array.isArray(data) ? data : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // 作成 / 編集の保存ハンドラ
  async function handleSave(fields) {
    if (modalMode === "create") {
      await window.postData('createParticipant', fields);
    } else if (modalMode === "edit" && editingP) {
      await window.postData('updateParticipant', { userId: editingP.id, fields });
    }
    // 成功 → リロードで一覧を再取得 (確実)
    window.location.reload();
  }

  // 削除 (論理削除)
  async function handleDelete(userId) {
    const p = participants.find(x => x.id === userId);
    if (!p) return;
    if (!await window.confirmDialog({title:`「${p.name}」をアーカイブしますか?`, body:'行は残り、ステータスが「アーカイブ」に変わります。後で復元できます。', danger:true, confirmLabel:'アーカイブ'})) return;

    // 楽観的UI更新
    setParticipants(prev => prev.map(x => x.id === userId ? {...x, status: 'アーカイブ'} : x));

    try {
      await window.postData('deleteParticipant', { userId });
    } catch (err) {
      // 失敗したら元に戻す
      setParticipants(prev => prev.map(x => x.id === userId ? {...x, status: p.status} : x));
      window.toast.error('削除に失敗しました: ' + err.message);
    }
  }

  // フィルタ済み参加者リスト
  const visible = participants.filter(p => {
    // ステータスフィルタ (タブ)
    if (filter === "全員") {
      // デフォルトはアーカイブ非表示
      if (p.status === "アーカイブ") return false;
    } else if (filter === "アーカイブ") {
      if (p.status !== "アーカイブ") return false;
    } else if (filter === "リーダー" && !(p.tags || []).includes("リーダー")) return false;
    else if (filter === "新規" && !(p.tags || []).includes("新規")) return false;
    else if (filter === "常連" && !(p.tags || []).includes("常連")) return false;

    // 検索
    if (query) {
      const q = query.toLowerCase();
      if (!(p.name || '').toLowerCase().includes(q) && !(p.email || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const activeCount = participants.filter(p => p.status !== "アーカイブ").length;
  const archivedCount = participants.filter(p => p.status === "アーカイブ").length;
  const leaderCount = participants.filter(p => (p.tags || []).includes("リーダー") && p.status !== "アーカイブ").length;
  const newCount = participants.filter(p => (p.tags || []).includes("新規") && p.status !== "アーカイブ").length;

  return (
    <div className="page" data-page="participants">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>参加者</span></div>
          <h1>参加者 <i>データベース</i></h1>
          <div className="ph-sub">セグメント作成、タグ管理、履歴閲覧。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost"><Icon n="download" s={14}/> CSV</button>
          {window.canDo('participants.create') && (
            <button className="btn btn-indigo" onClick={()=>{setEditingP(null); setModalMode("create");}}>
              <Icon n="plus" s={14}/> 手動追加
            </button>
          )}
        </div>
      </div>

      {error && (
        <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}>
          <b>読み込みエラー:</b> {error}
        </div>
      )}

      <div className="kpi-grid">
        <MiniStat label="総参加者 (在籍)" value={loading ? '…' : String(activeCount)} sub="" icon="users" color="indigo"/>
        <MiniStat label="リーダー" value={loading ? '…' : String(leaderCount)} sub="" icon="star" color="coral"/>
        <MiniStat label="新規" value={loading ? '…' : String(newCount)} sub="" icon="sparkle" color="green"/>
        <MiniStat label="アーカイブ" value={loading ? '…' : String(archivedCount)} sub="" icon="clock" color="amber"/>
      </div>

      <div className="grid-ab">
        <div className="card">
          <div className="card-head">
            <div className="row" style={{gap:4,flexWrap:'wrap'}}>
              {["全員","常連","新規","リーダー","アーカイブ"].map(k => (
                <span key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>{k}</span>
              ))}
            </div>
            <div className="search-bar" style={{width:240}}>
              <Icon n="search" s={14}/><input className="input" placeholder="名前・メール..." value={query} onChange={e=>setQuery(e.target.value)}/>
            </div>
          </div>
          {!loading && visible.length === 0 ? (
            <div className="empty" style={{padding:'60px 40px'}}>
              <Icon n="users" s={28}/>
              <div style={{fontFamily:'var(--serif)',fontSize:18,marginTop:6,color:'var(--ink2)'}}>
                {participants.length === 0 ? '参加者がまだいません' : '該当する参加者がありません'}
              </div>
              <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
                {participants.length === 0 ? '右上の「手動追加」から最初の参加者を登録できます' : '別のフィルタやキーワードでお試しください'}
              </div>
            </div>
          ) : (
            <table className="tbl">
              <thead><tr>
                <th style={{width:32}}><span className="ck"></span></th>
                <th>名前</th><th>所属</th><th>タグ</th>
                <th className="right">参加数</th><th className="right">スコア</th><th>最終参加</th>
              </tr></thead>
              <tbody>
                {visible.map((p, i) => (
                  <tr key={p.id} onClick={()=>setSel(p)} style={{cursor:'pointer', opacity: p.status === "アーカイブ" ? 0.5 : 1}}
                    className={sel?.id===p.id ? "sel" : ""}>
                    <td><span className="ck"></span></td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div className={`avatar ${["indigo","coral","green","violet","teal","amber","red","violet"][i%8]}`}>{(p.name || '?')[0]}</div>
                        <div>
                          <div style={{fontWeight:600}}>{p.name}</div>
                          <div style={{fontSize:11,color:'var(--ink4)'}}>{p.kana}{p.age ? ` · ${p.age}歳` : ''}</div>
                        </div>
                      </div>
                    </td>
                    <td style={{fontSize:12}}>{p.dept || '—'}</td>
                    <td>
                      <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                        {(p.tags || []).map(t => <span key={t} className="badge badge-ink">{t}</span>)}
                      </div>
                    </td>
                    <td className="right num">{p.events || 0}</td>
                    <td className="right">
                      <div style={{display:'inline-flex',alignItems:'center',gap:6}}>
                        <span className="mono" style={{fontWeight:700,color:p.score>=90?'var(--green)':p.score>=70?'var(--indigo)':'var(--ink3)'}}>{p.score || 0}</span>
                        <div className="bar" style={{width:40,height:4}}>
                          <div className="bar-fill" style={{width:(p.score || 0)+"%",background:p.score>=90?'var(--green)':'var(--indigo)'}}></div>
                        </div>
                      </div>
                    </td>
                    <td className="mono" style={{fontSize:11,color:'var(--ink3)'}}>{p.lastJoin || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        {(sel || visible[0]) ? (
          <ParticipantDetail
            p={sel || visible[0]}
            onEdit={(p)=>{setEditingP(p); setModalMode("edit");}}
            onDelete={handleDelete}
          />
        ) : (
          <div className="card">
            <div className="empty">
              <Icon n="user" s={28}/>
              <div>参加者を選択してください</div>
              <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>テーブルから行をクリックすると詳細が表示されます</div>
            </div>
          </div>
        )}
      </div>

      {modalMode && (
        <ParticipantModal
          mode={modalMode}
          initialValues={modalMode === "edit" ? editingP : null}
          onSave={handleSave}
          onCancel={()=>{setModalMode(null); setEditingP(null);}}
        />
      )}
    </div>
  );
}

/**
 * Todo 作成モーダル。
 */
function TodoModal({events, onSave, onCancel}){
  const [task, setTask] = useState("");
  const [deadline, setDeadline] = useState("");
  const [priority, setPriority] = useState("中");
  const [assignee, setAssignee] = useState("");
  const [eventId, setEventId] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!task.trim()) {
      setError("タスク名は必須です");
      return;
    }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        task: task.trim(),
        deadline: deadline,
        priority: priority,
        assignee: assignee.trim(),
        eventId: eventId,
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

function PageTodo(){
  const [todos, setTodos] = useState([]);
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [showModal, setShowModal] = useState(false);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [tds, evs] = await Promise.all([
          window.fetchData('listTodos'),
          window.fetchData('listEvents'),
        ]);
        if (cancelled) return;
        setTodos(Array.isArray(tds) ? tds : []);
        setEvents(Array.isArray(evs) ? evs : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  async function handleSave(fields) {
    await window.postData('createTodo', fields);
    window.location.reload();
  }

  // 完了/未完了の切替 (楽観的UI更新)
  async function toggle(id) {
    const t = todos.find(x => x.id === id);
    if (!t) return;
    const newDone = !t.done;
    setTodos(prev => prev.map(x => x.id === id ? {...x, done: newDone} : x));
    try {
      await window.postData('toggleTodo', { todoId: id });
    } catch (err) {
      setTodos(prev => prev.map(x => x.id === id ? {...x, done: !newDone} : x));
      window.toast.error('更新に失敗しました: ' + err.message);
    }
  }

  // 削除 (物理削除)
  async function handleDelete(id) {
    const t = todos.find(x => x.id === id);
    if (!t) return;
    if (!await window.confirmDialog({title:`「${t.task}」を削除しますか?`, body:'Todoは物理削除されます。元に戻せません。', danger:true, confirmLabel:'削除'})) return;

    setTodos(prev => prev.filter(x => x.id !== id));
    try {
      await window.postData('deleteTodo', { todoId: id });
    } catch (err) {
      // 失敗したら元に戻す（再ロード）
      window.location.reload();
    }
  }

  const groups = {高:[], 中:[], 低:[]};
  todos.filter(t => !t.done).forEach(t => {
    const pri = ['高','中','低'].includes(t.priority) ? t.priority : '中';
    groups[pri].push(t);
  });
  const done = todos.filter(t => t.done);

  return (
    <div className="page" data-page="todo">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>Todo</span></div>
          <h1>Todo <i>ボード</i></h1>
          <div className="ph-sub">優先度別の運営タスク。イベント紐付け、担当者アサイン可能。</div>
        </div>
        <div className="ph-right">
          <div className="chip on">リスト</div>
          <div className="chip" style={{opacity:0.5}}>カンバン</div>
          {window.canDo('todos.create') && (
          <button className="btn btn-indigo" onClick={()=>setShowModal(true)}>
            <Icon n="plus" s={14}/> タスク追加
          </button>
          )}
        </div>
      </div>

      {error && (
        <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}>
          <b>読み込みエラー:</b> {error}
        </div>
      )}

      {!loading && todos.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 40px'}}>
            <Icon n="check2" s={28}/>
            <div style={{fontFamily:'var(--serif)',fontSize:20,marginTop:6,color:'var(--ink2)'}}>
              タスクがまだありません
            </div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
              右上の「タスク追加」ボタンから最初のタスクを登録できます
            </div>
          </div>
        </div>
      ) : (
        <div className="grid-3">
          {[["高","coral"],["中","indigo"],["低","teal"]].map(([pri, c]) => (
            <div key={pri} className="card">
              <div className="card-head">
                <div className="row" style={{gap:8}}>
                  <span style={{width:8,height:8,borderRadius:2,background:`var(--${c})`}}></span>
                  <div className="card-title">優先度 {pri}</div>
                  <span className="badge badge-ink">{groups[pri].length}</span>
                </div>
                {window.canDo('todos.create') && <button className="btn btn-soft btn-sm btn-icon" onClick={()=>setShowModal(true)}><Icon n="plus" s={12}/></button>}
              </div>
              <div className="card-body stack" style={{gap:8,minHeight:120}}>
                {groups[pri].length === 0 && !loading && (
                  <div style={{padding:'30px 14px',textAlign:'center',color:'var(--ink5)',fontSize:11}}>
                    タスクなし
                  </div>
                )}
                {groups[pri].map(t => (
                  <div key={t.id} style={{padding:12,border:'1px solid var(--line)',borderRadius:10,background:'var(--white)'}}>
                    <div className="row" style={{gap:8,marginBottom:8}}>
                      <span className="ck" onClick={()=>toggle(t.id)} style={{cursor:'pointer'}}></span>
                      <span style={{fontSize:12.5,flex:1,fontWeight:500,lineHeight:1.5}}>{t.task}</span>
                      {window.canDo('todos.delete') && (
                        <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={()=>handleDelete(t.id)} style={{flex:'none'}}>
                          <Icon n="trash" s={11}/>
                        </button>
                      )}
                    </div>
                    <div className="row between" style={{fontSize:11}}>
                      <div className="row" style={{gap:6,flexWrap:'wrap'}}>
                        {t.eventTitle && (
                          <span className="badge badge-indigo" style={{fontSize:10}}>
                            {t.eventTitle.slice(0, 10)}
                          </span>
                        )}
                        {t.deadline && (
                          <span style={{color:'var(--ink4)',fontWeight:600,display:'flex',gap:3,alignItems:'center'}}>
                            <Icon n="clock" s={10}/> {t.deadline}
                          </span>
                        )}
                      </div>
                      {t.assignee && <div className="avatar sm indigo">{t.assignee[0]}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {done.length > 0 && (
        <div className="card mt16">
          <div className="card-head">
            <div className="card-title"><Icon n="check2" s={16}/> 完了済み</div>
            <span className="badge badge-green">{done.length}</span>
          </div>
          <div className="card-body" style={{padding:0}}>
            {done.map((t, i) => (
              <div key={t.id} style={{padding:"10px 16px",borderTop:i?"1px solid var(--line)":"none",display:'flex',gap:10,alignItems:'center',opacity:.6}}>
                <span className="ck on" onClick={()=>toggle(t.id)} style={{cursor:'pointer'}}></span>
                <span style={{fontSize:12.5,flex:1,textDecoration:'line-through'}}>{t.task}</span>
                <span className="mono" style={{fontSize:11,color:'var(--ink4)'}}>{t.deadline || '—'}</span>
                {window.canDo('todos.delete') && (
                  <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={()=>handleDelete(t.id)}>
                    <Icon n="trash" s={11}/>
                  </button>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {showModal && (
        <TodoModal
          events={events}
          onSave={handleSave}
          onCancel={()=>setShowModal(false)}
        />
      )}
    </div>
  );
}

/**
 * 決済記録作成モーダル。
 */
function PaymentModal({events, participants, onSave, onCancel}){
  const [eventId, setEventId] = useState("");
  const [userId, setUserId] = useState("");
  const [amount, setAmount] = useState("");
  const [method, setMethod] = useState("銀行振込");
  const [status, setStatus] = useState("入金待ち");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  // 選択中イベントの参加費を amount にデフォルト反映
  useEffect(() => {
    if (eventId) {
      const e = events.find(x => x.id === eventId);
      if (e && e.fee) setAmount(String(e.fee));
    }
  }, [eventId]);

  async function handleSubmit() {
    if (!eventId) { setError("イベントを選択してください"); return; }
    if (!userId) { setError("参加者を選択してください"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        eventId, userId,
        amount: Number(amount) || 0,
        method, status,
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  const visibleEvents = events.filter(e => e.status !== "アーカイブ");
  const visibleUsers = participants.filter(p => p.status !== "アーカイブ");

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:520,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="card" s={16}/> 決済記録を追加</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="field">
            <label className="field-label">イベント <span className="field-req">*</span></label>
            <div className="select-wrap">
              <select className="input select" value={eventId} onChange={e=>setEventId(e.target.value)}>
                <option value="">選択してください</option>
                {visibleEvents.map(e => <option key={e.id} value={e.id}>[{e.id}] {e.title}</option>)}
              </select>
            </div>
          </div>
          <div className="field">
            <label className="field-label">参加者 <span className="field-req">*</span></label>
            <div className="select-wrap">
              <select className="input select" value={userId} onChange={e=>setUserId(e.target.value)}>
                <option value="">選択してください</option>
                {visibleUsers.map(p => <option key={p.id} value={p.id}>[{p.id}] {p.name}</option>)}
              </select>
            </div>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">金額 (円) <span className="field-req">*</span></label>
              <input className="input" type="number" min="0" value={amount} onChange={e=>setAmount(e.target.value)}/>
            </div>
            <div className="field">
              <label className="field-label">決済方法</label>
              <div className="select-wrap">
                <select className="input select" value={method} onChange={e=>setMethod(e.target.value)}>
                  <option>銀行振込</option>
                  <option>Stripe</option>
                  <option>PayPay</option>
                  <option>現金</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">ステータス</label>
            <div className="select-wrap">
              <select className="input select" value={status} onChange={e=>setStatus(e.target.value)}>
                <option>入金待ち</option>
                <option>成功</option>
                <option>失敗</option>
                <option>返金</option>
              </select>
            </div>
            <div className="field-hint">「成功」を選択すると決済日時が今になります</div>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-coral" onClick={handleSubmit} disabled={saving || visibleEvents.length === 0 || visibleUsers.length === 0}>
            {saving ? '保存中…' : '記録を追加'}
          </button>
        </div>
      </div>
    </div>
  );
}

function PagePayments(){
  const [payments, setPayments] = useState([]);
  const [events, setEvents] = useState([]);
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("all");
  const [showModal, setShowModal] = useState(false);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [pays, evs, parts] = await Promise.all([
          window.fetchData('listPayments'),
          window.fetchData('listEvents'),
          window.fetchData('listParticipants'),
        ]);
        if (cancelled) return;
        setPayments(Array.isArray(pays) ? pays : []);
        setEvents(Array.isArray(evs) ? evs : []);
        setParticipants(Array.isArray(parts) ? parts : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  async function handleSave(fields) {
    await window.postData('createPayment', fields);
    window.location.reload();
  }

  async function handleDelete(payId) {
    const p = payments.find(x => x.id === payId);
    if (!p) return;
    if (!await window.confirmDialog({title:`決済記録 ${payId} を削除しますか?`, body:`${p.name} / ${yen(p.amount)} の記録が物理削除されます。`, danger:true, confirmLabel:'削除'})) return;
    setPayments(prev => prev.filter(x => x.id !== payId));
    try {
      await window.postData('deletePayment', { payId });
    } catch (err) {
      window.location.reload();
    }
  }

  // 集計
  const success = payments.filter(p => p.status === "成功");
  const totalRev = success.reduce((s, p) => s + (p.amount || 0), 0);
  const pending = payments.filter(p => p.status === "入金待ち").length;
  const failed = payments.filter(p => p.status === "失敗" || p.status === "返金").length;

  // フィルタ済み
  const visible = payments.filter(p => {
    if (filter === "all") return true;
    return p.status === filter;
  });

  return (
    <div className="page" data-page="payments">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>決済・精算</span></div>
          <h1>決済・<i>精算</i></h1>
          <div className="ph-sub">入金記録の一元管理。Stripe・PayPay・銀行振込・現金に対応。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-coral" onClick={()=>setShowModal(true)}>
            <Icon n="plus" s={14}/> 決済を追加
          </button>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="kpi-grid">
        <MiniStat label="累計入金額 (成功)" value={loading ? '…' : yen(totalRev)} sub="" icon="yen" color="green"/>
        <MiniStat label="入金件数 (成功)" value={loading ? '…' : String(success.length)} sub="" icon="card" color="indigo"/>
        <MiniStat label="入金待ち" value={loading ? '…' : String(pending)} sub="要対応" icon="clock" color="amber"/>
        <MiniStat label="失敗・返金" value={loading ? '…' : String(failed)} sub="" icon="warn" color="red"/>
      </div>

      <div className="row mb16" style={{gap:6}}>
        {[["all","すべて"],["成功","成功"],["入金待ち","入金待ち"],["失敗","失敗"],["返金","返金"]].map(([k,l]) => (
          <span key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>{l}</span>
        ))}
        <div style={{flex:1}}></div>
        <span style={{fontSize:11,color:'var(--ink4)'}}>{loading ? '読み込み中...' : `${visible.length} 件`}</span>
      </div>

      {!loading && visible.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 40px'}}>
            <Icon n="card" s={28}/>
            <div style={{fontFamily:'var(--serif)',fontSize:20,marginTop:6,color:'var(--ink2)'}}>
              {payments.length === 0 ? '決済記録がありません' : '該当する記録がありません'}
            </div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
              {payments.length === 0 ? '右上の「決済を追加」ボタンから記録できます' : '別のフィルタでお試しください'}
            </div>
          </div>
        </div>
      ) : (
        <div className="card">
          <table className="tbl">
            <thead><tr>
              <th>ID</th><th>申込者</th><th>イベント</th><th>方法</th>
              <th className="right">金額</th><th>状態</th><th>日時</th><th></th>
            </tr></thead>
            <tbody>
              {visible.map(p => {
                const st = p.status === "成功" ? "badge-green"
                         : p.status === "入金待ち" ? "badge-amber"
                         : p.status === "返金" ? "badge-violet"
                         : "badge-red";
                return (
                  <tr key={p.id}>
                    <td className="mono" style={{fontSize:11,color:'var(--ink3)'}}>{p.id}</td>
                    <td style={{fontWeight:600}}>{p.name || '—'}</td>
                    <td>
                      <div style={{display:'flex',gap:6,alignItems:'center'}}>
                        <div style={{width:3,height:18,background:`var(--${p.eventAccent})`,borderRadius:2}}></div>
                        <span style={{fontSize:12}}>{p.eventTitle || '—'}</span>
                      </div>
                    </td>
                    <td><span className="badge badge-ink">{p.method}</span></td>
                    <td className="right num" style={{fontWeight:700}}>{yen(p.amount)}</td>
                    <td><span className={clsx("badge", st)}><span className="badge-dot"></span>{p.status}</span></td>
                    <td className="mono" style={{fontSize:11,color:'var(--ink4)'}}>{p.paidAt || '—'}</td>
                    <td>
                      {window.canDo('payments.delete') && (
                        <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={()=>handleDelete(p.id)}>
                          <Icon n="trash" s={11}/>
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {showModal && (
        <PaymentModal
          events={events}
          participants={participants}
          onSave={handleSave}
          onCancel={()=>setShowModal(false)}
        />
      )}
    </div>
  );
}

function MemberModal({mode, initialValues, onSave, onCancel, deptList, departments, existingSubRoles}){
