<!DOCTYPE html>
<!--
================================================================================
 connec+a Console — Single HTML build
================================================================================

  学生団体 connec+a の運営管理プラットフォーム。
  単一HTMLで完結し、ビルド工程なしで GitHub Pages にそのまま置ける。

  Repository : https://github.com/connectahubis-source/connecta-console
  License    : MIT
  Version    : 0.2.0-single

  ============================================================================
   このファイルの構造 (上から順)
  ============================================================================

   1. <head>
      - フォント (Google Fonts)
      - Chart.js CDN
      - <style>          : デザイントークン + コンポーネントCSS

   2. <body>
      - <header.topbar>   : トップバー (ロゴ・検索・通知・ユーザー)
      - <aside.sidebar>   : 左サイドバー (4セクション・21項目)
      - <main#main>       : ページ本体 (Reactでマウント)

   3. <script> セクション群 (この順序でロード)
      a. CONFIG           : 環境設定 (USE_MOCK / GAS_API_URL)
      b. SERVICES         : fetchData / postData (GAS API or モック)
      c. ROUTING          : URL hash ルーター
      d. React + Babel    : CDN
      e. MOCK DATA        : サンプルデータ (window.MOCK)
      f. ICONS            : Lucide風アイコン (window.Icon)
      g. PAGES            : Dashboard / Stub の各画面
      h. APP              : ルートコンポーネント

  ============================================================================
   編集ガイド
  ============================================================================

   - 色を変えたい  : <style> 内の :root の CSS Variables を編集
   - データを変えたい : MOCK DATA セクションの定数を編集
   - 新しい画面を追加 : PAGES セクションに function PageXxx() を追加 →
                       APP セクションの PAGES オブジェクトに登録 →
                       <aside.sidebar> に <a href="#xxx" class="nav-item" data-nav="xxx"> を追加
   - GAS と接続    : CONFIG.GAS_API_URL を埋めて CONFIG.USE_MOCK = false に

  ============================================================================
   既知の制約
  ============================================================================

   - Babel Standalone を使うため、初回ロードに数秒かかる (~3MB DL + 変換)
   - production では事前ビルドが推奨だが、可搬性優先で単一HTML採用
   - 規模が大きくなりすぎたら Vite ビルド構成に移行可 (構造設計済み)

================================================================================
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<base target="_top">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>connec+a Console — 運営管理</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
/* =========================================================
   connec+a Console — Design Tokens & Base
   Primary: connec+a Navy Blue (logo source: #163d8a → OKLCH 0.345 0.16 263)
   ========================================================= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* PRIMARY — connec+a Navy Blue (logo source: #163d8a / RGB 22,61,138) */
  --indigo:oklch(0.345 0.16 263);
  --indigo-hover:oklch(0.28 0.17 263);
  --indigo-50:oklch(0.97 0.02 263);
  --indigo-100:oklch(0.93 0.05 263);
  --indigo-200:oklch(0.86 0.09 263);
  --indigo-600:oklch(0.345 0.16 263);
  --indigo-700:oklch(0.28 0.17 263);
  --indigo-ink:oklch(0.22 0.13 263);

  /* ACCENT — Coral (アラート・新規バッジ用に維持) */
  --coral:oklch(0.68 0.17 35);
  --coral-600:oklch(0.62 0.18 35);
  --coral-50:oklch(0.97 0.025 35);
  --coral-100:oklch(0.93 0.06 35);

  --green:oklch(0.64 0.14 155);
  --green-50:oklch(0.96 0.03 155);
  --green-100:oklch(0.92 0.06 155);
  --amber:oklch(0.76 0.14 75);
  --amber-50:oklch(0.97 0.04 75);
  --amber-100:oklch(0.93 0.08 75);
  --red:oklch(0.6 0.19 25);
  --red-50:oklch(0.96 0.03 25);
  --red-100:oklch(0.92 0.07 25);
  --violet:oklch(0.58 0.17 300);
  --violet-50:oklch(0.96 0.03 300);
  --teal:oklch(0.65 0.1 200);
  --teal-50:oklch(0.96 0.025 200);
  --pink:oklch(0.72 0.14 345);
  --pink-50:oklch(0.97 0.025 345);

  --ink:oklch(0.18 0.012 265);
  --ink2:oklch(0.32 0.012 265);
  --ink3:oklch(0.48 0.010 265);
  --ink4:oklch(0.62 0.008 265);
  --ink5:oklch(0.78 0.006 265);
  --line:oklch(0.92 0.005 265);
  --line2:oklch(0.88 0.006 265);
  --bg:oklch(0.985 0.002 265);
  --bg2:oklch(0.965 0.004 265);
  --bg3:oklch(0.94 0.005 265);
  --white:#ffffff;

  --r:10px;--rs:8px;--rx:16px;--rr:6px;
  --sh-xs:0 1px 0 rgba(20,30,60,.04);
  --sh-sm:0 1px 2px rgba(20,30,60,.05),0 1px 3px rgba(20,30,60,.04);
  --sh:0 2px 8px rgba(20,30,60,.06),0 1px 2px rgba(20,30,60,.04);
  --sh-md:0 8px 24px -8px rgba(20,30,60,.12),0 2px 6px rgba(20,30,60,.05);
  --sh-lg:0 24px 48px -16px rgba(20,30,60,.18),0 4px 10px rgba(20,30,60,.06);
  --serif:'Instrument Serif',ui-serif,Georgia,serif;
  --sans:'Inter Tight','Noto Sans JP',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:13.5px;line-height:1.55;-webkit-font-smoothing:antialiased;font-feature-settings:"cv11","ss01";letter-spacing:-0.005em}
button,input,textarea,select{font-family:inherit;color:inherit}
::selection{background:var(--indigo-100);color:var(--indigo-700)}
a{color:inherit;text-decoration:none}
svg{display:block}

/* Icon helper */
.ic{width:16px;height:16px;stroke-width:1.75;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
.ic-sm{width:14px;height:14px}
.ic-lg{width:20px;height:20px}
.ic-xl{width:24px;height:24px}

/* ==================== TOPBAR ==================== */
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:20px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.brand-mark{width:30px;height:30px;border-radius:8px;background:#fff;border:1.5px solid var(--indigo);position:relative;display:flex;align-items:center;justify-content:center;flex:none}
.brand-mark::before{content:"+";position:absolute;left:5px;top:50%;transform:translateY(-52%);font-family:var(--sans);font-weight:800;font-size:14px;color:var(--indigo);line-height:1}
.brand-mark::after{content:"a";position:absolute;right:5px;top:50%;transform:translateY(-52%);font-family:var(--sans);font-weight:800;font-size:14px;color:var(--indigo);line-height:1;font-style:italic}
.brand-name{font-family:var(--serif);font-size:20px;color:var(--ink);letter-spacing:-0.01em;line-height:1}
.brand-name i{font-style:italic;color:var(--coral);margin-left:1px}
.brand-chip{font-size:9.5px;font-weight:600;color:var(--ink4);background:var(--bg3);padding:3px 7px;border-radius:99px;letter-spacing:0.08em;text-transform:uppercase;font-family:var(--mono)}

.cmdk{display:flex;align-items:center;gap:10px;padding:6px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--ink4);font-size:12.5px;cursor:pointer;min-width:340px;transition:all .15s}
.cmdk:hover{background:var(--white);border-color:var(--line2)}
.cmdk-kbd{margin-left:auto;display:flex;gap:3px}
.kbd{font-family:var(--mono);font-size:10px;background:var(--white);border:1px solid var(--line2);border-bottom-width:2px;padding:1px 5px;border-radius:4px;color:var(--ink3);line-height:1.4}

.tb-right{display:flex;align-items:center;gap:4px}
.tb-btn{height:34px;padding:0 10px;display:flex;align-items:center;gap:7px;border-radius:8px;background:transparent;border:none;color:var(--ink3);font-size:12.5px;font-weight:500;cursor:pointer;position:relative;transition:all .15s}
.tb-btn:hover{background:var(--bg2);color:var(--ink)}
.tb-btn .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;background:var(--coral);border-radius:50%;border:1.5px solid var(--white)}
.tb-divider{width:1px;height:20px;background:var(--line);margin:0 6px}
.tb-user{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:99px;background:var(--bg2);border:1px solid var(--line);cursor:pointer;transition:all .15s}
.tb-user:hover{background:var(--white);border-color:var(--line2)}
.avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--indigo-200),var(--indigo));display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:600;font-size:11px;letter-spacing:-0.02em;flex:none}
.avatar.coral{background:linear-gradient(135deg,var(--coral-100),var(--coral))}
.avatar.green{background:linear-gradient(135deg,var(--green-100),var(--green))}
.avatar.amber{background:linear-gradient(135deg,var(--amber-100),var(--amber))}
.avatar.violet{background:linear-gradient(135deg,var(--violet-50),var(--violet))}
.avatar.teal{background:linear-gradient(135deg,var(--teal-50),var(--teal))}
.avatar.red{background:linear-gradient(135deg,var(--red-50),var(--red))}
.avatar.sm{width:22px;height:22px;font-size:10px}
.avatar.lg{width:40px;height:40px;font-size:14px}
.avatar.xl{width:56px;height:56px;font-size:20px}
.tb-user-name{font-size:12.5px;font-weight:600;color:var(--ink2)}
.tb-user-role{font-size:10.5px;color:var(--ink4)}

/* ==================== APP LAYOUT ==================== */
.app{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:232px;background:var(--white);border-right:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;gap:2px;flex:none;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

.nav-section{margin-top:12px}
.nav-label{font-size:10px;font-weight:700;color:var(--ink4);letter-spacing:0.1em;text-transform:uppercase;padding:8px 10px 6px;display:flex;align-items:center;justify-content:space-between}
.nav-label span:last-child{color:var(--ink5);font-weight:500;font-family:var(--mono);text-transform:none;letter-spacing:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;color:var(--ink2);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;position:relative}
.nav-item:hover{background:var(--bg2);color:var(--ink)}
.nav-item.active{background:var(--indigo-50);color:var(--indigo-700);font-weight:600}
.nav-item.active::before{content:"";position:absolute;left:-10px;top:8px;bottom:8px;width:2.5px;background:var(--indigo);border-radius:0 2px 2px 0}
.nav-item .ic{color:var(--ink3)}
.nav-item.active .ic{color:var(--indigo)}
.nav-item .n-badge{margin-left:auto;font-size:10.5px;padding:1px 6px;border-radius:99px;background:var(--bg3);color:var(--ink3);font-weight:600;font-family:var(--mono)}
.nav-item.active .n-badge{background:var(--indigo);color:var(--white)}
.nav-item .n-dot{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--coral)}

.org-switch{padding:10px;border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;gap:10px;margin-bottom:6px;cursor:pointer;background:var(--bg2);transition:all .15s}
.org-switch:hover{background:var(--white);box-shadow:var(--sh-sm)}
.org-logo{width:34px;height:34px;border-radius:8px;background:var(--indigo);display:flex;align-items:center;justify-content:center;color:white;font-family:var(--sans);font-weight:800;font-size:15px;flex:none;letter-spacing:-0.05em}
.org-info{flex:1;min-width:0}
.org-name{font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.org-plan{font-size:10.5px;color:var(--ink4);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.05em}

/* ==================== MAIN ==================== */
.main{flex:1;min-width:0}
.page{padding:28px 32px 48px;max-width:1400px}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.ph-left h1{font-family:var(--serif);font-size:36px;font-weight:400;letter-spacing:-0.02em;line-height:1.05;color:var(--ink)}
.ph-left h1 i{font-style:italic;color:var(--coral)}
.ph-sub{color:var(--ink3);font-size:13px;margin-top:6px;max-width:520px}
.ph-crumbs{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink4);margin-bottom:8px;font-weight:500}
.ph-crumbs span.sep{color:var(--ink5)}
.ph-crumbs a:hover{color:var(--ink2)}
.ph-right{display:flex;align-items:center;gap:8px}

/* ==================== BUTTONS ==================== */
.btn{height:34px;padding:0 14px;display:inline-flex;align-items:center;gap:7px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap;letter-spacing:-0.005em}
.btn-pri{background:var(--ink);color:var(--white);border-color:var(--ink)}
.btn-pri:hover{background:var(--ink2)}
.btn-indigo{background:var(--indigo);color:var(--white);border-color:var(--indigo);box-shadow:0 1px 0 rgba(255,255,255,.15) inset,0 1px 2px rgba(40,70,140,.25)}
.btn-indigo:hover{background:var(--indigo-hover)}
.btn-coral{background:var(--coral);color:var(--white);border-color:var(--coral);box-shadow:0 1px 0 rgba(255,255,255,.2) inset,0 1px 2px rgba(200,90,40,.25)}
.btn-coral:hover{background:var(--coral-600)}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--line2)}
.btn-ghost:hover{background:var(--white);border-color:var(--ink5);box-shadow:var(--sh-sm)}
.btn-soft{background:var(--white);color:var(--ink2);border-color:var(--line)}
.btn-soft:hover{background:var(--bg2)}
.btn-sm{height:28px;padding:0 10px;font-size:11.5px;border-radius:7px}
.btn-lg{height:40px;padding:0 18px;font-size:13.5px}
.btn-icon{width:34px;padding:0;justify-content:center}
.btn-icon.btn-sm{width:28px}

/* ==================== CARDS ==================== */
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--rx);box-shadow:var(--sh-xs)}
.card-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-title{font-size:13.5px;font-weight:700;color:var(--ink);letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.card-title .ic{color:var(--ink3)}
.card-sub{font-size:11.5px;color:var(--ink4);margin-top:2px}
.card-body{padding:18px}
.card-body.tight{padding:14px}
.card-body.flush{padding:0}
.card-foot{padding:12px 18px;border-top:1px solid var(--line);background:var(--bg2);border-radius:0 0 var(--rx) var(--rx);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink3)}

/* KPI tiles */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--white);border:1px solid var(--line);border-radius:var(--rx);padding:16px 18px;position:relative;overflow:hidden}
.kpi-label{font-size:11.5px;color:var(--ink4);font-weight:600;letter-spacing:0.02em;display:flex;align-items:center;gap:6px;text-transform:uppercase}
.kpi-label .ic{width:13px;height:13px}
.kpi-value{font-family:var(--serif);font-size:40px;font-weight:400;color:var(--ink);letter-spacing:-0.025em;line-height:1.05;margin-top:8px;display:flex;align-items:baseline;gap:5px}
.kpi-value .unit{font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink3);letter-spacing:0}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;margin-top:8px;font-variant-numeric:tabular-nums}
.kpi-delta.up{background:var(--green-50);color:var(--green)}
.kpi-delta.dn{background:var(--red-50);color:var(--red)}
.kpi-delta.flat{background:var(--bg3);color:var(--ink3)}
.kpi-foot{font-size:11px;color:var(--ink4);margin-top:10px;padding-top:10px;border-top:1px dashed var(--line2);display:flex;justify-content:space-between}
.kpi-accent{position:absolute;top:0;right:0;width:80px;height:80px;opacity:.15}
.kpi-spark{margin-top:8px;height:28px}

/* Section header (inside page) */
.sec{margin-top:28px}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;gap:12px}
.sec-title{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-0.015em;color:var(--ink);display:flex;align-items:baseline;gap:10px}
.sec-title .num{font-family:var(--mono);font-size:11px;color:var(--ink4);font-weight:500;background:var(--bg3);padding:3px 7px;border-radius:4px}
.sec-sub{font-size:12px;color:var(--ink4);margin-top:2px}

/* ==================== BADGES & CHIPS ==================== */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:99px;letter-spacing:0.02em;line-height:1.6;border:1px solid transparent}
.badge-indigo{background:var(--indigo-50);color:var(--indigo-700);border-color:var(--indigo-100)}
.badge-coral{background:var(--coral-50);color:var(--coral-600);border-color:var(--coral-100)}
.badge-green{background:var(--green-50);color:var(--green);border-color:var(--green-100)}
.badge-amber{background:var(--amber-50);color:oklch(0.5 0.14 75);border-color:var(--amber-100)}
.badge-red{background:var(--red-50);color:var(--red);border-color:var(--red-100)}
.badge-violet{background:var(--violet-50);color:var(--violet)}
.badge-teal{background:var(--teal-50);color:var(--teal)}
.badge-ink{background:var(--bg3);color:var(--ink2);border-color:var(--line2)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}

.chip{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 9px;border-radius:99px;font-size:11px;font-weight:500;background:var(--bg2);color:var(--ink2);border:1px solid var(--line);cursor:pointer}
.chip:hover{background:var(--white);box-shadow:var(--sh-sm)}
.chip.on{background:var(--ink);color:var(--white);border-color:var(--ink)}

/* ==================== TABLES ==================== */
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
.tbl thead th{font-size:10.5px;font-weight:700;color:var(--ink4);letter-spacing:0.06em;text-transform:uppercase;text-align:left;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0}
.tbl thead th:first-child{padding-left:18px}
.tbl thead th:last-child{padding-right:18px}
.tbl tbody td{padding:12px 14px;border-bottom:1px solid var(--line);color:var(--ink2);vertical-align:middle}
.tbl tbody td:first-child{padding-left:18px}
.tbl tbody td:last-child{padding-right:18px}
.tbl tbody tr:hover{background:var(--bg2)}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.tbl .right{text-align:right}
.tbl .center{text-align:center}
.row-actions{opacity:0;transition:opacity .15s;display:flex;gap:4px;justify-content:flex-end}
.tbl tr:hover .row-actions{opacity:1}
.ck{width:14px;height:14px;border:1.5px solid var(--ink5);border-radius:4px;cursor:pointer;display:inline-block;vertical-align:middle;position:relative;background:var(--white)}
.ck.on{background:var(--indigo);border-color:var(--indigo)}
.ck.on::after{content:"";position:absolute;left:3px;top:0px;width:5px;height:9px;border:solid white;border-width:0 1.5px 1.5px 0;transform:rotate(45deg)}

/* ==================== FORMS ==================== */
.input{height:34px;padding:0 12px;border:1px solid var(--line2);border-radius:8px;font-size:12.5px;background:var(--white);width:100%;transition:all .15s}
.input:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-100)}
.input-lg{height:40px;font-size:13px}
.field{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:11.5px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:5px}
.field-req{color:var(--coral)}
.field-hint{font-size:11px;color:var(--ink4)}
.select-wrap{position:relative}
.select-wrap::after{content:"";position:absolute;right:11px;top:50%;width:6px;height:6px;border:1.5px solid var(--ink4);border-top:none;border-left:none;transform:translateY(-75%) rotate(45deg);pointer-events:none}
.select{appearance:none;padding-right:28px}

.search-bar{display:flex;align-items:center;gap:8px;padding:4px;background:var(--white);border:1px solid var(--line2);border-radius:10px}
.search-bar .input{border:none;background:transparent}
.search-bar .input:focus{box-shadow:none}

/* ==================== TABS ==================== */
.tabs{display:flex;align-items:center;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-color:var(--ink);font-weight:600}
.tab .count{background:var(--bg3);color:var(--ink3);font-size:10.5px;padding:0px 6px;border-radius:99px;font-weight:600;font-variant-numeric:tabular-nums}
.tab.active .count{background:var(--indigo);color:var(--white)}

/* ==================== PROGRESS ==================== */
.bar{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:var(--indigo);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.bar-fill.coral{background:var(--coral)}
.bar-fill.green{background:var(--green)}
.bar-fill.amber{background:var(--amber)}
.bar-fill.red{background:var(--red)}
.bar-multi{display:flex;height:8px;border-radius:99px;overflow:hidden;background:var(--bg3)}
.bar-multi > span{height:100%;display:block}

/* ==================== CHARTS ==================== */
.chart-wrap{position:relative;width:100%}

/* ==================== LAYOUT UTILITIES ==================== */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid-main{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.grid-ab{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.stack{display:flex;flex-direction:column;gap:12px}
.row{display:flex;align-items:center;gap:10px}
.row.between{justify-content:space-between}
.sp{flex:1}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}

.page[hidden]{display:none}

/* ==================== TIMELINE ==================== */
.timeline{position:relative;padding-left:22px}
.timeline::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:1.5px;background:var(--line2)}
.tl-item{position:relative;padding-bottom:18px}
.tl-item::before{content:"";position:absolute;left:-20px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--white);border:2px solid var(--indigo);box-shadow:0 0 0 3px var(--indigo-50)}
.tl-item.coral::before{border-color:var(--coral);box-shadow:0 0 0 3px var(--coral-50)}
.tl-item.green::before{border-color:var(--green);box-shadow:0 0 0 3px var(--green-50)}
.tl-item.amber::before{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-50)}
.tl-time{font-size:11px;color:var(--ink4);font-family:var(--mono);margin-bottom:2px}
.tl-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.tl-desc{font-size:12px;color:var(--ink3)}

/* ==================== Misc ==================== */
.divider{height:1px;background:var(--line);margin:14px 0}
.empty{padding:40px;text-align:center;color:var(--ink4)}
.empty .ic{margin:0 auto 10px;width:28px;height:28px;color:var(--ink5)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.num-big{font-family:var(--serif);font-size:32px;letter-spacing:-0.02em;line-height:1}

/* ==================== STUB / COMING SOON ==================== */
.stub{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;text-align:center;border:1px dashed var(--line2);border-radius:var(--rx);background:var(--bg2)}
.stub-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--indigo-100),var(--indigo-200));display:flex;align-items:center;justify-content:center;color:var(--indigo-700);margin-bottom:14px}
.stub-icon .ic{width:24px;height:24px}
.stub-title{font-family:var(--serif);font-size:26px;font-weight:400;letter-spacing:-0.02em;color:var(--ink);margin-bottom:6px}
.stub-title i{font-style:italic;color:var(--coral)}
.stub-sub{font-size:13px;color:var(--ink3);max-width:420px;line-height:1.6}
.stub-meta{margin-top:14px;font-family:var(--mono);font-size:10.5px;color:var(--ink4);background:var(--white);padding:4px 10px;border-radius:99px;border:1px solid var(--line)}

/* ==================== PHONE MOCKUPS (PageMobile) ==================== */
.phones{display:flex;gap:24px;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,var(--indigo-50),var(--bg));border-radius:var(--rx);flex-wrap:wrap}
.phone{width:300px;height:620px;background:var(--ink);border-radius:38px;padding:9px;box-shadow:var(--sh-lg),inset 0 0 0 1.5px rgba(255,255,255,.1);flex:none;position:relative}
.phone-screen{width:100%;height:100%;background:var(--white);border-radius:30px;overflow:hidden;display:flex;flex-direction:column;position:relative}
.phone-notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:90px;height:22px;background:var(--ink);border-radius:99px;z-index:5}
.phone-status{height:38px;display:flex;align-items:center;justify-content:space-between;padding:12px 20px 0;font-size:11px;font-weight:600;color:var(--ink)}
.phone-label{text-align:center;margin-top:12px;font-size:11px;color:var(--ink4);font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.qr-frame{width:220px;height:220px;border:2px solid rgba(255,255,255,.25);border-radius:14px;position:relative}
.qr-frame::before,.qr-frame::after{content:"";position:absolute;width:24px;height:24px;border:3px solid var(--coral)}
.qr-frame::before{top:-2px;left:-2px;border-right:none;border-bottom:none;border-radius:14px 0 0 0}
.qr-frame::after{bottom:-2px;right:-2px;border-left:none;border-top:none;border-radius:0 0 14px 0}
.qr-line{position:absolute;left:0;right:0;height:2px;background:var(--coral);box-shadow:0 0 12px var(--coral);animation:qrscan 2.4s ease-in-out infinite;top:50%}
@keyframes qrscan{0%{top:15%}50%{top:85%}100%{top:15%}}

/* ==================== QR SCANNER (PageQR デスクトップ用大型版) ==================== */
.qr-scanner{position:relative;width:100%;height:320px;background:var(--ink);border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* ==================== NOTIFICATIONS LIST (PageNotifications) ==================== */
.notif-list{display:flex;flex-direction:column;gap:4px}
.notif{display:grid;grid-template-columns:auto 1fr auto;gap:12px;padding:12px;border-radius:10px;background:var(--white);border:1px solid var(--line);align-items:flex-start;cursor:pointer;transition:background .15s}
.notif:hover{background:var(--bg2)}
.notif.unread{background:var(--indigo-50);border-color:var(--indigo-100)}
.notif-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.notif-title{font-weight:600;font-size:12.5px;color:var(--ink);margin-bottom:2px;line-height:1.3}
.notif-body{font-size:11.5px;color:var(--ink3);line-height:1.5}
.notif-time{font-family:var(--mono);font-size:10.5px;color:var(--ink4)}
.notif-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--coral);margin-top:6px}

/* ====== UX Toolkit (Phase 5新-B) ====== */

/* Toast 通知 */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{min-width:280px;max-width:420px;padding:12px 14px;background:var(--white);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12),0 2px 6px rgba(0,0,0,0.06);display:flex;align-items:center;gap:10px;font-size:13px;pointer-events:auto;animation:toast-in .25s ease}
.toast-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex:none}
.toast.toast-success .toast-icon{background:var(--green-50);color:var(--green)}
.toast.toast-error .toast-icon{background:var(--red-50);color:var(--red)}
.toast.toast-info .toast-icon{background:var(--indigo-50);color:var(--indigo)}
.toast.toast-warn .toast-icon{background:var(--amber-50);color:var(--amber)}
.toast-msg{flex:1;line-height:1.4;color:var(--ink)}
.toast-close{cursor:pointer;color:var(--ink4);padding:2px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.toast-close:hover{background:var(--bg2);color:var(--ink2)}
.toast.fade-out{animation:toast-out .2s ease forwards}
@keyframes toast-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes toast-out{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--line2);border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite}
.spinner-lg{width:32px;height:32px;border-width:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:12px;color:var(--ink4);font-size:12px}

/* Skeleton */
.skel{background:linear-gradient(90deg,var(--bg2) 0%,var(--bg3) 50%,var(--bg2) 100%);background-size:200% 100%;animation:skel 1.4s ease-in-out infinite;border-radius:4px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ConfirmModal */
.confirm-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fade-in .15s ease}
.confirm-modal{width:420px;max-width:94%;background:var(--white);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.18);overflow:hidden;animation:modal-in .2s ease}
.confirm-modal-head{padding:18px 20px 12px;display:flex;align-items:flex-start;gap:12px}
.confirm-modal-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none}
.confirm-modal.danger .confirm-modal-icon{background:var(--red-50);color:var(--red)}
.confirm-modal.warn .confirm-modal-icon{background:var(--amber-50);color:var(--amber)}
.confirm-modal.info .confirm-modal-icon{background:var(--indigo-50);color:var(--indigo)}
.confirm-modal-title{font-family:var(--serif);font-size:18px;letter-spacing:-.015em;color:var(--ink);margin-bottom:4px}
.confirm-modal-body{font-size:13px;color:var(--ink3);line-height:1.5;padding:0 20px 18px;white-space:pre-wrap}
.confirm-modal-foot{padding:14px 20px;background:var(--bg2);border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes modal-in{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

/* ErrorBanner (統一されたエラー表示) */
.error-banner{padding:12px 14px;margin-bottom:14px;background:var(--red-50);border:1px solid var(--red-100);border-radius:8px;color:var(--red);font-size:12.5px;display:flex;align-items:flex-start;gap:10px}
.error-banner-icon{flex:none;color:var(--red);margin-top:1px}
.error-banner-content{flex:1;line-height:1.5}
.error-banner-content b{display:block;margin-bottom:2px}
.error-banner-close{cursor:pointer;color:var(--red);opacity:.6;padding:2px}
.error-banner-close:hover{opacity:1}
</style>

</head>

<script>
  /**
   * fetchData(action, params) — GAS WebApp に GET リクエストして JSON を返す。
   * USE_MOCK=true の場合は window.MOCK[action] を即座に返す。
   *
   * GAS 側は { ok: true, data: ... } または { ok: false, error: '...' } を返す。
   * このヘルパは ok=true の場合は data 部分のみを返し、ok=false の場合は throw する。
   */
  window.fetchData = async function fetchData(action, params = {}) {
    if (window.CONFIG.USE_MOCK) {
      await new Promise((r) => setTimeout(r, 50));
      const data = window.MOCK ? window.MOCK[action] : null;
      if (data === undefined) {
        console.warn(`[mock] no data for action: ${action}`);
      }
      return data;
    }

    if (!window.CONFIG.GAS_API_URL) {
      throw new Error('CONFIG.GAS_API_URL is not configured');
    }

    const url =
      window.CONFIG.GAS_API_URL +
      '?action=' +
      encodeURIComponent(action) +
      '&params=' +
      encodeURIComponent(JSON.stringify(params));

    const res = await fetch(url, { method: 'GET' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Unknown error');
    return json.data;
  };

  /**
   * postData(action, payload) — GAS に POST。書き込み系の操作で使用。
   * GAS doPost は CORS preflight を避けるため text/plain で送る。
   */
  window.postData = async function postData(action, payload = {}) {
    if (window.CONFIG.USE_MOCK) {
      await new Promise((r) => setTimeout(r, 100));
      console.log(`[mock] postData(${action}):`, payload);
      return { ok: true, mock: true };
    }
    if (!window.CONFIG.GAS_API_URL) {
      throw new Error('CONFIG.GAS_API_URL is not configured');
    }
    const res = await fetch(window.CONFIG.GAS_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, payload }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Unknown error');
    return json.data;
  };
</script>

<script>
  /**
   * 戻るボタン・ブックマーク対応のため URL hash でナビゲーション状態を管理。
   * App コンポーネントから window.__getInitialNav__ / __setNav__ を参照する。
   *
   * 形式:
   *   #events                       → key='events'
   *   #event-create?id=E-2601       → key='event-create' (?以降は PageEventCreate が読む)
   */
  window.__getInitialNav__ = function () {
    const h = (location.hash || '').replace(/^#/, '');
    // クエリ文字列を切り捨ててキーだけ取り出す
    const key = h.split('?')[0];
    return key || 'dashboard';
  };
  window.__setNav__ = function (key) {
    const cur = (location.hash || '').replace(/^#/, '').split('?')[0];
    if (cur !== key) {
      location.hash = key;
    }
  };
</script>

  const W = 120, H = h;
  const step = W / (data.length-1);
  const pts = data.map((v,i)=>[i*step, H - ((v-min)/(max-min||1))*(H-2) - 1]);
  const path = pts.map((p,i)=>`${i?'L':'M'}${p[0]},${p[1]}`).join(' ');
  const area = `${path} L ${W},${H} L 0,${H} Z`;
  return (
    <svg className="kpi-spark" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:h}}>
      {fill && <path d={area} fill={color} opacity="0.1"/>}
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
};

// Toast / ConfirmModal / Spinner / ErrorBanner を提供。
// 使い方:
//   window.toast.success("保存しました")
//   window.toast.error("エラー")
//   await window.confirmDialog({title:"削除しますか?", body:"...", danger:true})

// --- Toast 管理 ---
const ToastHost = (() => {
  let listeners = [];
  let toasts = [];
  let nextId = 1;
  return {
    subscribe(fn) {
      listeners.push(fn);
      return () => { listeners = listeners.filter(l => l !== fn); };
    },
    show(type, message) {
      const id = nextId++;
      const toast = { id, type, message, fadeOut: false };
      toasts = [...toasts, toast];
      listeners.forEach(l => l(toasts));
      // 4秒後にfade-out → 0.2秒後に削除
      setTimeout(() => {
        toasts = toasts.map(t => t.id === id ? {...t, fadeOut: true} : t);
        listeners.forEach(l => l(toasts));
        setTimeout(() => {
          toasts = toasts.filter(t => t.id !== id);
          listeners.forEach(l => l(toasts));
        }, 200);
      }, 4000);
    },
    dismiss(id) {
      toasts = toasts.map(t => t.id === id ? {...t, fadeOut: true} : t);
      listeners.forEach(l => l(toasts));
      setTimeout(() => {
        toasts = toasts.filter(t => t.id !== id);
        listeners.forEach(l => l(toasts));
      }, 200);
    },
  };
})();

// グローバルAPI
window.toast = {
  success: (msg) => ToastHost.show('success', msg),
  error:   (msg) => ToastHost.show('error', msg),
  info:    (msg) => ToastHost.show('info', msg),
  warn:    (msg) => ToastHost.show('warn', msg),
};

function ToastContainer() {
  const [items, setItems] = useState([]);
  useEffect(() => ToastHost.subscribe(setItems), []);
  if (items.length === 0) return null;
  const iconMap = { success: 'check2', error: 'x', info: 'info', warn: 'warn' };
  return (
    <div className="toast-container">
      {items.map(t => (
        <div key={t.id} className={clsx("toast", `toast-${t.type}`, t.fadeOut && "fade-out")}>
          <div className="toast-icon"><Icon n={iconMap[t.type] || 'info'} s={14}/></div>
          <div className="toast-msg">{t.message}</div>
          <span className="toast-close" onClick={()=>ToastHost.dismiss(t.id)}><Icon n="x" s={12}/></span>
        </div>
      ))}
    </div>
  );
}

// --- ConfirmDialog ---
const ConfirmHost = (() => {
  let listener = null;
  let pending = null;
  return {
    subscribe(fn) {
      listener = fn;
      return () => { listener = null; };
    },
    show(opts) {
      return new Promise((resolve) => {
        pending = resolve;
        if (listener) listener(opts);
      });
    },
    answer(result) {
      if (pending) {
        pending(result);
        pending = null;
      }
      if (listener) listener(null);
    },
  };
})();

window.confirmDialog = (opts) => ConfirmHost.show(opts || {});

function ConfirmDialogHost() {
  const [opts, setOpts] = useState(null);
  useEffect(() => ConfirmHost.subscribe(setOpts), []);
  if (!opts) return null;

  const variant = opts.danger ? 'danger' : opts.warn ? 'warn' : 'info';
  const icon = opts.danger ? 'trash' : opts.warn ? 'warn' : 'info';
  const confirmBtnClass = opts.danger ? 'btn btn-coral' : opts.warn ? 'btn btn-coral' : 'btn btn-indigo';

  function close(result) {
    setOpts(null);
    ConfirmHost.answer(result);
  }

  return (
    <div className="confirm-modal-bg" onClick={()=>close(false)}>
      <div className={clsx("confirm-modal", variant)} onClick={(e)=>e.stopPropagation()}>
        <div className="confirm-modal-head">
          <div className="confirm-modal-icon"><Icon n={icon} s={18}/></div>
          <div style={{flex:1}}>
            <div className="confirm-modal-title">{opts.title || '確認'}</div>
          </div>
        </div>
        {opts.body && <div className="confirm-modal-body">{opts.body}</div>}
        <div className="confirm-modal-foot">
          <button className="btn btn-ghost" onClick={()=>close(false)}>{opts.cancelLabel || 'キャンセル'}</button>
          <button className={confirmBtnClass} onClick={()=>close(true)} autoFocus>
            {opts.confirmLabel || (opts.danger ? '削除する' : 'OK')}
          </button>
        </div>
      </div>
    </div>
  );
}

<script type="text/babel" data-presets="react">

// -------------------- 補助コンポーネント --------------------

function MiniStat({label, value, sub, icon, color}){
  return (
    <div className="kpi" style={{padding:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div className="kpi-label" style={{marginBottom:0}}>{label}</div>
          <div className="kpi-value" style={{fontSize:28,marginTop:4}}>{value}</div>
          <div style={{fontSize:11,color:'var(--ink4)',marginTop:2}}>{sub}</div>
        </div>
        <div style={{width:34,height:34,borderRadius:8,background:`var(--${color}-50)`,color:`var(--${color})`,display:'flex',alignItems:'center',justifyContent:'center'}}>

        </div>
      </div>

}

function EventCard({e, onDelete}){
  const cap = e.capacity || 0;
  const reg = e.registered || 0;
  const pct = cap > 0 ? Math.round(reg / cap * 100) : 0;

  // 日付パース (空の場合のフォールバック)
  const dateParts = (e.date || '').split('-');
  const day = dateParts[2] || '—';
  const monthName = dateParts[1] ? ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'][parseInt(dateParts[1])] : '';

  const statusBadge = e.status === "公開中"   ? "badge-green"
                    : e.status === "満員"     ? "badge-coral"
                    : e.status === "アーカイブ" ? "badge-ink"
                    : "badge-ink";

  return (
    <div className="card" style={{overflow:'hidden',cursor:'pointer',transition:'box-shadow .15s', opacity: e.status === "アーカイブ" ? 0.6 : 1}}>
      <div style={{height:100,background:`linear-gradient(135deg, var(--${e.accent}-50), oklch(0.96 0.008 263))`,position:'relative',display:'flex',alignItems:'flex-end',padding:14}}>
        <div style={{position:'absolute',top:12,right:12,display:'flex',gap:6}}>
          <span className={clsx("badge", statusBadge)}><span className="badge-dot"></span>{e.status}</span>
        </div>
        <div style={{position:'absolute',top:14,left:14,fontFamily:'var(--serif)',fontSize:11,color:`var(--${e.accent})`,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase'}}>{e.category}</div>
        <svg width="120" height="50" viewBox="0 0 120 50" style={{position:'absolute',right:0,bottom:0,opacity:.4}}>
          <circle cx="100" cy="40" r="30" fill={`var(--${e.accent})`} opacity="0.3"/>
          <circle cx="80" cy="30" r="16" fill={`var(--${e.accent})`} opacity="0.5"/>
        </svg>
        <div style={{fontFamily:'var(--serif)',fontSize:32,color:'var(--ink)',letterSpacing:'-0.02em',lineHeight:1}}>
          {day}
          <span style={{fontSize:14,color:'var(--ink3)',marginLeft:4,fontFamily:'var(--sans)',fontWeight:600}}>
            {monthName}
          </span>
        </div>
      </div>
      <div style={{padding:16}}>
        <div style={{fontWeight:700,fontSize:14,color:'var(--ink)',marginBottom:4}}>{e.title}</div>
        <div style={{fontSize:11,color:'var(--ink4)',display:'flex',gap:10,alignItems:'center',marginBottom:12}}>
          <span style={{display:'flex',alignItems:'center',gap:3}}><Icon n="clock" s={11}/> {e.time || '—'}</span>
          <span style={{display:'flex',alignItems:'center',gap:3}}><Icon n="pin" s={11}/> {(e.venue || '—').slice(0, 12)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:5}}>
          <span style={{color:'var(--ink3)'}}>申込</span>
          <span className="mono" style={{color:'var(--ink)',fontWeight:600}}>{reg} / {cap}</span>
        </div>
        <div className="bar"><div className="bar-fill" style={{width:pct+"%",background:`var(--${e.accent})`}}></div></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12,paddingTop:12,borderTop:'1px dashed var(--line)'}}>
          <span style={{fontSize:11,color:'var(--ink4)'}}>{e.fee ? yen(e.fee) : "無料"}{e.revenue ? " · " + yen(e.revenue) : ""}</span>
          <div style={{display:'flex',gap:4}}>
            <button className="btn btn-soft btn-sm btn-icon" title="QR受付" onClick={(ev)=>ev.stopPropagation()}>
              <Icon n="qr" s={12}/>
            </button>
            <a href={`#event-create?id=${e.id}`} className="btn btn-soft btn-sm btn-icon" title="編集" onClick={(ev)=>ev.stopPropagation()}>
              <Icon n="edit" s={12}/>
            </a>
            {onDelete && e.status !== "アーカイブ" && (
              <button className="btn btn-soft btn-sm btn-icon" title="アーカイブ" onClick={(ev)=>{ev.stopPropagation(); onDelete(e.id);}}>
                <Icon n="trash" s={12}/>
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function EventCalendar({events}){
  // EVENTS の月から自動的にカレンダー表示月を決める。
  // 複数月にまたがる場合は最初のイベントの月を表示。
  const firstDate = events[0]?.date || '2026-05-01';
  const [yyyy, mm] = firstDate.split('-').map(Number);
  const monthLabel = `${yyyy}年 ${mm}月`;

  // 月初の曜日 (0=日) と末日を計算
  const firstDay = new Date(yyyy, mm-1, 1).getDay();
  const lastDate = new Date(yyyy, mm, 0).getDate();
  // 6行 × 7列 = 42 マス分を確保
  const cells = Array.from({length:42}, (_, i) => {
    const d = i - firstDay + 1;
    return d >= 1 && d <= lastDate ? d : null;
  });

  // イベントを日付ごとにマップ
  const map = {};
  events.forEach(e => {
    const d = parseInt(e.date.split('-')[2]);
    (map[d] = map[d] || []).push(e);
  });

  const today = new Date();
  const todayDate = (today.getFullYear() === yyyy && today.getMonth()+1 === mm) ? today.getDate() : null;

  return (
    <div className="card">
      <div className="card-head">
        <div className="card-title"><Icon n="cal" s={16}/> {monthLabel}</div>
        <div className="row" style={{gap:6}}>
          <button className="btn btn-soft btn-sm btn-icon"><Icon n="chevLeft" s={12}/></button>
          <button className="btn btn-soft btn-sm">今月</button>
          <button className="btn btn-soft btn-sm btn-icon"><Icon n="chevRight" s={12}/></button>
        </div>
      </div>
      <div style={{padding:14}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6}}>
          {"日月火水木金土".split("").map(d =>
            <div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'var(--ink4)',padding:"4px 0",letterSpacing:'.1em'}}>{d}</div>
          )}
          {cells.map((day, i) => {
            const dayEvents = day ? (map[day] || []) : [];
            const isToday = day === todayDate;
            return (
              <div key={i} style={{minHeight:90,padding:6,border:"1px solid var(--line)",borderRadius:8,background:day?"var(--white)":"var(--bg2)",opacity:day?1:.4}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <span style={{fontSize:11,fontWeight:isToday?700:500,color:isToday?'var(--white)':'var(--ink2)',background:isToday?'var(--indigo)':'transparent',width:20,height:20,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>{day}</span>
                </div>
                {dayEvents.map(e => (
                  <div key={e.id} title={e.title}
                    style={{background:`var(--${e.accent}-50)`,color:`var(--${e.accent})`,padding:"2px 5px",borderRadius:4,fontSize:10,fontWeight:600,marginBottom:2,borderLeft:`2px solid var(--${e.accent})`,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                    {e.title}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// -------------------- PageEvents --------------------

function PageEvents(){
  const [tab, setTab] = useState("all");
  const [view, setView] = useState("grid");
  const [query, setQuery] = useState("");

  // データ層: 初期は window.EVENTS (空配列)、マウント時に API から再取得
  const [events, setEvents] = useState(EVENTS);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  // マウント時 + ハッシュ変更時にデータ再取得 (PageEventCreate からの遷移にも対応)
  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listEvents');
        if (!cancelled) {
          setEvents(Array.isArray(data) ? data : []);
        }
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // 削除ハンドラ (論理削除)
  async function handleDelete(eventId) {
    const ev = events.find(e => e.id === eventId);
    if (!ev) return;
    if (!await window.confirmDialog({title:`「${ev.title}」をアーカイブしますか?`, body:'行は残り、ステータスが「アーカイブ」に変わります。後で復元できます。', danger:true, confirmLabel:'アーカイブ'})) return;

    // 楽観的UI更新: 即座にステータスを変える
    setEvents(prev => prev.map(e => e.id === eventId ? {...e, status: 'アーカイブ'} : e));

    try {
      await window.postData('deleteEvent', { eventId });
    } catch (err) {
      // 失敗したら元に戻す
      setEvents(prev => prev.map(e => e.id === eventId ? {...e, status: ev.status} : e));
      window.toast.error('削除に失敗しました: ' + err.message);
    }
  }

  // フィルタ済みイベント
  const filtered = events.filter(e => {
    // タブフィルタ
    if (tab === "all") {
      // デフォルトはアーカイブを除外
      if (e.status === "アーカイブ") return false;
    } else if (tab === "published" && e.status !== "公開中") return false;
    else if (tab === "full"      && e.status !== "満員")     return false;
    else if (tab === "draft"     && e.status !== "下書き")   return false;
    else if (tab === "archive"   && e.status !== "アーカイブ") return false;

    // 検索フィルタ
    if (query) {
      const q = query.toLowerCase();
      return (e.title || '').toLowerCase().includes(q)
          || (e.venue || '').toLowerCase().includes(q)
          || (e.id || '').toLowerCase().includes(q);
    }
    return true;
  });

  const tabs = [
    ["all",       "すべて",     events.filter(e => e.status !== "アーカイブ").length],
    ["published", "公開中",     events.filter(e => e.status === "公開中").length],
    ["full",      "満員",       events.filter(e => e.status === "満員").length],
    ["draft",     "下書き",     events.filter(e => e.status === "下書き").length],
    ["archive",   "アーカイブ", events.filter(e => e.status === "アーカイブ").length],
  ];

  return (
    <div className="page" data-page="events">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>イベント</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>一覧</span></div>
          <h1>イベント <i>一覧</i></h1>
          <div className="ph-sub">開催予定・公開中のイベントを管理。作成・複製・アーカイブが行えます。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost"><Icon n="upload" s={14}/> CSVインポート</button>
          <button className="btn btn-ghost"><Icon n="download" s={14}/> エクスポート</button>
          <a className="btn btn-indigo" href="#event-create"><Icon n="plus" s={14}/> イベント作成</a>
        </div>
      </div>

      {error && (
        <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}>
          <b>読み込みエラー:</b> {error}
        </div>
      )}

      <div className="tabs">
        {tabs.map(([k, l, c]) => (
          <div key={k} className={clsx("tab", tab===k && "active")} onClick={()=>setTab(k)}>
            {l}<span className="count">{c}</span>
          </div>
        ))}
        <div style={{flex:1}}></div>
        <div style={{display:'flex',gap:4,padding:"6px 0"}}>
          <button className={clsx("btn btn-sm", view==="grid" ? "btn-pri" : "btn-soft")} onClick={()=>setView("grid")}><Icon n="layers" s={12}/> カード</button>
          <button className={clsx("btn btn-sm", view==="list" ? "btn-pri" : "btn-soft")} onClick={()=>setView("list")}><Icon n="list" s={12}/> リスト</button>
          <button className={clsx("btn btn-sm", view==="cal"  ? "btn-pri" : "btn-soft")} onClick={()=>setView("cal")}><Icon n="cal" s={12}/> カレンダー</button>
        </div>
      </div>

      <div className="row mb16" style={{gap:8}}>
        <div className="search-bar" style={{flex:1,maxWidth:320}}>
          <Icon n="search" s={14}/>
          <input className="input" placeholder="イベント名、会場、ID..." value={query} onChange={e=>setQuery(e.target.value)}/>
        </div>
        <div className="chip"><Icon n="filter" s={12}/> カテゴリ: すべて</div>
        <div style={{flex:1}}></div>
        <span style={{fontSize:11,color:'var(--ink4)'}}>
          {loading ? '読み込み中...' : `${filtered.length} 件`}
        </span>
      </div>

      {!loading && filtered.length === 0 && (
        <div className="card">
          <div className="empty" style={{padding:"60px 40px"}}>
            <Icon n="cal" s={28}/>
            <div style={{fontFamily:'var(--serif)',fontSize:20,marginTop:6,color:'var(--ink2)'}}>
              {query ? '該当するイベントがありません' : 'イベントがまだありません'}
            </div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
              {query
                ? '別のキーワードでお試しください'
                : '右上の「イベント作成」ボタンから最初のイベントを登録できます'}
            </div>
          </div>
        </div>
      )}

      {!loading && filtered.length > 0 && view === "grid" && (
        <div className="grid-3">
          {filtered.map(e => <EventCard key={e.id} e={e} onDelete={handleDelete}/>)}
        </div>
      )}

      {!loading && filtered.length > 0 && view === "list" && (
        <div className="card">
          <table className="tbl">
            <thead><tr>
              <th style={{width:32}}><span className="ck"></span></th>
              <th>イベント</th><th>カテゴリ</th><th>日程</th>
              <th className="right">申込 / 定員</th><th>収益</th><th>状態</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.map(e => (
                <tr key={e.id}>
                  <td><span className="ck"></span></td>
                  <td>
                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                      <div style={{width:4,height:34,background:`var(--${e.accent})`,borderRadius:2}}></div>
                      <div>
                        <div style={{fontWeight:600,color:'var(--ink)'}}>{e.title}</div>
                        <div style={{fontSize:11,color:'var(--ink4)'}}>{e.venue} · <span className="mono">{e.id}</span></div>
                      </div>
                    </div>
                  </td>
                  <td><span className={`badge badge-${e.accent}`}>{e.category}</span></td>
                  <td>
                    <div style={{fontWeight:500}}>{e.date}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>{e.time}</div>
                  </td>
                  <td className="right num"><b>{e.registered}</b> / {e.capacity}</td>
                  <td className="num">{e.revenue ? yen(e.revenue) : "—"}</td>
                  <td>
                    <span className={clsx("badge",
                      e.status==="公開中"?"badge-green"
                      : e.status==="満員"?"badge-coral"
                      : e.status==="アーカイブ"?"badge-ink"
                      : "badge-ink")}>
                      <span className="badge-dot"></span>{e.status}
                    </span>
                  </td>
                  <td>
                    <div className="row-actions">
                      <a href={`#event-create?id=${e.id}`} className="btn btn-soft btn-sm btn-icon" title="編集">
                        <Icon n="edit" s={12}/>
                      </a>
                      {e.status !== "アーカイブ" && (
                        <button className="btn btn-soft btn-sm btn-icon" title="アーカイブ" onClick={()=>handleDelete(e.id)}>
                          <Icon n="trash" s={12}/>
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {!loading && filtered.length > 0 && view === "cal" && <EventCalendar events={filtered}/>}
    </div>
  );
}

// -------------------- PageRegistrations --------------------

/**
 * 申込一覧 (Registrations)。Events と Participants をひも付ける中間テーブル。
 * Phase 4新で実 Spreadsheet の Registrations シートに置き換える。
 */
/**
 * 申込作成モーダル。EventID と UserID をドロップダウンで選択。
 */
function RegistrationModal({events, participants, onSave, onCancel}){
  const [eventId, setEventId] = useState("");
  const [userId, setUserId] = useState("");
  const [paid, setPaid] = useState(false);
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  // 選択中イベントの参加費を amount にデフォルト反映
  useEffect(() => {
    if (eventId) {
      const e = events.find(x => x.id === eventId);
      if (e && e.fee) setAmount(String(e.fee));
    }
  }, [eventId]);

  async function handleSubmit() {
    if (!eventId) {
      setError("イベントを選択してください");
      return;
    }
    if (!userId) {
      setError("参加者を選択してください");
      return;
    }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        eventId, userId,
        paid: paid,
        amount: Number(amount) || 0,
        note: note,
        status: '確定',
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  // 公開中のイベントとアーカイブ以外の参加者を選択肢に
  const visibleEvents = events.filter(e => e.status !== "アーカイブ");
  const visibleUsers = participants.filter(p => p.status !== "アーカイブ");

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:520,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="ticket" s={16}/> 申込を追加</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel} title="閉じる"><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && (
            <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>
              {error}
            </div>
          )}
          {visibleEvents.length === 0 && (
            <div style={{padding:10,background:'var(--amber-50)',border:'1px solid var(--amber-100)',borderRadius:6,color:'var(--ink2)',fontSize:12}}>
              利用可能なイベントがありません。先にイベントを作成してください。
            </div>
          )}
          {visibleUsers.length === 0 && (
            <div style={{padding:10,background:'var(--amber-50)',border:'1px solid var(--amber-100)',borderRadius:6,color:'var(--ink2)',fontSize:12}}>
              利用可能な参加者がいません。先に参加者を登録してください。
            </div>
          )}
          <div className="field">
            <label className="field-label">イベント <span className="field-req">*</span></label>
            <div className="select-wrap">
              <select className="input select" value={eventId} onChange={e=>setEventId(e.target.value)}>
                <option value="">選択してください</option>
                {visibleEvents.map(e => (
                  <option key={e.id} value={e.id}>
                    [{e.id}] {e.title} ({e.date || '日付未設定'})
                  </option>
                ))}
              </select>
            </div>
          </div>
          <div className="field">
            <label className="field-label">参加者 <span className="field-req">*</span></label>
            <div className="select-wrap">
              <select className="input select" value={userId} onChange={e=>setUserId(e.target.value)}>
                <option value="">選択してください</option>
                {visibleUsers.map(p => (
                  <option key={p.id} value={p.id}>
                    [{p.id}] {p.name} ({p.email})
                  </option>
                ))}
              </select>
            </div>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">金額 (円)</label>
              <input className="input" type="number" min="0" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0"/>
              <div className="field-hint">イベントの参加費がデフォルトで入ります</div>
            </div>
            <div className="field">
              <label className="field-label">決済済み</label>
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0'}}>
                <div onClick={()=>setPaid(!paid)} style={{width:34,height:20,background:paid?"var(--green)":"var(--line2)",borderRadius:99,position:'relative',cursor:'pointer'}}>
                  <div style={{position:'absolute',top:2,left:paid?16:2,width:16,height:16,background:'white',borderRadius:'50%',transition:'left .15s',boxShadow:'0 1px 2px rgba(0,0,0,.15)'}}></div>
                </div>
                <span style={{fontSize:12}}>{paid ? "決済済み" : "未決済"}</span>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">備考</label>
            <textarea className="input" style={{height:60,padding:10,resize:'vertical'}} value={note} onChange={e=>setNote(e.target.value)} placeholder="連絡事項など (任意)"/>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving || visibleEvents.length === 0 || visibleUsers.length === 0}>
            {saving ? '保存中…' : '申込を確定'}
          </button>
        </div>
      </div>
    </div>
  );
}

function PageRegistrations(){
  const [registrations, setRegistrations] = useState([]);
  const [events, setEvents] = useState([]);
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const [filter, setFilter] = useState("all");
  const [query, setQuery] = useState("");
  const [showModal, setShowModal] = useState(false);

  // 初期ロード: 3つのテーブルを並列取得
  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [regs, evs, parts] = await Promise.all([
          window.fetchData('listRegistrations'),
          window.fetchData('listEvents'),
          window.fetchData('listParticipants'),
        ]);
        if (cancelled) return;
        setRegistrations(Array.isArray(regs) ? regs : []);
        setEvents(Array.isArray(evs) ? evs : []);
        setParticipants(Array.isArray(parts) ? parts : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // 申込作成
  async function handleSave(fields) {
    await window.postData('createRegistration', fields);
    window.location.reload();
  }

  // 申込削除 (キャンセル化)
  async function handleCancel(regId) {
    const r = registrations.find(x => x.id === regId);
    if (!r) return;
    if (!await window.confirmDialog({title:`「${r.userName} さん × ${r.eventTitle}」の申込をキャンセルしますか?`, body:'申込数も -1 されます。後で同じユーザーで再申込が可能です。', danger:true, confirmLabel:'キャンセル化'})) return;

    setRegistrations(prev => prev.map(x => x.id === regId ? {...x, status: 'キャンセル'} : x));

    try {
      await window.postData('deleteRegistration', { regId });
    } catch (err) {
      setRegistrations(prev => prev.map(x => x.id === regId ? {...x, status: r.status} : x));
      window.toast.error('キャンセルに失敗しました: ' + err.message);
    }
  }

  // フィルタ済み
  const visible = registrations.filter(r => {
    if (filter !== "all" && r.status !== filter) return false;
    if (query) {
      const q = query.toLowerCase();
      return (r.userName || '').toLowerCase().includes(q)
          || (r.userEmail || '').toLowerCase().includes(q)
          || (r.id || '').toLowerCase().includes(q)
          || (r.eventTitle || '').toLowerCase().includes(q);
    }
    return true;
  });

  // 集計
  const total = registrations.length;
  const confirmed = registrations.filter(r => r.status === "確定").length;
  const unpaid = registrations.filter(r => r.status === "未決済").length;
  const cancelled = registrations.filter(r => r.status === "キャンセル").length;
  const pct = (n) => total > 0 ? Math.round(n / total * 100) : 0;

  return (
    <div className="page" data-page="registrations">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>イベント</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>申込一覧</span></div>
          <h1>申込 <i>一覧</i></h1>
          <div className="ph-sub">全イベント横断の申込履歴。Events と Participants をひも付ける中核機能。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost" disabled><Icon n="send" s={14}/> 一括メール</button>
          <button className="btn btn-ghost" disabled><Icon n="download" s={14}/> CSV</button>
          <button className="btn btn-indigo" onClick={()=>setShowModal(true)}>
            <Icon n="plus" s={14}/> 手動登録
          </button>
        </div>
      </div>

      {error && (
        <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}>
          <b>読み込みエラー:</b> {error}
        </div>
      )}

      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <MiniStat label="申込総数" value={loading ? '…' : String(total)} sub="" icon="users" color="indigo"/>
        <MiniStat label="確定" value={loading ? '…' : String(confirmed)} sub={total > 0 ? `${pct(confirmed)}%` : ''} icon="check2" color="green"/>
        <MiniStat label="未決済" value={loading ? '…' : String(unpaid)} sub={total > 0 ? '要対応' : ''} icon="card" color="amber"/>
        <MiniStat label="キャンセル" value={loading ? '…' : String(cancelled)} sub={total > 0 ? `${pct(cancelled)}%` : ''} icon="x" color="red"/>
      </div>

      <div className="row mb16">
        <div className="search-bar" style={{flex:1,maxWidth:340}}>
          <Icon n="search" s={14}/>
          <input className="input" placeholder="名前・メール・ID・イベント名..." value={query} onChange={e=>setQuery(e.target.value)}/>
        </div>
        {[["all","すべて"],["確定","確定"],["未決済","未決済"],["キャンセル","キャンセル"]].map(([k,l]) => (
          <div key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>{l}</div>
        ))}
        <div style={{flex:1}}></div>
        <span style={{fontSize:11,color:'var(--ink4)'}}>
          {loading ? '読み込み中...' : `${visible.length} 件`}
        </span>
      </div>

      {!loading && visible.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 40px'}}>
            <Icon n="ticket" s={28}/>
            <div style={{fontFamily:'var(--serif)',fontSize:20,marginTop:6,color:'var(--ink2)'}}>
              {registrations.length === 0 ? '申込がまだありません' : '該当する申込がありません'}
            </div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
              {registrations.length === 0 ? '右上の「手動登録」ボタンから最初の申込を登録できます。Phase 5新+ で参加者からの自動申込フローを追加予定。' : '別のフィルタやキーワードでお試しください'}
            </div>
          </div>
        </div>
      ) : (
        <div className="card">
          <table className="tbl">
            <thead><tr>
              <th style={{width:32}}><span className="ck"></span></th>
              <th>ID</th><th>申込者</th><th>イベント</th><th>申込日</th><th>金額</th><th>状態</th><th></th>
            </tr></thead>
            <tbody>
              {visible.map((r, i) => (
                <tr key={r.id} style={{opacity: r.status === "キャンセル" ? 0.5 : 1}}>
                  <td><span className="ck"></span></td>
                  <td className="mono" style={{fontSize:11,color:'var(--ink3)'}}>{r.id}</td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div className={`avatar sm ${["indigo","coral","green","violet","teal"][i%5]}`}>{(r.userName || '?')[0]}</div>
                      <div>
                        <div style={{fontWeight:600}}>{r.userName || '—'}</div>
                        <div style={{fontSize:11,color:'var(--ink4)'}}>{r.userEmail || '—'}</div>
                      </div>
                    </div>
                  </td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div style={{width:3,height:18,background:`var(--${r.eventAccent})`,borderRadius:2}}></div>
                      <div style={{fontSize:12}}>{r.eventTitle || '—'}</div>
                    </div>
                  </td>
                  <td className="mono" style={{fontSize:11,color:'var(--ink3)'}}>{r.appliedAt || '—'}</td>
                  <td className="num">
                    {r.amount ? yen(r.amount) : "無料"}
                    {r.paid && <span className="badge badge-green" style={{fontSize:9,marginLeft:4}}>済</span>}
                  </td>
                  <td>
                    <span className={clsx("badge",
                      r.status==="確定"?"badge-green"
                      : r.status==="未決済"?"badge-amber"
                      : r.status==="チェックイン済"?"badge-indigo"
                      : "badge-ink")}>
                      <span className="badge-dot"></span>{r.status}
                    </span>
                  </td>
                  <td>
                    <div className="row-actions">
                      <button className="btn btn-soft btn-sm btn-icon" title="メール送信" disabled><Icon n="mail" s={12}/></button>
                      {r.status !== "キャンセル" && (
                        <button className="btn btn-soft btn-sm btn-icon" title="申込をキャンセル" onClick={()=>handleCancel(r.id)}>
                          <Icon n="trash" s={12}/>
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {showModal && (
        <RegistrationModal
          events={events}
          participants={participants}
          onSave={handleSave}
          onCancel={()=>setShowModal(false)}
        />
      )}
    </div>
  );
}

// -------------------- PageSatisfaction --------------------

/**
 * 満足度調査。NPS、回答率、自由回答などを集計表示。
 * Phase 4新で実アンケートデータと接続。
 */
function PageSatisfaction(){
  // connec+a 文脈の自由回答サンプル
  const comments = [];

  // 回答分布 (5★〜1★)
  const dist = [];
  const distTotal = dist.reduce((s, [,v]) => s + v, 0);

  return (
    <div className="page" data-page="satisfaction">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>イベント</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>満足度調査</span></div>
          <h1>満足度 <i>調査</i></h1>
          <div className="ph-sub">イベント後アンケートの結果と経時変化。セグメント別比較も可能。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost"><Icon n="download" s={14}/> レポート</button>
          <button className="btn btn-indigo"><Icon n="plus" s={14}/> 調査を作成</button>
        </div>
      </div>

      <div className="kpi-grid">
        <Kpi label="平均満足度" unit="/5" value="—" delta="—" flat sparkData={[4.1,4.2,4.2,4.3,4.3,4.4,4.4]}/>
        <Kpi label="回答率"     unit="%"  value="—" delta="—" flat sparkData={[62,63,64,66,65,67,68]}    color="var(--coral)"/>
        <Kpi label="NPS"        unit=""   value="—" delta="—" flat sparkData={[40,42,44,45,46,47,47]}    color="var(--violet)"/>
        <Kpi label="リピート意向" unit="%" value="—" delta="—" flat sparkData={[78,79,80,81,81,82,82]}    color="var(--green)"/>
      </div>

      <div className="grid-ab">
        <div className="card">
          <div className="card-head"><div className="card-title">イベント別 満足度</div></div>
          <div className="card-body" style={{padding:0}}>
            {EVENTS.slice(0, 5).map((e, i) => {
              const score = (4.1 + (i % 3) * 0.3).toFixed(1);
              const responses = Math.round(e.registered * 0.68);
              return (
                <div key={e.id} style={{padding:"14px 18px",borderTop:i?"1px solid var(--line)":"none",display:'grid',gridTemplateColumns:'1fr 140px 60px',gap:14,alignItems:'center'}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{e.title}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>{e.date} · {responses}件回答</div>
                  </div>
                  <div>
                    <div className="bar" style={{height:6}}>
                      <div className="bar-fill" style={{width:(score/5*100)+"%",background:score>=4.5?"var(--green)":score>=4?"var(--indigo)":"var(--amber)"}}></div>
                    </div>
                  </div>
                  <div style={{fontFamily:'var(--serif)',fontSize:24,textAlign:'right',color:'var(--ink)'}}>{score}</div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="card">
          <div className="card-head"><div className="card-title">回答分布</div></div>
          <div className="card-body">
            {dist.map(([l, v, c], i) => {
              const pct = Math.round(v / distTotal * 100);
              return (
                <div key={i} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
                    <span style={{letterSpacing:2,color:'var(--amber)'}}>{l}</span>
                    <span className="mono" style={{color:'var(--ink3)'}}>{v} <span style={{color:'var(--ink5)'}}>({pct}%)</span></span>
                  </div>
                  <div className="bar"><div className="bar-fill" style={{width:pct+"%",background:`var(--${c})`}}></div></div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="card mt16">
        <div className="card-head">
          <div className="card-title">自由回答 (直近)</div>
          <button className="btn btn-soft btn-sm"><Icon n="sparkle" s={12}/> AI要約</button>
        </div>
        <div className="card-body" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          {comments.map((r, i) => (
            <div key={i} style={{padding:14,background:'var(--bg2)',borderRadius:10,border:'1px solid var(--line)'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <div className={`avatar sm ${["indigo","coral","teal","violet"][i]}`}>{r.n[0]}</div>
                <div style={{flex:1,fontSize:12,fontWeight:600}}>{r.n}</div>
                <div style={{color:'var(--amber)',letterSpacing:2,fontSize:12}}>{"★".repeat(r.s)}</div>
              </div>
              <div style={{fontSize:12.5,color:'var(--ink2)',lineHeight:1.6}}>{r.c}</div>
              <div style={{fontSize:11,color:'var(--ink4)',marginTop:6}}>{r.d}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

window.PageEvents = PageEvents;
window.PageRegistrations = PageRegistrations;
window.PageSatisfaction = PageSatisfaction;
</script>

function PageMail(){
  const [tab, setTab] = useState("compose");

  const sentRows = [];

  const tabs = [
    ["compose",   "作成",     null],
    ["scheduled", "予約",     0],
    ["sent",      "送信済み", 0],
    ["analytics", "分析",     null],
  ];
