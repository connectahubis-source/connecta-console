            {step === 4 && (
              <div className="stack" style={{gap:16}}>
                <div style={{padding:14,background:'var(--indigo-50)',borderLeft:'3px solid var(--indigo)',borderRadius:6,fontSize:12,color:'var(--ink3)'}}>
                  <Icon n="info" s={12}/> 参加費と支払い方法を設定します。
                </div>
                {format !== 'multi' && (
                  <div className="field">
                    <label className="field-label">料金タイプ <span className="field-req">*</span></label>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      {[
                        {val:'paid', label:'有料', hint:'参加費あり'},
                        {val:'free', label:'無料', hint:'参加費 0 円'},
                      ].map(opt => (
                        <label key={opt.val} style={{
                          display:'flex',alignItems:'center',gap:6,
                          padding:'8px 14px',borderRadius:999,
                          border: feeType === opt.val ? '2px solid #0a2960' : '1px solid var(--line)',
                          background: feeType === opt.val ? '#eef2ff' : '#fff',
                          cursor:'pointer',fontSize:13,fontWeight: feeType === opt.val ? 600 : 400,
                          color: feeType === opt.val ? '#0a2960' : 'var(--ink2)',
                          transition:'all 0.15s ease',
                        }}>
                          <input type="radio" name="event-feetype" value={opt.val}
                            checked={feeType === opt.val}
                            onChange={e => setFeeType(e.target.value)}
                            style={{margin:0}}/>
                          <span>{opt.label}</span>
                          <span style={{fontSize:10,color:'var(--ink3)',fontWeight:400}}>({opt.hint})</span>
                        </label>
                      ))}
                    </div>
                    <div className="field-hint">参加者サイトの料金フィルタで使用されます (複数セッションの場合は各セッションの参加費から自動判定)</div>
                  </div>
                )}
                <div className="grid-2">
                  <div className="field">
                    <label className="field-label">参加費 (円)</label>
                    <input className="input" type="number" min="0" value={fee} onChange={e=>setFee(e.target.value)} placeholder="例: 3000 (無料は 0)"/>
                  </div>
                  <div className="field">
                    <label className="field-label">支払い方法 <span style={{fontSize:10,color:'var(--ink4)',fontWeight:400}}>(複数選択可)</span></label>

                      {[
                        {v:'無料', desc:''},
                        {v:'当日現金', desc:''},
                        {v:'銀行振込', desc:''},
                        {v:'PayPay', desc:''},
                        {v:'Stripe', desc:'(将来)'},
                      ].map(opt => {
                        const checked = paymentMethods.includes(opt.v);
                        return (
                          <label key={opt.v} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:checked ? 'var(--indigo-50)' : 'var(--bg2)',borderRadius:6,cursor:'pointer',fontSize:12,border:`1px solid ${checked ? 'var(--indigo)' : 'transparent'}`}}>
                            <input type="checkbox" checked={checked}
                              onChange={() => {
                                if (checked) {
                                  // 最後の1つは消せない
                                  if (paymentMethods.length > 1) {
                                    setPaymentMethods(paymentMethods.filter(m => m !== opt.v));
                                  }
                                } else {
                                  setPaymentMethods([...paymentMethods, opt.v]);
                                }
                              }}/>
                            <span style={{color:checked ? 'var(--indigo)' : 'var(--ink2)',fontWeight: checked ? 600 : 400}}>
                              {opt.v} <span style={{fontSize:10,color:'var(--ink4)'}}>{opt.desc}</span>
                            </span>
                          </label>
                        );
                      })}
                    </div>
                    <div className="field-hint">参加者には選択された方法を全て表示</div>
                  </div>
                </div>
                <div className="field">
                  <label className="field-label">早割 (任意)</label>
                  <IMEInput className="input" value={earlyBird} onChange={e=>setEarlyBird(e.target.value)} placeholder="例: 申込締切1週間前まで 2,500円"/>
                </div>
                <div className="field">
                  <label className="field-label">キャンセルポリシー</label>
                  <IMETextarea className="input" style={{height:80,padding:10,resize:'vertical'}} value={cancelPolicy} onChange={e=>setCancelPolicy(e.target.value)} placeholder="例:&#10;- 開催3日前まで: 全額返金&#10;- 開催前日: 50%返金&#10;- 当日: 返金なし"/>

              </div>

            {step === 5 && (
              <div className="stack" style={{gap:16}}>
                <div style={{padding:14,background:'var(--green-50)',borderLeft:'3px solid var(--green)',borderRadius:6,fontSize:12,color:'var(--ink3)'}}>

                </div>

                <div className="card" style={{background:'var(--bg2)',padding:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',letterSpacing:'.05em',marginBottom:10}}>📋 確認事項</div>
                  <table style={{fontSize:12,width:'100%'}}>
                    <tbody>
                      <tr><td style={{padding:'4px 12px 4px 0',color:'var(--ink4)'}}>イベント名</td><td>{title || <span style={{color:'var(--coral)'}}>未入力</span>}</td></tr>

                      <tr><td style={{padding:'4px 12px 4px 0',color:'var(--ink4)'}}>開催形式</td><td>{format === 'multi' ? <span style={{color:'var(--violet)',fontWeight:600}}>複数セッション ({sessions.length}日間)</span> : '単一日程'}</td></tr>

                        <React.Fragment>
                          {sessions.length === 0 ? (
                            <tr><td colSpan={2} style={{padding:'8px 0',color:'var(--coral)'}}>セッションが登録されていません</td></tr>

                            sessions.map((s, i) => {
                              const sFee = s.fee != null && s.fee !== '' ? Number(s.fee) : null;
                              const sCap = s.capacity || '';
                              return (
                                <tr key={i} style={{borderTop:'1px dotted var(--line)'}}>
                                  <td style={{padding:'6px 12px 6px 0',color:'var(--ink4)',verticalAlign:'top'}}>
                                    <span style={{display:'inline-block',background:'var(--violet-50)',color:'var(--violet)',fontWeight:700,padding:'2px 8px',borderRadius:4,fontSize:10,letterSpacing:'.03em'}}>

                                    </span>
                                  </td>
                                  <td style={{padding:'6px 0',fontSize:11,lineHeight:1.7}}>
                                    {s.name && <div style={{fontWeight:600,color:'var(--ink)',marginBottom:2}}>{s.name}</div>}
                                    <div style={{color:'var(--ink2)'}}>
                                      {s.date ? (
                                        <span>{s.date}{(s.startTime || s.endTime) ? ` ${fmtTimeRange(s.startTime, s.endTime)}` : ''}</span>
                                      ) : (
                                        <span style={{color:'var(--coral)'}}>日程未設定</span>
                                      )}
                                      {' · '}
                                      {s.online ? 'オンライン' : (s.venue || <span style={{color:'var(--coral)'}}>会場未設定</span>)}
                                      {' · '}
                                      定員 {sCap || '無制限'}
                                      {' · '}
                                      {sFee && sFee > 0 ? `¥${sFee.toLocaleString()}` : '無料'}
                                    </div>
                                  </td>
                                </tr>
                              );
                            })
                          )}
                          <tr style={{borderTop:'1px solid var(--line)'}}>
                            <td style={{padding:'8px 12px 4px 0',color:'var(--ink4)'}}>合計定員</td>
                            <td style={{padding:'8px 0 4px'}}>
                              {(() => {
                                const totalCap = sessions.reduce((sum, s) => sum + (Number(s.capacity) || 0), 0);
                                return totalCap > 0 ? `${totalCap}名` : '無制限';
                              })()}
                            </td>
                          </tr>
                          <tr>
                            <td style={{padding:'4px 12px 4px 0',color:'var(--ink4)'}}>参加費</td>
                            <td>
                              {(() => {
                                const fees = sessions.map(s => Number(s.fee) || 0).filter(f => f > 0);
                                if (fees.length === 0) return '全セッション無料';
                                const min = Math.min(...fees);
                                const max = Math.max(...fees);
                                if (min === max && fees.length === sessions.length) return `¥${min.toLocaleString()} / セッション`;
                                return `¥${min.toLocaleString()}〜¥${max.toLocaleString()}`;
                              })()}
                            </td>
                          </tr>
                        </React.Fragment>
                      ) : (
                        <React.Fragment>
                          <tr><td style={{padding:'4px 12px 4px 0',color:'var(--ink4)'}}>日程</td><td>{date ? `${date} ${time || ''}` : <span style={{color:'var(--coral)'}}>未設定</span>}</td></tr>
                          <tr><td style={{padding:'4px 12px 4px 0',color:'var(--ink4)'}}>会場</td><td>{venue || <span style={{color:'var(--coral)'}}>未設定</span>}</td></tr>
                          <tr><td style={{padding:'4px 12px 4px 0',color:'var(--ink4)'}}>定員</td><td>{capacity || '無制限'}</td></tr>
                          <tr><td style={{padding:'4px 12px 4px 0',color:'var(--ink4)'}}>参加費</td><td>{fee ? `¥${Number(fee).toLocaleString()}` : '無料'}</td></tr>
                        </React.Fragment>
                      )}
                    </tbody>
                  </table>
                </div>

                <div className="field">
                  <label className="field-label">公開ステータス</label>

                    <select className="input select" value={status} onChange={e=>setStatus(e.target.value)}>
                      <option value="下書き">下書き (非公開)</option>
                      <option value="公開中">公開中 (申込受付)</option>
                      <option value="満員">満員</option>
                    </select>
                  </div>
                  <div className="field-hint">「下書き」のままでも、下の「公開予約日時」を設定すれば自動的に公開されます。</div>
                </div>

                {/* 公開予約日時 (Phase 6.2) */}
                <div className="field">
                  <label className="field-label">公開予約日時 (任意)</label>
                  <input
                    className="input"
                    type="datetime-local"
                    value={publishAt}
                    onChange={e=>setPublishAt(e.target.value)}
                  />
                  <div className="field-hint">
                    {publishAt ? (
                      (() => {
                        const dt = new Date(publishAt);
                        const now = new Date();
                        if (isNaN(dt.getTime())) return '日時の形式が不正です';
                        if (dt <= now) {
                          return `📅 設定日時を既に過ぎています (${dt.toLocaleString('ja-JP')}) → 既に公開扱いです`;
                        }
                        const diffMs = dt - now;
                        const diffH = Math.floor(diffMs / (1000 * 60 * 60));
                        const diffD = Math.floor(diffH / 24);
                        const remain = diffD > 0 ? `${diffD}日${diffH % 24}時間後` : `${diffH}時間後`;
                        return `📅 ${dt.toLocaleString('ja-JP')} (${remain}) に自動公開`;
                      })()
                    ) : (
                      'ステータスが「下書き」でも、この日時を過ぎれば参加者サイトで公開されます。空欄ならステータス通りに動作します。'
                    )}
                  </div>
                  {publishAt && (
                    <button
                      type="button"
                      className="btn btn-soft btn-sm"
                      onClick={() => setPublishAt('')}
                      style={{marginTop:8,color:'var(--coral)'}}>
                      <Icon n="x" s={12}/> 公開予約をクリア
                    </button>
                  )}
                </div>
                <div className="field">
                  <label className="field-label">SNS告知文 (任意)</label>
                  <IMETextarea className="input" style={{height:80,padding:10,resize:'vertical'}} value={snsCopy} onChange={e=>setSnsCopy(e.target.value)} placeholder="例: 🌸 春の鎌倉散策イベント開催! 桜咲く古都を一緒に巡りませんか? #connecta #IFT"/>
                  <div className="field-hint">Twitter/Instagram 用、240字以内推奨</div>
                </div>

                {/* ポスター画像 (Phase 6) - 縦長ポスター */}
                <div className="field" style={{padding:16,background:'var(--bg2)',borderRadius:10,border:'1px solid var(--line)'}}>
                  <label className="field-label" style={{fontWeight:700,fontSize:13,marginBottom:6}}>
                    🖼 ポスター画像 (縦長 / 任意)
                  </label>
                  <div className="field-hint" style={{marginBottom:10}}>
                    参加者ページの「近日開催」一覧で左に表示されます (縦長推奨、A4比率など)。URL を貼り付けるか、ファイルをアップロードしてください (最大 15MB、JPG/PNG/WebP — 自動で 1600px に圧縮されます)。
                  </div>

                  {/* URL入力 */}
                  <input
                    className="input"
                    value={posterUrl}
                    onChange={e=>setPosterUrl(e.target.value)}
                    placeholder="https://... または下のボタンからアップロード"
                    style={{marginBottom:10}}
                  />

                  {/* ファイルアップロード */}
                  <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                    <label className={clsx("btn", posterUploading ? "btn-soft" : "btn-soft")} style={{cursor:posterUploading?'wait':'pointer',opacity:posterUploading?0.6:1}}>
                      <Icon n="upload" s={14}/>
                      {posterUploading ? ' アップロード中…' : ' ファイルを選択'}
                      <input
                        type="file"
                        accept="image/jpeg,image/png,image/webp"
                        style={{display:'none'}}
                        disabled={posterUploading}
                        onChange={async (e) => {
                          const file = e.target.files && e.target.files[0];
                          if (!file) return;
                          // 元ファイルの上限 (圧縮しても巨大すぎる場合のガード)
                          if (file.size > 15 * 1024 * 1024) {
                            window.toast.error('画像が大きすぎます (最大 15MB)');
                            e.target.value = '';
                            return;
                          }
                          setPosterUploading(true);
                          try {
                            // クライアント側でリサイズ + JPEG 圧縮 (Phase 6.5)
                            // ポスターは縦長 → 長辺 1600px で十分。上限超え対策。
                            const compressed = await window.compressImage(file, {
                              maxLong: 1600,
                              quality: 0.82,
                            });

                            const result = await window.postData('uploadPosterImage', {
                              filename: file.name.replace(/\.[^.]+$/, '.jpg'),
                              mimeType: compressed.mimeType,
                              dataBase64: compressed.dataBase64,
                              eventId: editId || '',
                            });

                            if (result && result.url) {
                              setPosterUrl(result.url);
                              const saved = compressed.originalSize - compressed.compressedSize;
                              const msg = saved > 50 * 1024
                                ? `ポスターをアップロードしました (${window.formatBytes(compressed.originalSize)} → ${window.formatBytes(compressed.compressedSize)})`
                                : 'ポスターをアップロードしました';
                              window.toast.success(msg);
                            } else {
                              throw new Error('アップロード結果が不正です');
                            }
                          } catch (err) {
                            window.toast.error('アップロード失敗: ' + (err.message || err));
                          } finally {
                            setPosterUploading(false);
                            e.target.value = '';
                          }
                        }}
                      />
                    </label>
                    {posterUrl && (
                      <button
                        type="button"
                        className="btn btn-soft btn-sm"
                        onClick={() => setPosterUrl('')}
                        style={{color:'var(--coral)'}}>
                        <Icon n="x" s={12}/> クリア
                      </button>
                    )}
                  </div>
                </div>

                {/* ヒーロー画像 (Phase 6.1) - 横長ヒーロー画像 */}

                  </div>

                    className="input"
                    value={heroImageUrl}
                    onChange={e=>setHeroImageUrl(e.target.value)}
                    placeholder="https://... または下のボタンからアップロード"
                    style={{marginBottom:10}}
                  />

                  <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                    <label className={clsx("btn", heroUploading ? "btn-soft" : "btn-soft")} style={{cursor:heroUploading?'wait':'pointer',opacity:heroUploading?0.6:1}}>
                      <Icon n="upload" s={14}/>
                      {heroUploading ? ' アップロード中…' : ' ファイルを選択'}
                      <input
                        type="file"
                        accept="image/jpeg,image/png,image/webp"

                        disabled={heroUploading}
                        onChange={async (e) => {
                          const file = e.target.files && e.target.files[0];
                          if (!file) return;
                          if (file.size > 15 * 1024 * 1024) {
                            window.toast.error('画像が大きすぎます (最大 15MB)');
                            e.target.value = '';
                            return;
                          }
                          setHeroUploading(true);
                          try {
                            // クライアント側でリサイズ + JPEG 圧縮 (Phase 6.5)
                            // ヒーローは横長 → 長辺 2000px (高解像度ディスプレイにも耐える)
                            const compressed = await window.compressImage(file, {
                              maxLong: 2000,
                              quality: 0.82,
                            });

                            const result = await window.postData('uploadPosterImage', {
                              filename: 'hero-' + file.name.replace(/\.[^.]+$/, '.jpg'),
                              mimeType: compressed.mimeType,
                              dataBase64: compressed.dataBase64,
                              eventId: editId || '',
                            });

                            if (result && result.url) {
                              setHeroImageUrl(result.url);
                              const saved = compressed.originalSize - compressed.compressedSize;
                              const msg = saved > 50 * 1024
                                ? `ヒーロー画像をアップロードしました (${window.formatBytes(compressed.originalSize)} → ${window.formatBytes(compressed.compressedSize)})`
                                : 'ヒーロー画像をアップロードしました';
                              window.toast.success(msg);
                            } else {
                              throw new Error('アップロード結果が不正です');
                            }
                          } catch (err) {
                            window.toast.error('アップロード失敗: ' + (err.message || err));
                          } finally {
                            setHeroUploading(false);
                            e.target.value = '';
                          }
                        }}
                      />
                    </label>
                    {heroImageUrl && (
                      <button
                        type="button"
                        className="btn btn-soft btn-sm"
                        onClick={() => setHeroImageUrl('')}
                        style={{color:'var(--coral)'}}>
                        <Icon n="x" s={12}/> クリア
                      </button>
                    )}
                  </div>
                </div>

                {/* (Phase 7.2) ヒーローオーバーレイエディタ — 画像 + テキスト/図形 */}
                {heroImageUrl && (
                  <div className="field" style={{marginTop:16,padding:16,background:'#fff',borderRadius:10,border:'1px solid var(--line)'}}>
                    <label className="field-label" style={{fontWeight:700,fontSize:13,marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span>🎨 オーバーレイ (テキスト・図形)</span>
                      <span style={{fontSize:11,fontWeight:400,color:'var(--ink2)'}}>{(heroOverlay||[]).length} 個</span>
                    </label>
                    <div className="field-hint" style={{marginBottom:12}}>
                      画像の上にテキストや図形を重ねられます。各オブジェクトはドラッグで位置調整、選択後にプロパティを編集できます。
                    </div>

                    {/* 追加ボタン */}
                    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
                      <button type="button" className="btn btn-soft btn-sm" onClick={() => {
                        const id = 'ov_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
                        const newItem = {id, type:'text', text:'テキスト', x:30, y:40, w:40, h:10, fontSize:36, color:'#ffffff', fontFamily:'"Caveat", cursive', fontWeight:400, textAlign:'center', rotation:0};
                        setHeroOverlay([...(heroOverlay||[]), newItem]);
                        setSelectedOverlayId(id);
                      }}>+ テキスト</button>
                      <button type="button" className="btn btn-soft btn-sm" onClick={() => {
                        const id = 'ov_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
                        const newItem = {id, type:'circle', x:35, y:35, w:20, h:30, color:'rgba(255,255,255,0.3)', borderColor:'#ffffff', borderWidth:2, rotation:0};
                        setHeroOverlay([...(heroOverlay||[]), newItem]);
                        setSelectedOverlayId(id);
                      }}>+ ●丸</button>
                      <button type="button" className="btn btn-soft btn-sm" onClick={() => {
                        const id = 'ov_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
                        const newItem = {id, type:'rect', x:30, y:40, w:40, h:20, color:'rgba(255,255,255,0.3)', borderColor:'#ffffff', borderWidth:2, rotation:0};
                        setHeroOverlay([...(heroOverlay||[]), newItem]);
                        setSelectedOverlayId(id);
                      }}>+ ■四角</button>
                      <button type="button" className="btn btn-soft btn-sm" onClick={() => {
                        const id = 'ov_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
                        const newItem = {id, type:'triangle', x:35, y:35, w:30, h:30, color:'rgba(255,255,255,0.3)', borderColor:'#ffffff', borderWidth:2, rotation:0};
                        setHeroOverlay([...(heroOverlay||[]), newItem]);
                        setSelectedOverlayId(id);
                      }}>+ ▲三角</button>
                      {(heroOverlay||[]).length > 0 && (
                        <button type="button" className="btn btn-soft btn-sm" onClick={() => {
                          if (window.confirm('すべてのオーバーレイを削除しますか？')) {
                            setHeroOverlay([]);
                            setSelectedOverlayId(null);
                          }
                        }} style={{color:'var(--coral)',marginLeft:'auto'}}>すべて削除</button>
                      )}
                    </div>

                    {/* プレビュー (画像 + オーバーレイ) */}
                    <div style={{
                      position:'relative',
                      width:'100%',
                      aspectRatio:'16/9',
                      background: '#0a2960 url('+heroImageUrl+') center/cover no-repeat',
                      borderRadius:8,
                      overflow:'hidden',
                      border:'1px solid var(--line)',
                      cursor: selectedOverlayId ? 'default' : 'pointer',
                      userSelect: 'none',
                    }}
                      onClick={(e) => { if (e.target === e.currentTarget) setSelectedOverlayId(null); }}
                    >
                      {(heroOverlay||[]).map((item) => {
                        const isSelected = item.id === selectedOverlayId;
                        const baseStyle = {
                          position:'absolute',
                          left: item.x + '%',
                          top: item.y + '%',
                          width: item.w + '%',
                          height: item.h + '%',
                          transform: `rotate(${item.rotation||0}deg)`,
                          cursor: 'move',
                          outline: isSelected ? '2px dashed #2c89e8' : 'none',
                          outlineOffset: 2,
                          boxSizing: 'border-box',
                        };
                        // ドラッグハンドラ
                        const onMouseDown = (e) => {
                          e.stopPropagation();
                          setSelectedOverlayId(item.id);
                          const container = e.currentTarget.parentElement;
                          const rect = container.getBoundingClientRect();
                          const startX = e.clientX;
                          const startY = e.clientY;
                          const startItemX = item.x;
                          const startItemY = item.y;
                          const onMove = (mv) => {
                            const dx = ((mv.clientX - startX) / rect.width) * 100;
                            const dy = ((mv.clientY - startY) / rect.height) * 100;
                            setHeroOverlay(prev => prev.map(o => o.id === item.id ? {...o, x: Math.max(0, Math.min(100-o.w, startItemX + dx)), y: Math.max(0, Math.min(100-o.h, startItemY + dy))} : o));
                          };
                          const onUp = () => {
                            window.removeEventListener('mousemove', onMove);
                            window.removeEventListener('mouseup', onUp);
                          };
                          window.addEventListener('mousemove', onMove);
                          window.addEventListener('mouseup', onUp);
                        };
                        if (item.type === 'text') {
                          return (
                            <div key={item.id} onMouseDown={onMouseDown} style={{
                              ...baseStyle,
                              display:'flex',
                              alignItems:'center',
                              justifyContent: item.textAlign === 'left' ? 'flex-start' : item.textAlign === 'right' ? 'flex-end' : 'center',
                              fontSize: item.fontSize + 'px',
                              color: item.color,
                              fontFamily: item.fontFamily,
                              fontWeight: item.fontWeight,
                              textAlign: item.textAlign,
                              lineHeight: 1.1,
                              whiteSpace: 'pre-wrap',
                              wordBreak: 'break-word',
                              padding: 4,
                            }}>{item.text || ''}</div>
                          );
                        } else if (item.type === 'circle') {
                          return (
                            <div key={item.id} onMouseDown={onMouseDown} style={{
                              ...baseStyle,
                              borderRadius: '50%',
                              background: item.color,
                              border: `${item.borderWidth || 0}px solid ${item.borderColor || 'transparent'}`,
                            }}/>
                          );
                        } else if (item.type === 'rect') {
                          return (
                            <div key={item.id} onMouseDown={onMouseDown} style={{
                              ...baseStyle,
                              background: item.color,
                              border: `${item.borderWidth || 0}px solid ${item.borderColor || 'transparent'}`,
                            }}/>
                          );
                        } else if (item.type === 'triangle') {
                          // SVGで三角形 (回転は親のtransform)
                          return (
                            <div key={item.id} onMouseDown={onMouseDown} style={baseStyle}>
                              <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style={{display:'block'}}>
                                <polygon points="50,5 95,95 5,95" fill={item.color} stroke={item.borderColor || 'transparent'} strokeWidth={item.borderWidth || 0}/>
                              </svg>
                            </div>
                          );
                        }
                        return null;
                      })}
                    </div>

                    {/* 選択中オブジェクトのプロパティ編集 */}
                    {selectedOverlayId && (() => {
                      const sel = (heroOverlay||[]).find(o => o.id === selectedOverlayId);
                      if (!sel) return null;
                      const update = (patch) => {
                        setHeroOverlay(prev => prev.map(o => o.id === sel.id ? {...o, ...patch} : o));
                      };
                      const remove = () => {
                        setHeroOverlay(prev => prev.filter(o => o.id !== sel.id));
                        setSelectedOverlayId(null);
                      };
                      const fontOptions = [
                        {label:'手書き(英) Caveat', val:'"Caveat", cursive'},
                        {label:'手書き(英) Kalam', val:'"Kalam", cursive'},
                        {label:'マーカー(英) Permanent Marker', val:'"Permanent Marker", cursive'},
                        {label:'筆風(日) Yuji Mai', val:'"Yuji Mai", serif'},
                        {label:'筆字(日) Yuji Boku', val:'"Yuji Boku", serif'},
                        {label:'丸手書き(日) Klee One', val:'"Klee One", cursive'},
                        {label:'ペン書き(日) Zen Kurenaido', val:'"Zen Kurenaido", sans-serif'},
                        {label:'ポップ手書き(日) Hachi Maru Pop', val:'"Hachi Maru Pop", cursive'},
                        {label:'セリフ(英) Fraunces italic', val:'"Fraunces", serif'},
                        {label:'ゴシック(日) Zen Kaku Gothic New', val:'"Zen Kaku Gothic New", sans-serif'},
                      ];
                      return (
                        <div style={{marginTop:12,padding:12,background:'var(--bg2)',borderRadius:8,border:'1px solid var(--line)'}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                            <strong style={{fontSize:12}}>{
                              sel.type === 'text' ? '📝 テキスト' :
                              sel.type === 'circle' ? '● 丸' :
                              sel.type === 'rect' ? '■ 四角' :
                              sel.type === 'triangle' ? '▲ 三角' : ''
                            } の編集</strong>
                            <button type="button" className="btn btn-soft btn-sm" onClick={remove} style={{color:'var(--coral)'}}>削除</button>
                          </div>

                          {/* テキスト固有 */}
                          {sel.type === 'text' && (
                            <React.Fragment>
                              <div style={{marginBottom:8}}>
                                <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>テキスト</label>
                                <textarea className="input" value={sel.text || ''} onChange={e => update({text: e.target.value})} rows={2} style={{fontFamily:sel.fontFamily}}/>
                              </div>
                              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                                <div>
                                  <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>フォント</label>
                                  <select className="input" value={sel.fontFamily} onChange={e => update({fontFamily: e.target.value})}>
                                    {fontOptions.map(f => <option key={f.val} value={f.val}>{f.label}</option>)}
                                  </select>
                                </div>
                                <div>
                                  <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>太さ</label>
                                  <select className="input" value={sel.fontWeight} onChange={e => update({fontWeight: parseInt(e.target.value)})}>
                                    <option value="400">通常 (400)</option>
                                    <option value="500">中太 (500)</option>
                                    <option value="600">太め (600)</option>
                                    <option value="700">太字 (700)</option>
                                  </select>
                                </div>
                              </div>
                              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:8}}>
                                <div>
                                  <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>サイズ (px)</label>
                                  <input type="number" className="input" value={sel.fontSize} onChange={e => update({fontSize: parseInt(e.target.value) || 16})} min="8" max="200"/>
                                </div>
                                <div>
                                  <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>色</label>
                                  <input type="color" className="input" value={sel.color} onChange={e => update({color: e.target.value})} style={{padding:2,height:36}}/>
                                </div>
                                <div>
                                  <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>揃え</label>
                                  <select className="input" value={sel.textAlign} onChange={e => update({textAlign: e.target.value})}>
                                    <option value="left">左</option>
                                    <option value="center">中央</option>
                                    <option value="right">右</option>
                                  </select>
                                </div>
                              </div>
                            </React.Fragment>
                          )}

                          {/* 図形固有 */}
                          {(sel.type === 'circle' || sel.type === 'rect' || sel.type === 'triangle') && (
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:8}}>
                              <div>
                                <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>塗り色</label>
                                <input type="color" className="input" value={(sel.color||'').startsWith('rgba')?'#ffffff':sel.color} onChange={e => update({color: e.target.value})} style={{padding:2,height:36}}/>
                              </div>
                              <div>
                                <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>枠色</label>
                                <input type="color" className="input" value={sel.borderColor || '#ffffff'} onChange={e => update({borderColor: e.target.value})} style={{padding:2,height:36}}/>
                              </div>
                              <div>
                                <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>枠太さ</label>
                                <input type="number" className="input" value={sel.borderWidth || 0} onChange={e => update({borderWidth: parseInt(e.target.value) || 0})} min="0" max="20"/>
                              </div>
                            </div>
                          )}

                          {/* 共通: 位置・サイズ・回転 */}
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr',gap:8}}>
                            <div>
                              <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>X (%)</label>
                              <input type="number" className="input" value={Math.round(sel.x)} onChange={e => update({x: parseFloat(e.target.value) || 0})} min="0" max="100"/>
                            </div>
                            <div>
                              <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>Y (%)</label>
                              <input type="number" className="input" value={Math.round(sel.y)} onChange={e => update({y: parseFloat(e.target.value) || 0})} min="0" max="100"/>
                            </div>
                            <div>
                              <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>幅 (%)</label>
                              <input type="number" className="input" value={Math.round(sel.w)} onChange={e => update({w: parseFloat(e.target.value) || 10})} min="5" max="100"/>
                            </div>
                            <div>
                              <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>高さ (%)</label>
                              <input type="number" className="input" value={Math.round(sel.h)} onChange={e => update({h: parseFloat(e.target.value) || 10})} min="5" max="100"/>
                            </div>
                            <div>
                              <label style={{fontSize:11,color:'var(--ink2)',display:'block',marginBottom:4}}>回転 (°)</label>
                              <input type="number" className="input" value={sel.rotation || 0} onChange={e => update({rotation: parseInt(e.target.value) || 0})} min="-180" max="180"/>
                            </div>
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                )}
              </div>
            )}

            <div style={{display:'flex',justifyContent:'space-between',marginTop:24,paddingTop:18,borderTop:'1px solid var(--line)'}}>
              <button className="btn btn-ghost" onClick={()=>setStep(Math.max(1, step-1))} disabled={step === 1}>← 戻る</button>
              <button className="btn btn-indigo" onClick={()=>setStep(Math.min(5, step+1))} disabled={step === 5}>次へ →</button>
            </div>
          </div>
        </div>

        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="eye" s={16}/> プレビュー</div></div>
            <div style={{padding:14}}>
              <div style={{background:`linear-gradient(135deg,var(--${accent}-50),var(--bg))`,padding:24,borderRadius:10,marginBottom:10,textAlign:'center'}}>
                <div style={{fontFamily:'var(--serif)',fontSize:11,color:`var(--${accent})`,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase'}}>{category}</div>
                <div style={{fontFamily:'var(--serif)',fontSize:24,letterSpacing:'-.02em',marginTop:4,color:title?'var(--ink)':'var(--ink5)'}}>{title || "イベント名がここに"}</div>
              </div>
              <div style={{fontSize:12,color:summary?'var(--ink3)':'var(--ink5)',lineHeight:1.6}}>{summary || "概要がここに表示されます…"}</div>
              <div style={{display:'flex',gap:8,marginTop:10,fontSize:11,color:'var(--ink4)',flexWrap:'wrap'}}>
                {format === 'multi' ? (
                  <React.Fragment>
                    <span style={{background:'var(--violet-50)',color:'var(--violet)',padding:'2px 8px',borderRadius:4,fontWeight:700}}>
                      📅 {sessions.length}日間開催
                    </span>
                    {sessions.length > 0 && sessions[0].date && (
                      <span><Icon n="cal" s={11}/> {sessions[0].date}〜{sessions[sessions.length-1].date || ''}</span>
                    )}
                    <span><Icon n="users" s={11}/> {(() => {
                      const tc = sessions.reduce((sum, s) => sum + (Number(s.capacity) || 0), 0);
                      return tc > 0 ? `合計 ${tc}名` : '定員未設定';
                    })()}</span>
                    <span><Icon n="yen" s={11}/> {(() => {
                      const fees = sessions.map(s => Number(s.fee) || 0).filter(f => f > 0);
                      if (fees.length === 0) return '無料';
                      const min = Math.min(...fees), max = Math.max(...fees);
                      return min === max ? `${min}円` : `${min}〜${max}円`;
                    })()}</span>
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <span><Icon n="cal" s={11}/> {date || '日程未設定'}</span>
                    <span><Icon n="pin" s={11}/> {venue || '会場未設定'}</span>
                    <span><Icon n="users" s={11}/> {capacity ? `定員 ${capacity}` : '定員未設定'}</span>
                    <span><Icon n="yen" s={11}/> {fee ? `${fee}円` : '無料'}</span>
                  </React.Fragment>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// -------------------- PageQR --------------------

/**
 * QR受付。EVENTS と PARTICIPANTS が空なら EmptyState 表示。
 */
function PageQR(){
  const [events, setEvents] = useState([]);
  const [registrations, setRegistrations] = useState([]);
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [selectedEventId, setSelectedEventId] = useState("");
  const [selectedSessionId, setSelectedSessionId] = useState("");   // multi イベント時のサブセレクター (Phase 6)
  const [sessions, setSessions] = useState([]);                     // 選択中イベントのセッション一覧
  const [scanning, setScanning] = useState(false);
  const [lastResult, setLastResult] = useState(null);   // {type: 'success'|'error'|'duplicate', message, regId, name}
  const [manualQuery, setManualQuery] = useState("");
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const scanIntervalRef = useRef(null);

  // 選択中イベントが multi なら、セッション一覧を取得
  const selectedEventForSessions = events.find(e => e.id === selectedEventId);
  const isMultiEvent = selectedEventForSessions && selectedEventForSessions.format === 'multi';

  useEffect(() => {
    if (!selectedEventId || !isMultiEvent) {
      setSessions([]);
      setSelectedSessionId("");
      return;
    }
    window.fetchData('listEventSessions', { eventId: selectedEventId })
      .then(res => setSessions(Array.isArray(res) ? res : []))
      .catch(() => setSessions([]));
  }, [selectedEventId, isMultiEvent]);

  // データ読み込み
  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [evs, regs, parts] = await Promise.all([
          window.fetchData('listEvents'),
          window.fetchData('listRegistrations'),
          window.fetchData('listParticipants'),
        ]);
        if (cancelled) return;
        setEvents(Array.isArray(evs) ? evs : []);
        setRegistrations(Array.isArray(regs) ? regs : []);
        setParticipants(Array.isArray(parts) ? parts : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // カメラの開始/停止
  async function startScan() {
    if (!selectedEventId) {
      window.toast.warn('先にイベントを選択してください');
      return;
    }
    if (typeof window.jsQR === 'undefined') {
      window.toast.error('QRライブラリの読み込みに失敗しました');
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        videoRef.current.setAttribute('playsinline', 'true');
        videoRef.current.play();
      }
      setScanning(true);
      // QR検出ループ
      scanIntervalRef.current = setInterval(() => detectQR(), 250);
    } catch (err) {
      window.toast.error('カメラへのアクセスが拒否されました: ' + (err.message || err));
    }
  }

  function stopScan() {
    if (scanIntervalRef.current) {
      clearInterval(scanIntervalRef.current);
      scanIntervalRef.current = null;
    }
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setScanning(false);
  }

  // QR検出処理
  function detectQR() {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas || video.readyState !== 4) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    try {
      const code = window.jsQR(imageData.data, imageData.width, imageData.height);
      if (code && code.data) {
        handleScannedCode(code.data);
      }
    } catch (e) {
      // 一回の失敗はスキップ
    }
  }

  // QR コードがスキャンされたら処理
  async function handleScannedCode(data) {
    // 同じ QR を 2 秒以内に再処理しない (どの結果でも)
    if (lastResult && lastResult.scanned === data && lastResult.scannedAt && Date.now() - lastResult.scannedAt < 2000) return;

    // QR データ形式: 「R-00001」(RegID) または「U-0001」(UserID) を想定
    // どちらも対応する
    const reg = registrations.find(r => r.id === data || r.userId === data);
    const now = Date.now();
    if (!reg) {
      setLastResult({type:'error', scanned:data, scannedAt:now, message:'申込が見つかりません', detail:`コード: ${data}`});
      window.toast.error('申込が見つかりません');
      return;
    }
    if (reg.eventId !== selectedEventId) {
      setLastResult({type:'error', scanned:data, scannedAt:now, message:'別イベントの申込です', detail:`${reg.eventTitle} の申込です`});
      window.toast.warn('別イベントの申込です');
      return;
    }
    // multi イベントでセッション指定中なら、申込のセッションIDも一致するかチェック
    if (isMultiEvent && selectedSessionId && reg.sessionId && reg.sessionId !== selectedSessionId) {
      const regSession = sessions.find(s => s.id === reg.sessionId);
      const sessionLabel = regSession ? `Day ${regSession.order}` : 'このセッション';
      setLastResult({type:'error', scanned:data, scannedAt:now, message:'別セッションの申込です', detail:`${sessionLabel} の申込です`});
      window.toast.warn(`別セッションの申込です: ${sessionLabel}`);
      return;
    }
    if (reg.status === 'チェックイン済') {
      setLastResult({type:'duplicate', scanned:data, scannedAt:now, message:'すでにチェックイン済', regId:reg.id, name:reg.userName});
      window.toast.warn(`${reg.userName} さんは既にチェックイン済`);
      return;
    }
    if (reg.status === 'キャンセル') {
      setLastResult({type:'error', scanned:data, scannedAt:now, message:'キャンセル済の申込です', regId:reg.id, name:reg.userName});
      window.toast.error('キャンセル済みの申込');
      return;
    }
    // チェックイン処理
    try {
      await window.postData('updateRegistration', {regId: reg.id, fields: {status: 'チェックイン済'}});
      setRegistrations(prev => prev.map(r => r.id === reg.id ? {...r, status: 'チェックイン済'} : r));
      setLastResult({type:'success', scanned:data, scannedAt:now, message:'チェックイン完了', regId:reg.id, name:reg.userName});
      window.toast.success(`${reg.userName} さんをチェックインしました`);
    } catch (err) {
      window.toast.error('チェックインに失敗: ' + err.message);
    }
  }

  // 手動検索
  async function handleManualSearch() {
    if (!manualQuery.trim()) return;
    if (!selectedEventId) {
      window.toast.warn('先にイベントを選択してください');
      return;
    }
    const q = manualQuery.trim().toLowerCase();
    const reg = registrations.find(r =>
      r.eventId === selectedEventId &&
      ((r.userName || '').toLowerCase().includes(q) ||
       (r.userEmail || '').toLowerCase().includes(q) ||
       (r.id || '').toLowerCase().includes(q) ||
       (r.userId || '').toLowerCase().includes(q))
    );
    if (!reg) {
      window.toast.error('該当する申込が見つかりません');
      return;
    }
    await handleScannedCode(reg.id);
    setManualQuery("");
  }

  // 終了時にカメラを止める
  useEffect(() => {
    return () => stopScan();
  }, []);

  // 選択イベントの統計 (セッション指定があれば、そのセッションの参加者のみ集計)
  const eventRegs = registrations.filter(r => {
    if (r.eventId !== selectedEventId) return false;
    if (r.status === 'キャンセル') return false;
    if (isMultiEvent && selectedSessionId && r.sessionId !== selectedSessionId) return false;
    return true;
  });
  const checkedInCount = eventRegs.filter(r => r.status === 'チェックイン済').length;
  const totalRegCount = eventRegs.length;
  const selectedEvent = events.find(e => e.id === selectedEventId);
  const visibleEvents = events.filter(e => e.status !== "アーカイブ");
  const selectedSession = sessions.find(s => s.id === selectedSessionId);

  return (
    <div className="page" data-page="qr">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>イベント</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>QR照会 / 受付</span></div>
          <h1>QR照会 / <i>受付</i></h1>
          <div className="ph-sub">当日受付。QRコードをカメラで読み取り、申込者を即座にチェックイン。</div>
        </div>
        <div className="ph-right">
          {scanning ? (

/**
 * 当日タイムライン (グリッド形式)。EVENTS が空なら EmptyState 表示。
 */
function PageSchedule(){
  const [events, setEvents] = useState([]);
  const [todos, setTodos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  // 表示する月 (今月をデフォルト)
  const today = new Date();
  const [viewMonth, setViewMonth] = useState({y: today.getFullYear(), m: today.getMonth()});

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [evs, tds] = await Promise.all([
          window.fetchData('listEvents'),
          window.fetchData('listTodos'),
        ]);
        if (cancelled) return;
        setEvents(Array.isArray(evs) ? evs : []);
        setTodos(Array.isArray(tds) ? tds : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // 月の日付を組み立てる
  function getMonthDays(y, m) {
    const firstDay = new Date(y, m, 1);
    const lastDay = new Date(y, m + 1, 0);
    const startDayOfWeek = firstDay.getDay();   // 0=日, 1=月...
    const daysInMonth = lastDay.getDate();

    // 先頭は前月の日を埋める
    const days = [];
    for (let i = 0; i < startDayOfWeek; i++) {
      const d = new Date(y, m, 1 - (startDayOfWeek - i));
      days.push({date: d, inMonth: false});
    }
    for (let i = 1; i <= daysInMonth; i++) {
      days.push({date: new Date(y, m, i), inMonth: true});
    }
    // 末尾は次月の日で 7×6=42 になるよう調整
    while (days.length < 42) {
      const last = days[days.length - 1].date;
      const next = new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1);
      days.push({date: next, inMonth: false});
    }
    return days;
  }

  function dateToStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  const days = getMonthDays(viewMonth.y, viewMonth.m);

  // 各日付に表示するイベント・Todo を集める
  function getItemsAt(dateStr) {
    const evs = events.filter(e => e.date === dateStr && e.status !== "アーカイブ");
    const tds = todos.filter(t => !t.done && t.deadline === dateStr);
    return {events: evs, todos: tds};
  }

  // 月切替
  function prevMonth() {
    setViewMonth(v => {
      const m = v.m - 1;
      return m < 0 ? {y: v.y - 1, m: 11} : {y: v.y, m};
    });
  }
  function nextMonth() {
    setViewMonth(v => {
      const m = v.m + 1;
      return m > 11 ? {y: v.y + 1, m: 0} : {y: v.y, m};
    });
  }
  function goToday() {
    setViewMonth({y: today.getFullYear(), m: today.getMonth()});
  }

  const todayStr = dateToStr(today);
  const monthLabel = `${viewMonth.y}年 ${viewMonth.m + 1}月`;

  // 今月のサマリー
  const monthEvents = events.filter(e => {
    const d = new Date(e.date);
    return !isNaN(d.getTime()) && d.getFullYear() === viewMonth.y && d.getMonth() === viewMonth.m && e.status !== "アーカイブ";
  });
  const monthTodos = todos.filter(t => {
    const d = new Date(t.deadline);
    return !isNaN(d.getTime()) && d.getFullYear() === viewMonth.y && d.getMonth() === viewMonth.m;
  });

  return (
    <div className="page" data-page="schedule">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>スケジュール</span></div>
          <h1>スケジュール</h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `${monthLabel}: ${monthEvents.length}件のイベント、${monthTodos.length}件のタスク。`}</div>
        </div>
        <div className="ph-right">
          <a href="#event-create" className="btn btn-indigo"><Icon n="plus" s={14}/> イベント作成</a>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="card">
        <div className="card-head">
          <div className="row" style={{gap:10,alignItems:'center'}}>
            <button className="btn btn-soft btn-sm btn-icon" onClick={prevMonth} title="前の月"><Icon n="chevLeft" s={12}/></button>
            <div style={{fontFamily:'var(--serif)',fontSize:20,letterSpacing:'-.015em',minWidth:140,textAlign:'center'}}>{monthLabel}</div>
            <button className="btn btn-soft btn-sm btn-icon" onClick={nextMonth} title="次の月"><Icon n="chevRight" s={12}/></button>
            <button className="btn btn-soft btn-sm" onClick={goToday}>今月</button>
          </div>
          <div style={{fontSize:11,color:'var(--ink4)'}}>
            <span style={{display:'inline-block',width:10,height:10,background:'var(--indigo)',borderRadius:2,marginRight:4,verticalAlign:'middle'}}></span> イベント
            <span style={{display:'inline-block',width:10,height:10,background:'var(--coral)',borderRadius:2,marginRight:4,marginLeft:14,verticalAlign:'middle'}}></span> タスク
          </div>
        </div>

        <div className="card-body" style={{padding:0}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:'1px solid var(--line)',background:'var(--bg2)'}}>
            {['日','月','火','水','木','金','土'].map((d, i) => (
              <div key={d} style={{padding:'10px 8px',textAlign:'center',fontSize:11,fontWeight:700,color: i===0 ? 'var(--coral)' : i===6 ? 'var(--indigo)' : 'var(--ink3)',letterSpacing:'.05em'}}>
                {d}
              </div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
            {days.map((day, i) => {
              const ds = dateToStr(day.date);
              const isToday = ds === todayStr;
              const items = getItemsAt(ds);
              const dow = day.date.getDay();
              return (
                <div key={i} style={{
                  minHeight:96,
                  padding:6,
                  borderRight: (i+1) % 7 === 0 ? 'none' : '1px solid var(--line)',
                  borderBottom: i < 35 ? '1px solid var(--line)' : 'none',
                  background: isToday ? 'var(--indigo-50)' : day.inMonth ? 'var(--white)' : 'var(--bg2)',
                  opacity: day.inMonth ? 1 : 0.5,
                }}>
                  <div style={{
                    fontSize:12,
                    fontWeight: isToday ? 700 : 500,
                    color: isToday ? 'var(--indigo)' : dow === 0 ? 'var(--coral)' : dow === 6 ? 'var(--indigo)' : 'var(--ink2)',
                    marginBottom:4,
                  }}>{day.date.getDate()}</div>
                  <div className="stack" style={{gap:2}}>
                    {items.events.slice(0, 2).map(e => (
                      <div key={`e-${e.id}`} title={`${e.title} - ${e.time || '時間未定'}`} style={{
                        fontSize:10,
                        padding:'2px 5px',
                        background:`var(--${e.accent}-50)`,
                        color:`var(--${e.accent})`,
                        borderRadius:3,
                        borderLeft:`2px solid var(--${e.accent})`,
                        whiteSpace:'nowrap',
                        overflow:'hidden',
                        textOverflow:'ellipsis',
                        cursor:'pointer',
                        fontWeight:600,
                      }}>{e.title}</div>
                    ))}
                    {items.todos.slice(0, 2).map(t => (
                      <div key={`t-${t.id}`} title={`${t.task} (${t.priority}優先)`} style={{
                        fontSize:10,
                        padding:'2px 5px',
                        background:'var(--coral-50)',
                        color:'var(--coral)',
                        borderRadius:3,
                        borderLeft:'2px solid var(--coral)',
                        whiteSpace:'nowrap',
                        overflow:'hidden',
                        textOverflow:'ellipsis',
                      }}>✓ {t.task}</div>
                    ))}
                    {(items.events.length + items.todos.length) > 4 && (
                      <div style={{fontSize:9,color:'var(--ink4)',padding:'1px 5px'}}>
                        +{items.events.length + items.todos.length - 4}件
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="grid-ab mt16">
        <div className="card">
          <div className="card-head">
            <div className="card-title"><Icon n="cal" s={16}/> {monthLabel}のイベント</div>
            <span className="badge badge-indigo">{monthEvents.length}件</span>
          </div>
          {monthEvents.length === 0 ? (
            <div className="empty" style={{padding:'30px 14px'}}>
              <div style={{fontSize:12}}>{loading ? '…' : 'この月のイベントはありません'}</div>
            </div>
          ) : (
            <div className="card-body" style={{padding:0,maxHeight:360,overflowY:'auto'}}>
              {monthEvents.sort((a,b) => (a.date||'').localeCompare(b.date||'')).map((e, i) => (
                <div key={e.id} style={{padding:'12px 16px',borderTop:i?'1px solid var(--line)':'none',display:'flex',gap:10,alignItems:'center'}}>
                  <div style={{width:4,height:32,background:`var(--${e.accent})`,borderRadius:2}}></div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13}}>{e.title}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>{e.date} {e.time || ''} · {e.venue || '会場未定'}</div>
                  </div>
                  <span className={clsx("badge", e.status==="公開中"?"badge-green":e.status==="満員"?"badge-coral":"badge-ink")} style={{fontSize:10}}>
                    {e.status}
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="card">
          <div className="card-head">
            <div className="card-title"><Icon n="check2" s={16}/> {monthLabel}のタスク</div>
            <span className="badge badge-coral">{monthTodos.filter(t=>!t.done).length}件 未完了</span>
          </div>
          {monthTodos.length === 0 ? (
            <div className="empty" style={{padding:'30px 14px'}}>
              <div style={{fontSize:12}}>{loading ? '…' : 'この月のタスクはありません'}</div>
            </div>
          ) : (
            <div className="card-body" style={{padding:0,maxHeight:360,overflowY:'auto'}}>
              {monthTodos.sort((a,b) => (a.deadline||'').localeCompare(b.deadline||'')).map((t, i) => (
                <div key={t.id} style={{padding:'12px 16px',borderTop:i?'1px solid var(--line)':'none',display:'flex',gap:10,alignItems:'center',opacity:t.done?0.5:1}}>
                  <span className={clsx("ck", t.done && "on")}></span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,textDecoration:t.done?'line-through':'none'}}>{t.task}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>
                      {t.deadline || '期限未定'}
                      {t.assignee && ` · ${t.assignee}`}
                      {t.eventTitle && ` · ${t.eventTitle}`}
                    </div>
                  </div>
                  <span className={clsx("badge", t.priority==="高"?"badge-coral":t.priority==="中"?"badge-indigo":"badge-ink")} style={{fontSize:10}}>{t.priority}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    load();
    return () => { cancelled = true; };
  }, []);

  // ========== 期間判定 ==========
  const today = new Date();
  function inPeriod(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return false;
    if (period === "all") return true;
    if (period === "month") {
      return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth();
    }
    if (period === "quarter") {
      const q = Math.floor(today.getMonth() / 3);
      const dq = Math.floor(d.getMonth() / 3);
      return d.getFullYear() === today.getFullYear() && dq === q;
    }
    if (period === "year") {
      return d.getFullYear() === today.getFullYear();
    }
    return true;
  }

  // ========== 集計 ==========
  const activeRegs = registrations.filter(r => r.status !== "キャンセル");
  const periodRegs = activeRegs.filter(r => inPeriod(r.appliedAt));
  const periodEvents = events.filter(e => inPeriod(e.date) && e.status !== "アーカイブ");
  const periodPayments = payments.filter(p => p.status === "成功" && inPeriod(p.paidAt));

  const totalReg = periodRegs.length;
  const totalRev = periodPayments.reduce((s, p) => s + (p.amount || 0), 0);
  const checkedIn = periodRegs.filter(r => r.status === "チェックイン済").length;
  const confirmed = periodRegs.filter(r => r.status === "確定").length;
  const attendBase = checkedIn + confirmed;
  const attendRate = attendBase > 0 ? Math.round(checkedIn / attendBase * 100) : null;
  const npsValues = participants.filter(p => p.nps && p.status !== "アーカイブ").map(p => p.nps);
  const avgNps = npsValues.length > 0 ? Math.round(npsValues.reduce((s, v) => s + v, 0) / npsValues.length) : null;

  // ========== カテゴリ別 ==========
  const categoryStats = {IFT: {regs:0, rev:0, ev:0}, community: {regs:0, rev:0, ev:0}, hub: {regs:0, rev:0, ev:0}, "order made": {regs:0, rev:0, ev:0}};
  periodEvents.forEach(e => { if (categoryStats[e.category]) categoryStats[e.category].ev++; });
  periodRegs.forEach(r => {
    const ev = events.find(e => e.id === r.eventId);
    if (ev && categoryStats[ev.category]) categoryStats[ev.category].regs++;
  });
  periodPayments.forEach(p => {
    const ev = events.find(e => e.id === p.eventId);
    if (ev && categoryStats[ev.category]) categoryStats[ev.category].rev += (p.amount || 0);
  });

  // ========== イベント別パフォーマンス ==========
  const eventPerf = periodEvents.map(e => {
    const evRegs = activeRegs.filter(r => r.eventId === e.id);
    const evCheckedIn = evRegs.filter(r => r.status === "チェックイン済").length;
    const evRev = payments.filter(p => p.eventId === e.id && p.status === "成功").reduce((s, p) => s + (p.amount || 0), 0);
    return {
      ...e,
      regCount: evRegs.length,
      attendRate: (evCheckedIn + evRegs.filter(r => r.status === "確定").length) > 0
        ? Math.round(evCheckedIn / (evCheckedIn + evRegs.filter(r => r.status === "確定").length) * 100)
        : null,
      revenue: evRev,
    };
  }).sort((a, b) => b.regCount - a.regCount);

  const periodLabel = {month:'今月', quarter:'今四半期', year:'今年', all:'全期間'}[period] || '今月';

  return (
    <div className="page" data-page="analytics">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>概要</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>KPIレポート</span></div>
          <h1>KPI <i>レポート</i></h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `${periodLabel}のパフォーマンス。${periodEvents.length}件のイベント、${totalReg}件の申込を集計。`}</div>
        </div>
        <div className="ph-right">
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="row mb16" style={{gap:6}}>
        {[["month","今月"],["quarter","今四半期"],["year","今年"],["all","全期間"]].map(([k, l]) => (
          <span key={k} className={clsx("chip", period===k && "on")} onClick={()=>setPeriod(k)}>{l}</span>
        ))}
      </div>

      <div className="kpi-grid">
        <MiniStat label={`${periodLabel}の申込数`} value={loading ? '…' : String(totalReg)} sub={`${periodEvents.length}イベント対象`} icon="users" color="indigo"/>
        <MiniStat label={`${periodLabel}の収益`} value={loading ? '…' : (totalRev > 0 ? yen(totalRev) : '0')} sub={`${periodPayments.length}件 成功`} icon="yen" color="coral"/>
        <MiniStat label="出席率" value={loading ? '…' : (attendRate !== null ? `${attendRate}%` : '—')} sub={`${checkedIn}/${attendBase}`} icon="check2" color="green"/>
        <MiniStat label="平均 NPS" value={loading ? '…' : (avgNps !== null ? String(avgNps) : '—')} sub={`${npsValues.length}件`} icon="star" color="violet"/>
      </div>

      <div className="grid-ab">
        <div className="card">
          <div className="card-head">
            <div className="card-title"><Icon n="layers" s={16}/> イベント別パフォーマンス</div>
            <span style={{fontSize:11,color:'var(--ink4)'}}>{periodLabel}</span>
          </div>
          {!loading && eventPerf.length === 0 ? (
            <div className="empty" style={{padding:'40px 20px'}}>
              <Icon n="cal" s={24}/>
              <div style={{fontSize:13}}>{periodLabel}のイベントはありません</div>
              <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>別の期間を選んでみてください</div>
            </div>
          ) : (
            <table className="tbl">
              <thead><tr>
                <th>イベント</th>
                <th className="right">申込数</th>
                <th className="right">出席率</th>
                <th className="right">収益</th>
                <th>状態</th>
              </tr></thead>
              <tbody>
                {eventPerf.map(e => (
                  <tr key={e.id}>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div style={{width:4,height:24,background:`var(--${e.accent})`,borderRadius:2}}></div>
                        <div>
                          <div style={{fontWeight:600}}>{e.title}</div>
                          <div style={{fontSize:11,color:'var(--ink4)'}}>{e.date || '—'} · {e.category}</div>
                        </div>
                      </div>
                    </td>
                    <td className="right num"><b>{e.regCount}</b> / {e.capacity || 0}</td>
                    <td className="right num">{e.attendRate !== null ? `${e.attendRate}%` : '—'}</td>
                    <td className="right num"><b>{e.revenue > 0 ? yen(e.revenue) : '—'}</b></td>
                    <td><span className={clsx("badge", e.status==="公開中"?"badge-green":e.status==="満員"?"badge-coral":"badge-ink")}><span className="badge-dot"></span>{e.status}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="tag" s={16}/> イニシアチブ別</div></div>
            <div className="card-body stack" style={{gap:12}}>
              {Object.entries(categoryStats).map(([cat, s]) => {
                const accentMap = {"IFT":"indigo","community":"teal","hub":"violet","order made":"amber"};
                const c = accentMap[cat] || 'ink';
                return (
                  <div key={cat}>
                    <div className="row between" style={{fontSize:12,marginBottom:4}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{width:8,height:8,borderRadius:2,background:`var(--${c})`}}></span>
                        <span style={{fontWeight:600}}>{cat}</span>
                      </div>
                      <span className="mono" style={{fontSize:11}}>{s.ev}件</span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:11,color:'var(--ink3)'}}>
                      <div>申込: <b style={{color:'var(--ink)'}}>{s.regs}</b></div>
                      <div>収益: <b style={{color:'var(--ink)'}}>{s.rev > 0 ? yen(s.rev) : '—'}</b></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
