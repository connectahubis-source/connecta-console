// =================================================================
// PageNewsFront — ニュース管理 (Phase 7.3 統合版)
// CRUD + 参加者サイト表示制御 + フィルタ + 検索 + ステータス循環 + ドラッグ並び替え
// =================================================================
function PageNewsFront(){
  const [allNews, setAllNews] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null);   // {mode:'edit'|'create', news?}
  const [error, setError] = useState(null);
  // (Phase 7.3) フィルタ・検索
  const [categoryFilter, setCategoryFilter] = useState('all');   // all/お知らせ/特集/募集/報告
  const [statusFilter, setStatusFilter] = useState('all');       // all/公開中/下書き/予約/非公開
  const [query, setQuery] = useState('');
  const [showOnlyFront, setShowOnlyFront] = useState(false);     // 参加者表示のみ
  // (Phase 7.3) ドラッグ並び替え
  const [draggingId, setDraggingId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);

  async function fetchAll() {
    setLoading(true);
    try {
      const list = await window.fetchData('listNews');
      setAllNews(Array.isArray(list) ? list : []);
      setError(null);
    } catch (e) {
      setError(e.message || 'ニュース取得失敗');
    } finally {
      setLoading(false);
    }
  }
  useEffect(() => { fetchAll(); }, []);

  async function handleSave(payload) {
    try {
      if (editing && editing.mode === 'edit') {
        await window.postData('updateNews', { newsId: editing.news.id, fields: payload });
        window.toast.success('ニュースを更新しました');
      } else {
        await window.postData('createNews', payload);
        window.toast.success('ニュースを追加しました');
      }
      setEditing(null);
      await fetchAll();
    } catch (e) {
      window.toast.error('保存失敗: ' + (e.message || e));
    }
  }

  async function handleDelete(news) {
    if (!window.confirm('「' + news.title + '」を削除しますか？')) return;
    try {
      await window.postData('deleteNews', { newsId: news.id });
      window.toast.success('ニュースを削除しました');
      await fetchAll();
    } catch (e) {
      window.toast.error('削除失敗: ' + (e.message || e));
    }
  }

  async function handleToggleFront(news) {
    try {
      await window.postData('updateNews', { newsId: news.id, fields: { showOnFront: !news.showOnFront } });
      // optimistic update
      setAllNews(prev => prev.map(n => n.id === news.id ? {...n, showOnFront: !n.showOnFront} : n));
    } catch (e) {
      window.toast.error('更新失敗: ' + (e.message || e));
    }
  }

  // (Phase 7.3) ステータスを循環: 公開中 → 下書き → 予約 → 非公開 → 公開中
  async function handleCycleStatus(news) {
    const cycle = ['公開中', '下書き', '予約', '非公開'];
    const idx = cycle.indexOf(news.status);
    const next = cycle[(idx + 1) % cycle.length];
    try {
      await window.postData('updateNews', { newsId: news.id, fields: { status: next } });
      setAllNews(prev => prev.map(n => n.id === news.id ? {...n, status: next} : n));
    } catch (e) {
      window.toast.error('ステータス変更失敗: ' + (e.message || e));
    }
  }

  // (Phase 7.3) ドラッグ並び替えで displayOrder を更新
  function handleDragStart(e, id) {
    setDraggingId(id);
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', id); } catch (_) {}
  }
  function handleDragOver(e, id) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (id !== dragOverId) setDragOverId(id);
  }
  function handleDragLeave() { setDragOverId(null); }
  async function handleDrop(e, targetId) {
    e.preventDefault();
    if (!draggingId || draggingId === targetId) {
      setDraggingId(null); setDragOverId(null);
      return;
    }
    // 現在のソート済みリストを取得し、draggingId を targetId の位置に挿入
    const list = [...sorted];
    const fromIdx = list.findIndex(n => n.id === draggingId);
    const toIdx = list.findIndex(n => n.id === targetId);
    if (fromIdx === -1 || toIdx === -1) {
      setDraggingId(null); setDragOverId(null);
      return;
    }
    const [moved] = list.splice(fromIdx, 1);
    list.splice(toIdx, 0, moved);
    // 新しい displayOrder を 1 から振り直す (showOnFront のみ対象)
    const updates = [];
    let order = 1;
    list.forEach(n => {
      if (n.showOnFront) {
        if (n.displayOrder !== order) updates.push({id: n.id, displayOrder: order});
        n.displayOrder = order;
        order++;
      }
    });
    // optimistic update
    setAllNews(prev => prev.map(n => {
      const u = updates.find(x => x.id === n.id);
      return u ? {...n, displayOrder: u.displayOrder} : n;
    }));
    setDraggingId(null); setDragOverId(null);
    // バックエンド更新 (並列)
    try {
      await Promise.all(updates.map(u => window.postData('updateNews', { newsId: u.id, fields: { displayOrder: u.displayOrder } })));
      if (updates.length > 0) window.toast.success('並び順を更新しました');
    } catch (e) {
      window.toast.error('並び順保存失敗: ' + (e.message || e));
      await fetchAll(); // ロールバック
    }
  }

  if (loading) {
    return <div className="page" data-page="news"><div style={{padding:24,color:'var(--ink2)'}}>読み込み中...</div></div>;
  }

  // フィルタ + 検索
  const filtered = allNews.filter(n => {
    if (categoryFilter !== 'all' && n.category !== categoryFilter) return false;
    if (statusFilter !== 'all' && n.status !== statusFilter) return false;
    if (showOnlyFront && !n.showOnFront) return false;
    if (query) {
      const q = query.toLowerCase();
      const inTitle = (n.title || '').toLowerCase().includes(q);
      const inBody = (n.body || '').toLowerCase().includes(q);
      if (!inTitle && !inBody) return false;
    }
    return true;
  });

  // ソート: 参加者表示中を上に、その中で displayOrder 昇順、空は末尾
  const sorted = [...filtered].sort((a, b) => {
    if (a.showOnFront !== b.showOnFront) return a.showOnFront ? -1 : 1;
    const ao = (a.displayOrder === '' || a.displayOrder == null) ? 9999 : Number(a.displayOrder);
    const bo = (b.displayOrder === '' || b.displayOrder == null) ? 9999 : Number(b.displayOrder);
    return ao - bo;
  });

  const frontCount = allNews.filter(n => n.showOnFront).length;

  // ステータス色
  const statusColors = {
    '公開中': {bg:'#ecfdf5', fg:'#065f46', border:'#a7f3d0'},
    '下書き': {bg:'#f3f4f6', fg:'#4b5563', border:'#e5e7eb'},
    '予約':   {bg:'#fef3c7', fg:'#92400e', border:'#fde68a'},
    '非公開': {bg:'#fee2e2', fg:'#991b1b', border:'#fecaca'},
  };

  return (
    <div className="page" data-page="news">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>コミュニケーション</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>ニュース管理</span></div>
          <h1>ニュース管理<i>.</i></h1>
          <div className="ph-sub">
            ニュース記事の作成・編集・削除と、参加者サイト News セクションの表示制御。
            {frontCount > 3 && <span style={{color:'#f59e0b', fontWeight:600, marginLeft:8}}>⚠ {frontCount}件 表示ON、上位3件のみ表示されます</span>}
          </div>
        </div>
        <div className="ph-right">
          <button className="btn btn-primary" onClick={() => setEditing({mode:'create'})}>
            <Icon n="plus" s={14}/> 新規ニュース
          </button>
        </div>
      </div>

      {error && <div style={{padding:'12px 16px', background:'#fee2e2', color:'#991b1b', borderRadius:8, marginBottom:16}}>{error}</div>}

      {/* (Phase 7.3) 検索 + フィルタバー */}
      <div style={{
        display:'flex', flexWrap:'wrap', gap:12, alignItems:'center',
        padding:'14px 16px', background:'#fff', border:'1px solid var(--line)', borderRadius:12,
        marginBottom:14, maxWidth:1120,
      }}>
        {/* 検索 */}
        <div style={{position:'relative', flex:'1 1 240px', minWidth:200}}>
          <input
            type="text"
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="タイトル・本文を検索"
            style={{
              width:'100%', padding:'8px 12px 8px 34px',
              border:'1px solid var(--line)', borderRadius:999, fontSize:13,
              background:'#f9fafb',
            }}
          />
          <span style={{position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', color:'var(--ink3)', pointerEvents:'none'}}>
            <Icon n="search" s={14}/>
          </span>
          {query && (
            <button
              type="button"
              onClick={() => setQuery('')}
              style={{
                position:'absolute', right:8, top:'50%', transform:'translateY(-50%)',
                background:'none', border:'none', cursor:'pointer', color:'var(--ink3)',
                padding:4, display:'flex', alignItems:'center', justifyContent:'center',
              }}
            ><Icon n="x" s={12}/></button>
          )}
        </div>

        {/* カテゴリフィルタ (pill) */}
        <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
          {['all', 'お知らせ', '特集', '募集', '報告'].map(c => (
            <button
              key={c}
              onClick={() => setCategoryFilter(c)}
              style={{
                padding:'6px 14px', borderRadius:999, border:'1px solid var(--line)',
                background: categoryFilter === c ? '#0a2960' : '#fff',
                color: categoryFilter === c ? '#fff' : 'var(--ink2)',
                fontSize:12, fontWeight:600, cursor:'pointer',
                transition:'all 0.15s ease',
              }}
            >{c === 'all' ? 'すべて' : c}</button>
          ))}
        </div>

        {/* ステータスフィルタ (select) */}
        <select
          value={statusFilter}
          onChange={e => setStatusFilter(e.target.value)}
          style={{padding:'8px 12px', border:'1px solid var(--line)', borderRadius:999, fontSize:12, background:'#fff', cursor:'pointer'}}
        >
          <option value="all">すべてのステータス</option>
          <option value="公開中">公開中</option>
          <option value="下書き">下書き</option>
          <option value="予約">予約</option>
          <option value="非公開">非公開</option>
        </select>

        {/* 参加者表示のみトグル */}
        <label style={{display:'flex', alignItems:'center', gap:6, cursor:'pointer', fontSize:12, color:'var(--ink2)'}}>
          <input
            type="checkbox"
            checked={showOnlyFront}
            onChange={e => setShowOnlyFront(e.target.checked)}
            style={{cursor:'pointer'}}
          />
          参加者表示のみ
        </label>

        {/* 件数表示 */}
        <div style={{marginLeft:'auto', fontSize:11, color:'var(--ink3)', fontFamily:'var(--mono, monospace)'}}>
          {sorted.length} / {allNews.length} 件
        </div>
      </div>

      {/* リスト本体 */}
      <div style={{display:'flex', flexDirection:'column', gap:8, maxWidth:1120}}>
        {sorted.length === 0 ? (
          <div style={{padding:'40px 24px', textAlign:'center', color:'var(--ink3)', border:'2px dashed var(--line)', borderRadius:12}}>
            {allNews.length === 0 ? 'ニュースがまだ登録されていません。' : '条件に合うニュースがありません。'}
          </div>
        ) : sorted.map(n => {
          const sc = statusColors[n.status] || statusColors['下書き'];
          const isDragging = draggingId === n.id;
          const isDragOver = dragOverId === n.id && draggingId !== n.id;
          return (
            <div
              key={n.id}
              draggable={n.showOnFront}
              onDragStart={(e) => n.showOnFront && handleDragStart(e, n.id)}
              onDragOver={(e) => n.showOnFront && handleDragOver(e, n.id)}
              onDragLeave={handleDragLeave}
              onDrop={(e) => n.showOnFront && handleDrop(e, n.id)}
              style={{
                display:'flex', alignItems:'center', gap:14,
                padding:'14px 16px',
                background:'#fff',
                border: isDragOver ? '2px solid #0a2960' : '1px solid var(--line)',
                borderRadius:12,
                opacity: isDragging ? 0.4 : (n.showOnFront ? 1 : 0.7),
                cursor: n.showOnFront ? 'move' : 'default',
                transition: 'border 0.1s ease',
              }}
            >
              {/* 順序バッジ + ドラッグハンドル */}
              <div style={{
                width:36, height:36, borderRadius:8,
                background: n.showOnFront ? '#0a2960' : '#f3f4f6',
                color: n.showOnFront ? '#fff' : 'var(--ink3)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:13, fontWeight:700,
                flexShrink:0,
              }}>{n.showOnFront ? (n.displayOrder || '−') : '−'}</div>

              {/* タイトル + メタ */}
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:600, fontSize:14, color:'var(--ink1)', marginBottom:4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                  {n.title}
                </div>
                <div style={{display:'flex', alignItems:'center', gap:8, fontSize:11, color:'var(--ink3)', flexWrap:'wrap'}}>
                  <span style={{padding:'2px 8px', background:'#f3f4f6', borderRadius:4, color:'var(--ink2)', fontWeight:500}}>{n.category}</span>
                  {/* ステータスクリックで循環 */}
                  <button
                    onClick={(e) => { e.stopPropagation(); handleCycleStatus(n); }}
                    style={{
                      padding:'2px 10px', borderRadius:999,
                      background: sc.bg, color: sc.fg, border:'1px solid '+sc.border,
                      fontSize:11, fontWeight:600, cursor:'pointer',
                    }}
                    title="クリックでステータス変更"
                  >{n.status}</button>
                  {n.publishedAt && <span>公開: {n.publishedAt}</span>}
                  {n.publishAt && <span>予約: {new Date(n.publishAt).toLocaleDateString('ja-JP')}</span>}
                  {n.ctaText && <span>CTA: {n.ctaText}</span>}
                </div>
              </div>

              {/* アクション */}
              <button
                className="btn btn-ghost btn-sm"
                onClick={(e) => { e.stopPropagation(); handleToggleFront(n); }}
                title={n.showOnFront ? '参加者サイトから外す' : '参加者サイトに表示'}
                style={{flexShrink:0, fontSize:12}}
              >
                {n.showOnFront ? (
                  <span style={{color:'#0a2960', fontWeight:600}}>● 表示中</span>
                ) : (
                  <span style={{color:'var(--ink3)'}}>○ 非表示</span>
                )}
              </button>

              <button
                className="btn btn-ghost btn-sm"
                onClick={(e) => { e.stopPropagation(); setEditing({mode:'edit', news:n}); }}
                style={{flexShrink:0}}
              >
                <Icon n="edit" s={14}/> 編集
              </button>

              <button
                className="btn btn-ghost btn-sm"
                onClick={(e) => { e.stopPropagation(); handleDelete(n); }}
                style={{flexShrink:0, color:'#dc2626'}}
                title="削除"
              >
                <Icon n="trash" s={14}/>
              </button>
            </div>
          );
        })}
      </div>

      {/* ヘルプテキスト */}
      {sorted.filter(n => n.showOnFront).length >= 2 && (
        <div style={{marginTop:12, padding:'10px 14px', background:'#f9fafb', border:'1px solid var(--line)', borderRadius:8, fontSize:12, color:'var(--ink3)', maxWidth:1120}}>
          💡 参加者表示中の項目は、行をドラッグして並び替えできます。ステータスバッジをクリックすると公開状態を循環できます。
        </div>
      )}

      {editing && (
        <NewsFrontEditor
          mode={editing.mode}
          news={editing.news}
          onSave={handleSave}
          onCancel={() => setEditing(null)}
        />
      )}
    </div>
  );
}

// =================================================================
// NewsFrontEditor — ニュース編集モーダル (Phase 6.9)
// =================================================================
function NewsFrontEditor({mode, news, onSave, onCancel}) {
  const isEdit = mode === 'edit';
  const [title, setTitle] = useState(news?.title || '');
  const [category, setCategory] = useState(news?.category || 'お知らせ');
  const [body, setBody] = useState(news?.body || '');
  const [status, setStatus] = useState(news?.status || '下書き');
  const [showOnFront, setShowOnFront] = useState(!!news?.showOnFront);
  const [displayOrder, setDisplayOrder] = useState(news?.displayOrder === '' || news?.displayOrder == null ? '' : String(news.displayOrder));
  const [publishAt, setPublishAt] = useState(news?.publishAt ? String(news.publishAt).slice(0, 16) : '');
  const [ctaText, setCtaText] = useState(news?.ctaText || '詳細を見る');
  const [ctaLink, setCtaLink] = useState(news?.ctaLink || '');
  const [savingState, setSavingState] = useState(false);

  function submit() {
    if (!title.trim()) { window.toast.error('タイトル必須'); return; }
    setSavingState(true);
    onSave({
      title: title.trim(),
      category,
      body,
      status,
      showOnFront,
      displayOrder: displayOrder === '' ? '' : Number(displayOrder),
      publishAt: publishAt || '',
      ctaText: ctaText.trim(),
      ctaLink: ctaLink.trim(),
    });
  }

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.5)',
      display:'flex', alignItems:'center', justifyContent:'center',
      zIndex:1000, padding:24,
    }} onClick={onCancel}>
      <div style={{
        background:'#fff', borderRadius:16, maxWidth:680, width:'100%',
        maxHeight:'90vh', overflowY:'auto',
      }} onClick={(e) => e.stopPropagation()}>
        <div style={{padding:'20px 24px', borderBottom:'1px solid var(--line)', display:'flex', alignItems:'center'}}>
          <h2 style={{margin:0, fontSize:18, fontWeight:700}}>{isEdit ? 'ニュースを編集' : '新規ニュース'}</h2>
          <button className="btn btn-ghost" onClick={onCancel} style={{marginLeft:'auto'}}>
            <Icon n="x" s={14}/>
          </button>
        </div>

        <div style={{padding:24, display:'flex', flexDirection:'column', gap:16}}>
          <FieldRow label="タイトル *">
            <input type="text" value={title} onChange={e => setTitle(e.target.value)}
              style={{width:'100%', padding:'10px 12px', border:'1px solid var(--line)', borderRadius:8, fontSize:14}}/>
          </FieldRow>

          <FieldRow label="カテゴリ">
            <select value={category} onChange={e => setCategory(e.target.value)}
              style={{padding:'10px 12px', border:'1px solid var(--line)', borderRadius:8, fontSize:14}}>
              <option>お知らせ</option><option>特集</option><option>募集</option><option>報告</option>
            </select>
          </FieldRow>

          <FieldRow label="本文">
            <textarea value={body} onChange={e => setBody(e.target.value)} rows={5}
              placeholder="改行は <br> や空行で区切られます。詩的に書くのがおすすめ。"
              style={{width:'100%', padding:'10px 12px', border:'1px solid var(--line)', borderRadius:8, fontSize:14, fontFamily:'inherit', resize:'vertical'}}/>
          </FieldRow>

          <FieldRow label="ステータス">
            <select value={status} onChange={e => setStatus(e.target.value)}
              style={{padding:'10px 12px', border:'1px solid var(--line)', borderRadius:8, fontSize:14}}>
              <option>下書き</option><option>公開中</option><option>予約</option><option>非公開</option>
            </select>
          </FieldRow>

          <div style={{padding:16, background:'#f9fafb', borderRadius:8, display:'flex', flexDirection:'column', gap:12}}>
            <div style={{fontSize:11, fontWeight:700, color:'var(--ink2)', letterSpacing:'0.12em', textTransform:'uppercase'}}>参加者サイト表示</div>

            <label style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer'}}>
              <input type="checkbox" checked={showOnFront} onChange={e => setShowOnFront(e.target.checked)}/>
              <span style={{fontSize:14}}>参加者サイトの News セクションに表示する</span>
            </label>

            {showOnFront && (
              <React.Fragment>
                <FieldRow label="表示順序 (1=最初、空=末尾)">
                  <input type="number" value={displayOrder} onChange={e => setDisplayOrder(e.target.value)}
                    style={{padding:'10px 12px', border:'1px solid var(--line)', borderRadius:8, fontSize:14, width:120}}/>
                </FieldRow>

                <FieldRow label="公開予約日時 (任意)">
                  <input type="datetime-local" value={publishAt} onChange={e => setPublishAt(e.target.value)}
                    style={{padding:'10px 12px', border:'1px solid var(--line)', borderRadius:8, fontSize:14}}/>
                </FieldRow>

                <FieldRow label="CTA文言">
                  <input type="text" value={ctaText} onChange={e => setCtaText(e.target.value)} placeholder="詳細を見る"
                    style={{width:'100%', padding:'10px 12px', border:'1px solid var(--line)', borderRadius:8, fontSize:14}}/>
                </FieldRow>

                <FieldRow label="CTAリンク (任意)">
                  <input type="text" value={ctaLink} onChange={e => setCtaLink(e.target.value)} placeholder="https://... または #section-id"
                    style={{width:'100%', padding:'10px 12px', border:'1px solid var(--line)', borderRadius:8, fontSize:14}}/>
                </FieldRow>
              </React.Fragment>
            )}
          </div>
        </div>

        <div style={{padding:'16px 24px', borderTop:'1px solid var(--line)', display:'flex', gap:8, justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={onCancel}>キャンセル</button>
          <button className="btn btn-primary" disabled={savingState} onClick={submit}>
            <Icon n="check" s={14}/> {isEdit ? '変更を保存' : 'ニュースを追加'}
          </button>
        </div>
      </div>
    </div>
  );
}

// 共通の行ラッパー (PageNewsFront/Editor で使用)
function FieldRow({label, children}) {
  return (
    <div style={{display:'flex', flexDirection:'column', gap:6}}>
      <label style={{fontSize:13, fontWeight:600, color:'var(--ink1)'}}>{label}</label>
      {children}
    </div>
  );
}

// =================================================================
// PageSettings — 通知・PWA設定 (Phase 5新-E)
// =================================================================
function PageSettings(){
  const [settings, setSettings] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState({});   // {key: bool}
  const [error, setError] = useState(null);
  const [canInstall, setCanInstall] = useState(false);
  const [installed, setInstalled] = useState(false);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      try {
        const data = await window.fetchData('listNotificationSettings');
        if (!cancelled) setSettings(data || {});
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    setCanInstall(!!window._canInstallPWA);
    setInstalled(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
    const checkInterval = setInterval(() => {
      if (!cancelled) setCanInstall(!!window._canInstallPWA);
    }, 1000);
    return () => { cancelled = true; clearInterval(checkInterval); };
  }, []);

  async function updateSetting(key, value) {
    setSaving(prev => ({...prev, [key]: true}));
    try {
      await window.postData('updateNotificationSetting', { key, value: String(value) });
      setSettings(prev => ({...prev, [key]: String(value)}));
      window.toast.success('保存しました');
    } catch (err) {
      window.toast.error('保存に失敗: ' + err.message);
    } finally {
      setSaving(prev => ({...prev, [key]: false}));
    }
  }

  async function handleSendTest() {
    if (!await window.confirmDialog({
      title: 'テストメールを送信しますか?',
      body: `送信先: ${settings.email_default_recipient || '未設定'}`,
    })) return;
    try {
      await window.postData('sendTestNotification', {});
      window.toast.success('テストメールを送信しました。Gmail を確認してください。');
    } catch (err) {
      window.toast.error('送信失敗: ' + err.message);
    }
  }

  async function handleInstallPWA() {
    if (window.installPWA) {
      const ok = await window.installPWA();
      if (ok) {
        setInstalled(true);
        setCanInstall(false);
        window.toast.success('インストールが完了しました');
      }
    }
  }

  const isOn = (key) => settings[key] === 'true';

  return (
    <div className="page" data-page="settings">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>設定</span></div>
          <h1>通知 <i>設定</i></h1>
          <div className="ph-sub">メール通知、Todo リマインダー、PWA インストールの設定。</div>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>エラー:</b> {error}</div>}

      <div className="grid-ab">
        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="mail" s={16}/> メール通知</div></div>
            <div className="card-body stack" style={{gap:14}}>
              <div className="field">
                <label className="field-label">デフォルト送信先</label>
                <input className="input" type="email"
                  value={settings.email_default_recipient || ''}
                  onChange={e=>setSettings(prev => ({...prev, email_default_recipient: e.target.value}))}
                  onBlur={e=>updateSetting('email_default_recipient', e.target.value)}
                  placeholder="connecta.official@gmail.com"/>
                <div className="field-hint">代表/副代表向け通知のデフォルト送信先 (フォーカスを外すと自動保存)</div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {[
                  {key:'todo_reminder_enabled', label:'Todo 期限リマインダー', desc:'毎朝 9:00 (JST) に担当者へ送信'},
                  {key:'registration_new_enabled', label:'新規申込通知', desc:'参加申込が入った時に代表/副代表へ送信'},
                  {key:'event_full_enabled', label:'イベント満員通知', desc:'定員に達した時に役員へ送信'},
                  {key:'survey_response_enabled', label:'アンケート回答通知', desc:'新しい回答が入った時に送信'},
                ].map(item => (
                  <div key={item.key} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg2)',borderRadius:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{item.label}</div>
                      <div style={{fontSize:11,color:'var(--ink4)',marginTop:2}}>{item.desc}</div>
                    </div>
                    <label style={{position:'relative',display:'inline-flex',cursor:'pointer'}}>

/**
 * 団体紹介。connec+a の公開プロフィールを編集する画面。
 */
function PageOrg(){
  const [org, setOrg] = useState({});
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [dirty, setDirty] = useState(false);

  // フォーム state
  const [name, setName] = useState("");
  const [nameEn, setNameEn] = useState("");
  const [foundedAt, setFoundedAt] = useState("");
  const [mission, setMission] = useState("");
  const [vision, setVision] = useState("");
  const [description, setDescription] = useState("");
  const [logoUrl, setLogoUrl] = useState("");
  const [coverUrl, setCoverUrl] = useState("");
  const [representative, setRepresentative] = useState("");
  const [location, setLocation] = useState("");
  const [contactEmail, setContactEmail] = useState("");
  const [websiteUrl, setWebsiteUrl] = useState("");
  const [instagram, setInstagram] = useState("");
  const [twitter, setTwitter] = useState("");
  const [facebook, setFacebook] = useState("");
  const [youtube, setYoutube] = useState("");

  function applyData(data) {
    setName(data.name || "");
    setNameEn(data.nameEn || "");
    setFoundedAt(data.foundedAt || "");
    setMission(data.mission || "");
    setVision(data.vision || "");
    setDescription(data.description || "");
    setLogoUrl(data.logoUrl || "");
    setCoverUrl(data.coverUrl || "");
    setRepresentative(data.representative || "");
    setLocation(data.location || "");
    setContactEmail(data.contactEmail || "");
    setWebsiteUrl(data.websiteUrl || "");
    setInstagram(data.instagram || "");
    setTwitter(data.twitter || "");
    setFacebook(data.facebook || "");
    setYoutube(data.youtube || "");
  }

  async function fetchData() {
    setLoading(true);
    setError(null);
    try {
      const data = await window.fetchData('getOrg');
      const safe = data || {};
      setOrg(safe);
      applyData(safe);
      setDirty(false);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { fetchData(); }, []);

  // 未保存変更がある状態で画面離脱を防止 (ブラウザ標準の確認ダイアログ)
  useEffect(() => {
    if (!dirty) return;
    const handler = (e) => {
      e.preventDefault();
      e.returnValue = '';   // Chrome は returnValue 必須
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [dirty]);

  // 任意の field を変更したら dirty フラグ
  function setField(setter) {
    return (v) => { setter(v); setDirty(true); };
  }

  async function handleSave() {
    setSaving(true);
    setError(null);
    try {
      await window.postData('updateOrg', {
        fields: {
          name: name.trim(),
          nameEn: nameEn.trim(),
          foundedAt,
          mission: mission.trim(),
          vision: vision.trim(),
          description: description.trim(),
          logoUrl: logoUrl.trim(),
          coverUrl: coverUrl.trim(),
          representative: representative.trim(),
          location: location.trim(),
          contactEmail: contactEmail.trim(),
          websiteUrl: websiteUrl.trim(),
          instagram: instagram.trim(),
          twitter: twitter.trim(),
          facebook: facebook.trim(),
          youtube: youtube.trim(),
        }
      });
      window.toast.success('団体情報を保存しました');
      await fetchData();
    } catch (err) {
      window.toast.error('保存に失敗しました: ' + err.message);
      setError(err.message || String(err));
    } finally {
      setSaving(false);
    }
  }

  async function handleReset() {
    if (!dirty) return;
    if (!await window.confirmDialog({
      title: '変更を取り消しますか?',
      body: '保存していない変更が失われます。',
      warn: true,
      confirmLabel: '取り消す',
    })) return;
    applyData(org);
    setDirty(false);
    window.toast.info('変更を取り消しました');
  }

  return (
    <div className="page" data-page="org">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>団体紹介</span></div>
          <h1>団体 <i>紹介</i></h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `connec+a の公開プロフィール。${org.updatedAt ? '最終更新: ' + new Date(org.updatedAt).toLocaleString('ja-JP') : '未保存'}`}</div>
        </div>
        <div className="ph-right">
          {dirty && (
            <button className="btn btn-ghost" onClick={handleReset} disabled={saving}>変更を取り消す</button>
          )}
          {window.canDo('org.update') && (
            <button className="btn btn-indigo" onClick={handleSave} disabled={saving || !dirty}>
              <Icon n="check2" s={14}/> {saving ? '保存中…' : '保存する'}
            </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>エラー:</b> {error}</div>}

      <div className="grid-ab">
        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="building" s={16}/> 基本情報</div></div>
            <div className="card-body stack" style={{gap:12}}>
              <div className="grid-2" style={{gap:14}}>
                <div className="field">
                  <label className="field-label">団体名 (日本語)</label>
                  <input className="input input-lg" value={name} onChange={e=>setField(setName)(e.target.value)} placeholder="例: connec+a"/>
                </div>
                <div className="field">
                  <label className="field-label">英名</label>
                  <input className="input" value={nameEn} onChange={e=>setField(setNameEn)(e.target.value)} placeholder="例: connec+a"/>
                </div>
              </div>
              <div className="grid-2" style={{gap:14}}>
                <div className="field">
                  <label className="field-label">設立日</label>
                  <input className="input" type="date" value={foundedAt} onChange={e=>setField(setFoundedAt)(e.target.value)}/>
                </div>
                <div className="field">
                  <label className="field-label">代表者</label>
                  <input className="input" value={representative} onChange={e=>setField(setRepresentative)(e.target.value)} placeholder="例: Rikky"/>
                </div>
              </div>
              <div className="field">
                <label className="field-label">所在地</label>
                <input className="input" value={location} onChange={e=>setField(setLocation)(e.target.value)} placeholder="例: 東京都"/>
              </div>
              <div className="field">
                <label className="field-label">連絡メール</label>
                <input className="input" type="email" value={contactEmail} onChange={e=>setField(setContactEmail)(e.target.value)} placeholder="connecta.official@gmail.com"/>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="sparkle" s={16}/> ミッション・ビジョン</div></div>
            <div className="card-body stack" style={{gap:12}}>
              <div className="field">
                <label className="field-label">ミッション</label>
                <textarea className="input" style={{height:80,padding:10,resize:'vertical'}} value={mission} onChange={e=>setField(setMission)(e.target.value)} placeholder="団体が果たす使命..."/>
              </div>
              <div className="field">
                <label className="field-label">ビジョン</label>
                <textarea className="input" style={{height:80,padding:10,resize:'vertical'}} value={vision} onChange={e=>setField(setVision)(e.target.value)} placeholder="将来実現したい姿..."/>
              </div>
              <div className="field">
                <label className="field-label">紹介文</label>
                <textarea className="input" style={{height:140,padding:10,resize:'vertical'}} value={description} onChange={e=>setField(setDescription)(e.target.value)} placeholder="団体の活動概要、成り立ち、特徴など..."/>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="link" s={16}/> SNS / Web</div></div>
            <div className="card-body stack" style={{gap:12}}>
              <div className="field">
                <label className="field-label">公式 Web サイト</label>
                <input className="input" type="url" value={websiteUrl} onChange={e=>setField(setWebsiteUrl)(e.target.value)} placeholder="https://connecta.example.com"/>
              </div>
              <div className="grid-2" style={{gap:14}}>
                <div className="field">
                  <label className="field-label">Instagram</label>
                  <input className="input" value={instagram} onChange={e=>setField(setInstagram)(e.target.value)} placeholder="@connecta_official または URL"/>
                </div>
                <div className="field">
                  <label className="field-label">X / Twitter</label>
                  <input className="input" value={twitter} onChange={e=>setField(setTwitter)(e.target.value)} placeholder="@connecta_official または URL"/>
                </div>
              </div>
              <div className="grid-2" style={{gap:14}}>
                <div className="field">
                  <label className="field-label">Facebook</label>
                  <input className="input" value={facebook} onChange={e=>setField(setFacebook)(e.target.value)} placeholder="ページURL"/>
                </div>
                <div className="field">
                  <label className="field-label">YouTube</label>
                  <input className="input" value={youtube} onChange={e=>setField(setYoutube)(e.target.value)} placeholder="チャンネルURL"/>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="img" s={16}/> ロゴ・カバー画像</div></div>
            <div className="card-body stack" style={{gap:12}}>
              <div className="field">
                <label className="field-label">ロゴ画像URL</label>
                <input className="input" value={logoUrl} onChange={e=>setField(setLogoUrl)(e.target.value)} placeholder="https://..."/>
                {logoUrl && (
                  <div style={{marginTop:8,padding:14,background:'var(--bg2)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <img src={logoUrl} alt="logo" style={{maxHeight:80,maxWidth:'100%'}} onError={(e)=>{e.target.style.display='none';}}/>
                  </div>
                )}
              </div>
              <div className="field">
                <label className="field-label">カバー画像URL</label>
                <input className="input" value={coverUrl} onChange={e=>setField(setCoverUrl)(e.target.value)} placeholder="https://..."/>
                {coverUrl && (
                  <div style={{marginTop:8,aspectRatio:'16/9',background:'var(--bg2)',borderRadius:8,overflow:'hidden'}}>
                    <img src={coverUrl} alt="cover" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={(e)=>{e.target.style.display='none';}}/>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="info" s={16}/> 公開ページについて</div></div>
            <div className="card-body" style={{fontSize:12,color:'var(--ink3)',lineHeight:1.7}}>
              <p>ここで保存した団体情報は、参加者向け公開ページで表示されます。</p>
              <div style={{padding:10,background:'var(--indigo-50)',border:'1px solid var(--indigo-100)',borderRadius:8,fontSize:11,marginTop:10}}>
                <b style={{color:'var(--indigo)'}}>今後の予定:</b><br/>
                ・connecta-public 公開サイト<br/>
                ・多言語対応 (JP / EN / IT)<br/>
                ・採用ページ<br/>
                ・履歴 / 沿革
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/**
 * 広告作成・編集モーダル。
 */
function AdModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [title, setTitle] = useState(init.title || "");
  const [type, setType] = useState(init.type || "バナー");
  const [placement, setPlacement] = useState(init.placement || "ダッシュボード");
  const [imageUrl, setImageUrl] = useState(init.imageUrl || "");
  const [linkUrl, setLinkUrl] = useState(init.linkUrl || "");
  const [startDate, setStartDate] = useState(init.startDate || "");
  const [endDate, setEndDate] = useState(init.endDate || "");
  const [status, setStatus] = useState(init.status || "下書き");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!title.trim()) { setError("タイトルは必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        title: title.trim(),
        type, placement,
        imageUrl: imageUrl.trim(),
        linkUrl: linkUrl.trim(),
        startDate, endDate, status,
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:600,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="megaphone" s={16}/> {mode === "create" ? "広告を作成" : "広告を編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="field">
            <label className="field-label">タイトル <span className="field-req">*</span></label>
            <input className="input input-lg" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例: 春のIFT参加者募集バナー"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">種別</label>
              <div className="select-wrap">
                <select className="input select" value={type} onChange={e=>setType(e.target.value)}>
                  <option>バナー</option>
                  <option>動画</option>
                  <option>外部メディア</option>
                </select>
              </div>
            </div>
            <div className="field">
              <label className="field-label">配置</label>
              <div className="select-wrap">
                <select className="input select" value={placement} onChange={e=>setPlacement(e.target.value)}>
                  <option>ダッシュボード</option>
                  <option>イベント詳細</option>
                  <option>申込フォーム</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">画像URL</label>
            <input className="input" value={imageUrl} onChange={e=>setImageUrl(e.target.value)} placeholder="https://example.com/banner.png"/>
            <div className="field-hint">バナー画像の URL。Google Drive 共有リンクも可</div>
          </div>
          <div className="field">
            <label className="field-label">リンクURL</label>
            <input className="input" value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} placeholder="https://connecta.example.com/event/..."/>
            <div className="field-hint">バナークリック時の遷移先</div>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">掲載開始日</label>
              <input className="input" type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/>
            </div>
            <div className="field">
              <label className="field-label">掲載終了日</label>
              <input className="input" type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}/>
            </div>
          </div>
          <div className="field">
            <label className="field-label">ステータス</label>
            <div className="select-wrap">
              <select className="input select" value={status} onChange={e=>setStatus(e.target.value)}>
                <option>下書き</option>
                <option>掲載中</option>
                <option>終了</option>
                <option>アーカイブ</option>
              </select>
            </div>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving}>
            {saving ? '保存中…' : (mode === "create" ? '作成' : '更新')}
          </button>
        </div>
      </div>
    </div>
  );
}

function PageAds(){
  const [ads, setAds] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("active");   // active / archived / all
  const [editing, setEditing] = useState(null);

  async function fetchAll() {
    setLoading(true);
    setError(null);
    try {
      const data = await window.fetchData('listAds');
      setAds(Array.isArray(data) ? data : []);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { fetchAll(); }, []);

  const visibleAds = ads.filter(a => {
    if (filter === "active") return a.status !== "アーカイブ";
    if (filter === "archived") return a.status === "アーカイブ";
    return true;
  });

  // 集計
  const activeCount = ads.filter(a => a.status === "掲載中").length;
  const totalClicks = ads.reduce((s, a) => s + (a.clicks || 0), 0);
  const draftCount = ads.filter(a => a.status === "下書き").length;

  // ========== CRUD アクション ==========

  async function handleCreate(payload) {
    await window.postData('createAd', payload);
    setEditing(null);
    window.toast.success('広告を作成しました');
    await fetchAll();
  }

  async function handleUpdate(adId, payload) {
    await window.postData('updateAd', {adId, fields: payload});
    setEditing(null);
    window.toast.success('広告を更新しました');
    await fetchAll();
  }

  async function handleDelete(adId, title) {
    if (!await window.confirmDialog({
      title: `「${title}」をアーカイブしますか?`,
      body: '行は残り、ステータスが「アーカイブ」に変わります。後で復元できます。',
      danger: true,
      confirmLabel: 'アーカイブ',
    })) return;
    try {
      await window.postData('deleteAd', {adId});
      window.toast.success('アーカイブしました');
      await fetchAll();
    } catch (err) {
      window.toast.error('削除に失敗しました: ' + err.message);
    }
  }

  return (
    <div className="page" data-page="ads">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>広告</span></div>
          <h1>広告 <i>管理</i></h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `${activeCount}件 掲載中、${draftCount}件 下書き、累計 ${totalClicks} クリック。`}</div>
        </div>
        <div className="ph-right">
          {window.canDo('ads.create') && (
          <button className="btn btn-indigo" onClick={()=>setEditing({mode:'create', values:{}})}>
            <Icon n="plus" s={14}/> 広告を作成
          </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="kpi-grid">
        <MiniStat label="掲載中" value={loading ? '…' : String(activeCount)} sub="アクティブ" icon="megaphone" color="green"/>
        <MiniStat label="下書き" value={loading ? '…' : String(draftCount)} sub="未公開" icon="edit" color="amber"/>
        <MiniStat label="総クリック数" value={loading ? '…' : String(totalClicks)} sub="累計" icon="trend" color="indigo"/>
        <MiniStat label="アーカイブ" value={loading ? '…' : String(ads.filter(a=>a.status==='アーカイブ').length)} sub="削除済" icon="trash" color="ink"/>
      </div>

      <div className="tabs">
        {[["active","現役", ads.filter(a=>a.status!=='アーカイブ').length], ["archived","アーカイブ", ads.filter(a=>a.status==='アーカイブ').length], ["all","全部", ads.length]].map(([k,l,c]) => (
          <div key={k} className={clsx("tab", filter===k && "active")} onClick={()=>setFilter(k)}>
            {l}<span className="count">{c}</span>
          </div>
        ))}
      </div>

      {!loading && visibleAds.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 20px'}}>
            <Icon n="megaphone" s={28}/>
            <div style={{fontSize:14,marginTop:8}}>広告がありません</div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4}}>「広告を作成」から登録できます</div>
          </div>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))',gap:12}}>
          {visibleAds.map(ad => {
            const placementColor = {"ダッシュボード":"indigo","イベント詳細":"teal","申込フォーム":"violet"}[ad.placement] || "ink";
            const typeIcon = {"バナー":"img","動画":"camera","外部メディア":"link"}[ad.type] || "megaphone";
            return (
              <div key={ad.id} className="card">
                <div style={{aspectRatio:'16/9',background:`var(--${placementColor}-50)`,position:'relative',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
                  {ad.imageUrl ? (
                    <img src={ad.imageUrl} alt={ad.title} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={(e)=>{e.target.style.display='none';}}/>
                  ) : (
                    <div style={{textAlign:'center',color:`var(--${placementColor})`}}>
                      <Icon n={typeIcon} s={40}/>
                      <div style={{fontSize:11,marginTop:6,fontWeight:600}}>{ad.type}</div>
                    </div>
                  )}
                  <span className={clsx("badge", ad.status==="掲載中"?"badge-green":ad.status==="下書き"?"badge-amber":ad.status==="終了"?"badge-coral":"badge-ink")} style={{position:'absolute',top:10,right:10}}>
                    <span className="badge-dot"></span>{ad.status}
                  </span>
                </div>
                <div className="card-body" style={{padding:14}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>{ad.title}</div>
                  <div style={{fontSize:11,color:'var(--ink4)',marginBottom:10,display:'flex',gap:6,flexWrap:'wrap'}}>
                    <span className="mono">{ad.id}</span>
                    <span>·</span>
                    <span style={{color:`var(--${placementColor})`,fontWeight:600}}>{ad.placement}</span>
                    <span>·</span>
                    <span>{ad.type}</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--ink3)',marginBottom:10,lineHeight:1.6}}>
                    {ad.startDate || '開始未定'} 〜 {ad.endDate || '終了未定'}<br/>
                    クリック数: <b style={{color:'var(--ink)'}}>{ad.clicks || 0}</b>
                    {ad.linkUrl && <> · <a href={ad.linkUrl} target="_blank" rel="noopener noreferrer" style={{color:'var(--indigo)',fontSize:11}}>リンク先を開く ↗</a></>}
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    {window.canDo('ads.update') && (
                      <button className="btn btn-soft btn-sm" style={{flex:1}} onClick={()=>setEditing({mode:'edit', values:ad})}>
                        <Icon n="edit" s={12}/> 編集
                      </button>
                    )}
                    {ad.status !== 'アーカイブ' && window.canDo('ads.delete') && (
                      <button className="btn btn-soft btn-sm" onClick={()=>handleDelete(ad.id, ad.title)} style={{color:'var(--coral)'}}>
                        <Icon n="trash" s={12}/>
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {editing && (
        <AdModal
          mode={editing.mode}
          initialValues={editing.values}
          onSave={editing.mode === 'create' ? handleCreate : (payload => handleUpdate(editing.values.id, payload))}
          onCancel={()=>setEditing(null)}
        />
      )}
    </div>
  );
}

window.PageAnalytics = PageAnalytics;
window.PagePhotos = PagePhotos;
window.PageOrg = PageOrg;
window.PageAds = PageAds;
window.PageSettings = PageSettings;
window.PageHeroSettings = PageHeroSettings;
window.PageHomepageSettings = PageHomepageSettings;
window.PageNewsFront = PageNewsFront;

})();

<script type="text/babel" data-presets="react">
(function(){
const {useState, useEffect, useRef, useMemo, useCallback, Fragment} = React;
const {fmt, yen, clsx, fmtTime, fmtTimeRange, Spark, ChartCanvas, Kpi, QuickAct, chartFont, IMEInput, IMETextarea, Spinner, LoadingState, ErrorBanner, Icon} = window;

// ==================== App Root ====================
// 全21画面実装完了 (Phase 1新 + Phase 2新-A/B/C/D-1/D-2)
// PageStub は使われない (全画面が実コンポーネント)。STUB_META はコード参照用に残置。
// このブロック専用に Fragment / useState / useEffect を再 destructure (Babel ブロック境界対策)
const {Fragment: AppFragment, useState: useStateApp, useEffect: useEffectApp} = React;

// 各 Page コンポーネントは window から「実行時」に取得 (Babel スクリプト境界対策、Phase 6 fix)
// レンダリング時に window 経由で参照することで、ブロック実行順序の影響を排除
function renderPage(name) {
  const Comp = window[name];
  if (!Comp) {
    return (
      <div style={{padding:40,textAlign:'center'}}>
        <h2 style={{color:'var(--coral)'}}>ページを読み込めませんでした</h2>
        <p style={{fontSize:13,color:'var(--ink3)'}}>
          コンポーネント <code>{name}</code> が定義されていません。
          <br/>ブラウザを<b>強制リロード</b>してください (Ctrl+Shift+R / Cmd+Shift+R)。
        </p>
        <p style={{fontSize:11,color:'var(--ink5)',marginTop:14}}>
          それでも表示されない場合: DevTools → Application → Service Workers → Unregister → リロード
        </p>
      </div>
    );
  }
  return <Comp/>;
}

const PAGES = {
  // ----- 概要 -----
  dashboard:      () => renderPage('PageDashboard'),
  analytics:      () => renderPage('PageAnalytics'),
  notifications:  () => renderPage('PageNotifications'),

  // ----- イベント (Phase 2新-A + D-1) -----
  events:         () => renderPage('PageEvents'),
  "event-create": () => renderPage('PageEventCreate'),
  registrations:  () => renderPage('PageRegistrations'),
  qr:             () => renderPage('PageQR'),
  schedule:       () => renderPage('PageSchedule'),

  // ----- コミュニケーション (Phase 2新-B) -----
  mail:           () => renderPage('PageMail'),
  // (Phase 7.3) 「ニュース配信」と「ニュース管理」を統合 → PageNewsFront に一本化
  news:           () => renderPage('PageNewsFront'),
  chat:           () => renderPage('PageChat'),
  templates:      () => renderPage('PageTemplates'),

  // ----- 運営 (Phase 2新-C + D-2) -----
  participants:   () => renderPage('PageParticipants'),
  todo:           () => renderPage('PageTodo'),
  photos:         () => renderPage('PagePhotos'),
  payments:       () => renderPage('PagePayments'),
  departments:    () => renderPage('PageDepartments'),

  mobile:         () => renderPage('PageMobile'),

  // ----- 設定 (Phase 5新-E) -----
  'hero-settings': () => renderPage('PageHeroSettings'),
  'homepage-settings': () => renderPage('PageHomepageSettings'),
  // (Phase 7.3) 旧 #news-front は #news にリダイレクト
  'news-front':    () => renderPage('PageNewsFront'),
  settings:       () => renderPage('PageSettings'),
};

// =================================================================
// AUTH GATE — 認証チェック画面
// =================================================================

/**
 * 認証ゲート (信頼ベース)。
 * localStorage に memberId があれば自動ログイン、なければサインイン画面表示。
 *  - 起動時: localStorage を確認 → 自動ログイン or サインイン画面
 *  - サインイン: メンバー一覧から選択 → memberId を保存 → App 表示
 *  - ログアウト: memberId 削除 → サインイン画面に戻る
 */
function AuthGate(){
  const [state, setState] = useStateApp('loading');   // loading / signin / authed / error
  const [user, setUser] = useStateApp(null);
  const [errMsg, setErrMsg] = useStateApp('');

  async function bootstrap() {
    setState('loading');
    setErrMsg('');
    try {
      const storedId = window.getStoredMemberId();
      if (!storedId) {
        // 未ログイン → サインイン画面
        setState('signin');
        return;
      }
      // 自動ログイン: whoami で memberId の有効性を確認
      const data = await window.fetchData('whoami');
      if (data && data.member) {
        setUser(data);
        window.currentUser = data;
        setState('authed');
      } else {
        // memberId が無効 (退会など) → サインイン画面
        window.setStoredMemberId('');
        setState('signin');
      }
    } catch (err) {
      setErrMsg(err.message || String(err));
      setState('error');
    }
  }

  function handleLogin(memberId, userData) {
    window.setStoredMemberId(memberId);
    setUser(userData);
    window.currentUser = userData;
    setState('authed');
  }

  function handleLogout() {
    window.setStoredMemberId('');
    window.currentUser = null;
    setUser(null);
    setState('signin');
  }

  useEffectApp(() => { bootstrap(); }, []);

  if (state === 'loading') {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',flexDirection:'column',gap:14}}>
        <div className="spinner spinner-lg"></div>
        <div style={{fontSize:13,color:'var(--ink4)'}}>読み込み中…</div>
      </div>
    );
  }

  if (state === 'error') {
    return <SigninError message={errMsg} onRetry={bootstrap}/>;
  }

  if (state === 'signin') {
    return <SigninGate onLogin={handleLogin}/>;
  }

  // 認証済み: 通常の App を表示
  return <App user={user} onLogout={handleLogout}/>;
}

/**
 * サインイン画面: Members からドロップダウンで自分を選択。
 */
function SigninGate({onLogin}){
  const [members, setMembers] = useStateApp([]);
  const [loading, setLoading] = useStateApp(true);
  const [selectedId, setSelectedId] = useStateApp('');
  const [submitting, setSubmitting] = useStateApp(false);
  const [error, setError] = useStateApp('');

  useEffectApp(() => {
    async function load() {
      try {
        const data = await window.fetchData('listMembers');
        const active = (Array.isArray(data) ? data : []).filter(m => m.isActive);
        // 部署 + 名前順でソート
        active.sort((a, b) => {
          const da = (a.dept || '').localeCompare(b.dept || '');
          if (da !== 0) return da;
          return (a.name || '').localeCompare(b.name || '');
        });
        setMembers(active);
      } catch (err) {
        setError(err.message || String(err));
      } finally {
        setLoading(false);
      }
    }
    load();
  }, []);

  async function handleSubmit() {
    if (!selectedId) { setError('メンバーを選択してください'); return; }
    setSubmitting(true);
    setError('');
    try {
      // memberId を保存して whoami で確認
      window.setStoredMemberId(selectedId);
      const userData = await window.fetchData('whoami');
      if (!userData || !userData.member) {
        throw new Error('ユーザー情報の取得に失敗しました');
      }
      onLogin(selectedId, userData);
    } catch (err) {
      window.setStoredMemberId('');   // 失敗時はクリア
      setError(err.message || String(err));
      setSubmitting(false);
    }
  }

  // 選択中のメンバー情報
  const selected = members.find(m => m.id === selectedId);

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:20}}>
      <div className="card" style={{width:480,maxWidth:'100%'}}>
        <div className="card-body" style={{padding:32}}>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{width:64,height:64,borderRadius:14,background:'var(--indigo-50)',color:'var(--indigo)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
              <Icon n="user" s={28}/>
            </div>
            <div style={{fontFamily:'var(--serif)',fontSize:24,letterSpacing:'-.02em',marginBottom:6}}>connec+a Console</div>
            <div style={{fontSize:13,color:'var(--ink3)',lineHeight:1.6}}>
              使用するメンバーアカウントを選択してください
            </div>
          </div>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12,marginBottom:14}}>{error}</div>}
          {loading ? (
            <div style={{padding:20,textAlign:'center'}}>
              <Spinner/>
              <div style={{fontSize:12,color:'var(--ink4)',marginTop:8}}>メンバー一覧を読み込み中…</div>
            </div>
          ) : members.length === 0 ? (
            <div style={{padding:14,background:'var(--amber-50)',border:'1px solid var(--amber-100)',borderRadius:8,fontSize:12,color:'var(--ink3)',lineHeight:1.6}}>
              <b>メンバーが登録されていません。</b><br/>
              Spreadsheet の Members シートに少なくとも1人を登録してください。
            </div>
          ) : (
            <>
              <div className="field">
                <label className="field-label">メンバー <span className="field-req">*</span></label>
                <div className="select-wrap">
                  <select className="input input-lg select" value={selectedId} onChange={e=>setSelectedId(e.target.value)}>
                    <option value="">選択してください</option>
                    {members.map(m => (
                      <option key={m.id} value={m.id}>
                        {m.name}{m.dept && ` (${m.dept})`}{m.role && ` - ${m.role}`}
                      </option>
                    ))}
                  </select>
                </div>
              </div>
              {selected && (
                <div style={{padding:12,background:'var(--bg2)',borderRadius:8,marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:36,height:36,borderRadius:10,background:`var(--${selected.accent || 'indigo'}-50)`,color:`var(--${selected.accent || 'indigo'})`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--serif)',fontSize:16,fontWeight:700}}>
                    {selected.initial || selected.name.charAt(0)}
                  </div>
                  <div style={{flex:1,fontSize:12,color:'var(--ink3)'}}>
                    <div style={{fontWeight:700,color:'var(--ink)',fontSize:13}}>{selected.name}</div>
                    <div>{selected.dept || '—'} · {selected.role || 'メンバー'}</div>
                  </div>
                </div>
              )}
              <button
                className="btn btn-indigo"
                style={{width:'100%',justifyContent:'center',padding:'12px 16px',fontSize:14}}
                onClick={handleSubmit}
                disabled={!selectedId || submitting}>
                {submitting ? '読み込み中…' : <><Icon n="arrRight" s={14}/> このメンバーで開始</>}
              </button>
              <div style={{fontSize:10.5,color:'var(--ink5)',marginTop:14,lineHeight:1.6,textAlign:'center'}}>
                ※ 選択したメンバーとして全ての操作を行います。次回以降は自動的にこのメンバーでログインします。
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function SigninError({message, onRetry}){
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:20}}>
      <div className="card" style={{width:480,maxWidth:'100%'}}>
        <div className="card-body" style={{padding:32,textAlign:'center'}}>
          <div style={{width:64,height:64,borderRadius:14,background:'var(--red-50)',color:'var(--red)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
            <Icon n="x" s={28}/>
          </div>
          <div style={{fontFamily:'var(--serif)',fontSize:22,letterSpacing:'-.02em',marginBottom:6}}>接続エラー</div>
          <div style={{fontSize:12,color:'var(--ink3)',marginBottom:20,lineHeight:1.6,padding:'10px 14px',background:'var(--bg2)',borderRadius:8,fontFamily:'var(--mono)'}}>
            {message}
          </div>
          <div style={{fontSize:11,color:'var(--ink5)',marginBottom:14,lineHeight:1.6,textAlign:'left'}}>
            <b>確認事項:</b><br/>
            ・GAS WebApp の最新バージョン (1.6.0-trust-auth) がデプロイされているか<br/>
            ・「自分として実行」+「全員アクセス可」の設定になっているか<br/>
            ・index.html の CONFIG.GAS_API_URL が正しいか
          </div>
          <button className="btn btn-indigo" onClick={onRetry}>
            <Icon n="refresh" s={12}/> 再試行
          </button>
        </div>
      </div>
    </div>
  );
}

function App({user, onLogout}){
  // 初期ナビゲーションは URL hash から取得
  const getInitial = () => {
    const k = window.__getInitialNav__();
    return PAGES[k] ? k : "dashboard";
  };
  const [nav, setNav] = useStateApp(getInitial);

  useEffectApp(() => {
    const onHashChange = () => {
      const k = window.__getInitialNav__();
      if (PAGES[k]) setNav(k);
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  // ロールに応じてサイドバーのナビアイテム表示制御
  // メンバー (rank=1) は「イベント作成」など作成系を非表示
  // アシマネ未満は管理系も制限
  useEffectApp(() => {
    const navRestrictions = {
      'event-create': 'events.create',   // アシマネ以上
    };
    Object.entries(navRestrictions).forEach(([navKey, action]) => {
      const el = document.querySelector(`.nav-item[data-nav="${navKey}"]`);
      if (el) {
        el.style.display = window.canDo(action) ? '' : 'none';
      }
    });
  }, [user]);

  // 未読通知ポーリング (60秒ごと)
  // トップバーのベルアイコンに未読件数を表示
  useEffectApp(() => {
    let cancelled = false;
    async function fetchUnread() {
      try {
        const notifs = await window.fetchData('listNotifications');
        if (cancelled) return;
        const unreadCount = (Array.isArray(notifs) ? notifs : []).filter(n => n.unread).length;
        const dotEl = document.getElementById('topbar-notif-dot');
        const countEl = document.getElementById('topbar-notif-count');
        if (countEl) {
          if (unreadCount > 0) {
            countEl.textContent = unreadCount > 99 ? '99+' : String(unreadCount);
            countEl.style.display = '';
            if (dotEl) dotEl.style.display = 'none';
          } else {
            countEl.style.display = 'none';
            if (dotEl) dotEl.style.display = 'none';
          }
        }
      } catch (e) {
        // サイレント
      }
    }
    fetchUnread();
    const interval = setInterval(fetchUnread, 60000);   // 60秒
    return () => { cancelled = true; clearInterval(interval); };
  }, [user]);

  useEffectApp(() => {
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.nav === nav);
    });
    document.querySelectorAll('[data-goto]').forEach(el => {
      if (!el.dataset.gotoBound) {
        el.dataset.gotoBound = "1";
        el.addEventListener('click', (e) => {
          e.preventDefault();
          const k = el.dataset.goto;
          if (PAGES[k]) window.__setNav__(k);
        });
      }
    });
    window.scrollTo(0, 0);
  }, [nav]);

  // ログイン中ユーザーをサイドバーフッターに表示
  useEffectApp(() => {
    if (!user || !user.member) return;
    // サイドバー内の <nav class="side-nav"> または最後の nav 要素を探す
    const sideEl = document.querySelector('aside.side') || document.querySelector('.sidebar');
    if (!sideEl) return;

    // 既存の signin-footer があれば削除
    const oldFooter = sideEl.querySelector('.signin-footer');
    if (oldFooter) oldFooter.remove();

    // 新規フッター作成
    const footer = document.createElement('div');
    footer.className = 'signin-footer';
    footer.style.cssText = 'margin-top:auto;padding:12px;border-top:1px solid var(--line);background:var(--bg2);display:flex;align-items:center;gap:10px;cursor:default';

    const m = user.member;
    const accent = m.accent || 'indigo';
    const initial = m.initial || (m.name ? m.name.charAt(0) : '?');

    footer.innerHTML = `
      <div style="width:34px;height:34px;border-radius:8px;background:var(--${accent}-50);color:var(--${accent});display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-weight:700;flex:none">${initial}</div>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div style="font-size:12.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</div>
        <div style="font-size:10.5px;color:var(--ink4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${user.highestRole || 'メンバー'} · ${m.dept || '—'}</div>
      </div>
      <button class="signin-logout" title="ログアウト" style="background:transparent;border:1px solid var(--line);border-radius:6px;padding:6px 8px;cursor:pointer;color:var(--ink4);display:flex;align-items:center;justify-content:center" aria-label="ログアウト">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    `;

    // ログアウトボタンに onClick をバインド
    const logoutBtn = footer.querySelector('.signin-logout');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async () => {
        const ok = await window.confirmDialog({
          title: 'ログアウトしますか?',
          body: '別のメンバーで使う場合は、再度サインインが必要です。',
          confirmLabel: 'ログアウト',
        });
        if (ok) onLogout();
      });
      logoutBtn.addEventListener('mouseenter', (e) => {
        e.currentTarget.style.color = 'var(--coral)';
        e.currentTarget.style.borderColor = 'var(--coral)';
      });
      logoutBtn.addEventListener('mouseleave', (e) => {
        e.currentTarget.style.color = 'var(--ink4)';
        e.currentTarget.style.borderColor = 'var(--line)';
      });
    }

    // サイドバーが flex-column を前提なので、最後に追加
    sideEl.style.display = 'flex';
    sideEl.style.flexDirection = 'column';
    sideEl.appendChild(footer);
  }, [user]);

  // トップバーのアバター・名前・ロールを更新
  useEffectApp(() => {
    if (!user || !user.member) return;
    const m = user.member;
    const initialEl = document.querySelector('[data-user-avatar]');
    const nameEl = document.querySelector('[data-user-name]');
    const roleEl = document.querySelector('[data-user-role]');
    if (initialEl) initialEl.textContent = m.initial || (m.name ? m.name.charAt(0) : '?');
    if (nameEl) nameEl.textContent = m.name || '—';
    if (roleEl) roleEl.textContent = (user.highestRole || 'メンバー') + ' · ' + (m.dept || '');
  }, [user]);

  const Comp = PAGES[nav] || PAGES.dashboard;
  const ToastContainerComp = window.ToastContainer;
  const ConfirmDialogHostComp = window.ConfirmDialogHost;
  return (
    <AppFragment>
      <Comp/>
      <ToastContainerComp/>
      <ConfirmDialogHostComp/>
    </AppFragment>
  );
}

ReactDOM.createRoot(document.getElementById('main')).render(<AuthGate/>);

})();
</script>

<!-- PWA: Service Worker 登録 (Phase 5新-E) -->
<script>
// 開発中のキャッシュ問題対策 (Phase 6 fix):
// 既存 SW を unregister してから新規登録、毎回 update をチェック
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      // 既存の SW を全て unregister (古いキャッシュをクリア)
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) {
        // sw.js のスコープが変わった場合の古い登録を削除
        if (reg.active && reg.active.scriptURL && !reg.active.scriptURL.endsWith('/sw.js')) {
          await reg.unregister();
          console.log('[PWA] Unregistered old SW:', reg.active.scriptURL);
        }
      }
      // 新規登録 + 即時 update
      const reg = await navigator.serviceWorker.register('./sw.js?v=2.7.0', { updateViaCache: 'none' });
      console.log('[PWA] Service Worker registered:', reg.scope);
      // ロード時に update を強制チェック
      reg.update().catch(() => {});
    } catch (err) {
      console.warn('[PWA] Service Worker registration failed:', err);
    }
  });
}

// インストール促進: beforeinstallprompt をキャプチャ
let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  // インストール可能であることをフラグ立て (UI 側で利用可能)
  window._canInstallPWA = true;
});

// グローバル関数: ユーザーがインストールボタンを押した時に呼ぶ
window.installPWA = async function() {
  if (!_deferredInstallPrompt) {
    alert('このブラウザではインストール機能が利用できません。\nスマホ Safari の場合: 共有ボタン → 「ホーム画面に追加」\nスマホ Chrome の場合: メニュー → 「ホーム画面に追加」');
    return false;
  }
  _deferredInstallPrompt.prompt();
  const { outcome } = await _deferredInstallPrompt.userChoice;
  _deferredInstallPrompt = null;
  window._canInstallPWA = false;
  return outcome === 'accepted';
};
</script>

<!-- モバイル UI 制御 (Mobile 1+3) -->
<script>
(function() {
  // ハンバーガーボタンでサイドバー開閉
  const menuBtn = document.getElementById('mobile-menu-btn');
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('mobile-overlay');
  const tabbarMenuBtn = document.getElementById('mobile-menu-tab');

  function openSidebar() {
    if (sidebar) sidebar.classList.add('is-open');
    if (overlay) overlay.classList.add('is-active');
  }
  function closeSidebar() {
    if (sidebar) sidebar.classList.remove('is-open');
    if (overlay) overlay.classList.remove('is-active');
  }

  if (menuBtn) menuBtn.addEventListener('click', openSidebar);
  if (tabbarMenuBtn) tabbarMenuBtn.addEventListener('click', openSidebar);
  if (overlay) overlay.addEventListener('click', closeSidebar);

  // サイドバーのナビアイテムをタップしたらドロワーを閉じる
  document.querySelectorAll('.sidebar .nav-item').forEach(el => {
    el.addEventListener('click', () => {
      if (window.innerWidth <= 767) closeSidebar();
    });
  });

  // 下部タブナビ: 現在のページに合わせてアクティブ表示更新
  function updateMobileTabs() {
    const hash = (window.location.hash || '#dashboard').replace('#', '');
    document.querySelectorAll('.mobile-tab').forEach(tab => {
      const target = tab.getAttribute('data-mobile-tab');
      if (target && target === hash) {
        tab.classList.add('is-active');
      } else {
        tab.classList.remove('is-active');
      }
    });
  }
  window.addEventListener('hashchange', updateMobileTabs);
  document.addEventListener('DOMContentLoaded', updateMobileTabs);
  updateMobileTabs();

  // 画面回転 / リサイズ時、PCサイズになったらドロワーを閉じる
  window.addEventListener('resize', () => {
    if (window.innerWidth > 767) closeSidebar();
  });

  // ESC でドロワーを閉じる
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSidebar();
  });
})();
</script>
