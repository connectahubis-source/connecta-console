/**
 * News 作成・編集モーダル。
 */
function NewsModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [title, setTitle] = useState(init.title || "");
  const [category, setCategory] = useState(init.category || "お知らせ");
  const [body, setBody] = useState(init.body || "");
  const [status, setStatus] = useState(init.status || "下書き");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit(publishStatus) {
    if (!title.trim()) { setError("タイトルは必須です"); return; }
    if (!category) { setError("カテゴリは必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        title: title.trim(),
        category,
        body,
        status: publishStatus || status,
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:680,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="file" s={16}/> {mode === "create" ? "記事を作成" : "記事を編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="field">
            <label className="field-label">タイトル <span className="field-req">*</span></label>
            <input className="input input-lg" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例: 春のIFT 募集開始のお知らせ"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">カテゴリ <span className="field-req">*</span></label>
              <div className="select-wrap">
                <select className="input select" value={category} onChange={e=>setCategory(e.target.value)}>
                  <option>お知らせ</option>
                  <option>特集</option>
                  <option>募集</option>
                  <option>報告</option>
                </select>
              </div>
            </div>
            <div className="field">
              <label className="field-label">ステータス</label>
              <div className="select-wrap">
                <select className="input select" value={status} onChange={e=>setStatus(e.target.value)}>
                  <option>下書き</option>
                  <option>公開中</option>
                  <option>予約</option>
                  <option>非公開</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">本文 <span className="field-req">*</span></label>
            <textarea className="input" style={{height:280,padding:12,resize:'vertical',fontSize:13,lineHeight:1.6}} value={body} onChange={e=>setBody(e.target.value)} placeholder="記事本文を入力..."/>
            <div className="field-hint">Phase 5新+ で Markdown / WYSIWYG エディタに置き換え予定</div>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'space-between',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={()=>handleSubmit('下書き')} disabled={saving}>
              {saving ? '保存中…' : '下書き保存'}
            </button>
            <button className="btn btn-indigo" onClick={()=>handleSubmit('公開中')} disabled={saving}>
              {saving ? '保存中…' : (mode === "create" ? '公開する' : '更新して公開')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function PageNews(){
  const [news, setNews] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("all");
  const [query, setQuery] = useState("");
  const [modalMode, setModalMode] = useState(null);
  const [editingN, setEditingN] = useState(null);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listNews');
        if (!cancelled) setNews(Array.isArray(data) ? data : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  async function handleSave(fields) {
    if (modalMode === "create") {
      await window.postData('createNews', fields);
    } else if (modalMode === "edit" && editingN) {
      await window.postData('updateNews', { newsId: editingN.id, fields });
    }
    window.location.reload();
  }

  async function handleDelete(newsId) {
    const n = news.find(x => x.id === newsId);
    if (!n) return;
    if (!await window.confirmDialog({title:`「${n.title}」を非公開にしますか?`, body:'行は残り、ステータスが「非公開」に変わります。後で復元できます。', danger:true, confirmLabel:'非公開化'})) return;
    setNews(prev => prev.map(x => x.id === newsId ? {...x, status: '非公開'} : x));
    try {
      await window.postData('deleteNews', { newsId });
    } catch (err) {
      setNews(prev => prev.map(x => x.id === newsId ? {...x, status: n.status} : x));
      window.toast.error('非公開化に失敗しました: ' + err.message);
    }
  }

  // フィルタ
  const filtered = news.filter(n => {
    if (filter === "all") {
      // デフォルトは「非公開」(=削除済み相当) を除外
      if (n.status === "非公開") return false;
    } else if (filter === "公開中" && n.status !== "公開中") return false;
    else if (filter === "下書き" && n.status !== "下書き") return false;
    else if (filter === "予約" && n.status !== "予約") return false;
    else if (filter === "非公開" && n.status !== "非公開") return false;

    if (query) {
      const q = query.toLowerCase();
      return (n.title || '').toLowerCase().includes(q) || (n.body || '').toLowerCase().includes(q);
    }
    return true;
  });

  const tabs = [
    ["all",     "すべて",  news.filter(n => n.status !== "非公開").length],
    ["公開中",   "公開中",  news.filter(n => n.status === "公開中").length],
    ["下書き",   "下書き",  news.filter(n => n.status === "下書き").length],
    ["予約",     "予約",    news.filter(n => n.status === "予約").length],
    ["非公開",   "非公開",  news.filter(n => n.status === "非公開").length],
  ];

  // トップ記事 (PV順、公開中のみ)
  const topNews = news.filter(n => n.status === "公開中").sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 3);

  return (
    <div className="page" data-page="news">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>コミュニケーション</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>ニュース配信</span></div>
          <h1>ニュース <i>配信</i></h1>
          <div className="ph-sub">公式サイト・アプリ・SNSへ横断配信。記事の作成・編集・公開管理。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost" disabled><Icon n="list" s={14}/> カテゴリ管理</button>
          <button className="btn btn-indigo" onClick={()=>{setEditingN(null); setModalMode("create");}}>
            <Icon n="plus" s={14}/> 記事を作成
          </button>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="grid-ab">
        <div className="card">
          <div className="card-head">
            <div className="row" style={{gap:4}}>
              {tabs.map(([k, l, c]) => (
                <span key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>
                  {l}<span style={{opacity:.6,marginLeft:4}}>{c}</span>
                </span>
              ))}
            </div>
            <div className="search-bar" style={{width:240}}>
              <Icon n="search" s={14}/><input className="input" placeholder="検索..." value={query} onChange={e=>setQuery(e.target.value)}/>
            </div>
          </div>
          {!loading && filtered.length === 0 ? (
            <div className="empty" style={{padding:'60px 40px'}}>
              <Icon n="file" s={28}/>
              <div style={{fontFamily:'var(--serif)',fontSize:18,marginTop:6,color:'var(--ink2)'}}>
                {news.length === 0 ? '記事がまだありません' : '該当する記事がありません'}
              </div>
              <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
                {news.length === 0 ? '右上の「記事を作成」から最初の記事を登録できます' : '別のフィルタやキーワードでお試しください'}
              </div>
            </div>
          ) : (
            <table className="tbl">
              <thead><tr>
                <th>記事</th><th>カテゴリ</th><th>公開日</th>
                <th className="right">PV</th><th>状態</th><th></th>
              </tr></thead>
              <tbody>
                {filtered.map(n => (
                  <tr key={n.id} style={{opacity: n.status === "非公開" ? 0.5 : 1}}>
                    <td>
                      <div style={{fontWeight:600}}>{n.title}</div>
                      <div style={{fontSize:11,color:'var(--ink4)'}}>{n.id}</div>
                    </td>
                    <td><span className="badge badge-indigo">{n.category}</span></td>
                    <td className="mono" style={{fontSize:11,color:'var(--ink3)'}}>{n.publishedAt || '—'}</td>
                    <td className="right num">{n.views ? fmt(n.views) : '—'}</td>
                    <td>
                      <span className={clsx("badge",
                        n.status==="公開中"?"badge-green"
                        : n.status==="下書き"?"badge-ink"
                        : n.status==="予約"?"badge-amber"
                        : "badge-ink")}>
                        <span className="badge-dot"></span>{n.status}
                      </span>
                    </td>
                    <td>
                      <div className="row-actions">
                        <button className="btn btn-soft btn-sm btn-icon" title="編集" onClick={()=>{setEditingN(n); setModalMode("edit");}}>
                          <Icon n="edit" s={11}/>
                        </button>
                        {n.status !== "非公開" && (
                          <button className="btn btn-soft btn-sm btn-icon" title="非公開化" onClick={()=>handleDelete(n.id)}>
                            <Icon n="trash" s={11}/>
                          </button>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="info" s={16}/> 配信チャネル (Phase 5新+)</div></div>
            <div className="card-body" style={{padding:0}}>
              {[
                {n:"公式サイト",   d:"connecta.jp"},
                {n:"X (Twitter)", d:"@connecta_jp"},
                {n:"Instagram",    d:"@connecta.official"},
                {n:"LINE公式",     d:"LINE@connecta"},
              ].map(c => (
                <div key={c.n} style={{padding:"12px 16px",borderTop:"1px solid var(--line)",display:'flex',alignItems:'center',gap:10,opacity:0.5}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12.5,fontWeight:600}}>{c.n}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>{c.d}</div>
                  </div>
                  <span className="badge badge-ink" style={{fontSize:9}}>準備中</span>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="trend" s={16}/> トップ記事 (公開中)</div></div>
            <div className="card-body" style={{padding:0}}>
              {topNews.length === 0 ? (
                <div style={{padding:'30px 14px',textAlign:'center',color:'var(--ink5)',fontSize:11}}>
                  公開中の記事がまだありません
                </div>
              ) : (
                topNews.map((n, i) => (
                  <div key={n.id} style={{padding:"10px 16px",borderTop:i?"1px solid var(--line)":"none",display:'flex',gap:10,alignItems:'center'}}>
                    <div style={{fontFamily:'var(--serif)',fontSize:20,color:'var(--ink4)'}}>{i+1}</div>
                    <div style={{flex:1,fontSize:12.5}}>{n.title}</div>
                    <div className="mono" style={{fontSize:11,color:'var(--ink3)'}}>{n.views ? fmt(n.views) : '—'}</div>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      </div>

      {modalMode && (
        <NewsModal
          mode={modalMode}
          initialValues={modalMode === "edit" ? editingN : null}
          onSave={handleSave}
          onCancel={()=>{setModalMode(null); setEditingN(null);}}
        />
      )}
    </div>
  );
}

  const [body, setBody] = useState(init.body || "");

  async function handleSubmit() {
    if (!name.trim()) { setError("名称は必須です"); return; }
    if (!category) { setError("カテゴリは必須です"); return; }
    setSaving(true);
    setError(null);

              <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="例: 申込確認メール"/>
            </div>
            <div className="field">
              <label className="field-label">カテゴリ <span className="field-req">*</span></label>
              <div className="select-wrap">
                <select className="input select" value={category} onChange={e=>setCategory(e.target.value)}>

                  <option>SNS</option>
                  <option>チャット</option>

              </div>

            <label className="field-label">本文</label>
            <textarea className="input" style={{height:200,padding:12,resize:'vertical',fontFamily:'var(--mono)',fontSize:12}} value={body} onChange={e=>setBody(e.target.value)} placeholder="テンプレート本文を入力..."/>

function PageTemplates(){
  const [templates, setTemplates] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("all");
  const [query, setQuery] = useState("");
  const [modalMode, setModalMode] = useState(null);
  const [editingT, setEditingT] = useState(null);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listTemplates');
        if (!cancelled) setTemplates(Array.isArray(data) ? data : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  async function handleSave(fields) {
    if (modalMode === "create") {
      await window.postData('createTemplate', fields);
    } else if (modalMode === "edit" && editingT) {
      await window.postData('updateTemplate', { tplId: editingT.id, fields });
    }
    window.location.reload();
  }

  async function handleDelete(tplId) {
    const t = templates.find(x => x.id === tplId);
    if (!t) return;
    if (!await window.confirmDialog({title:`「${t.name}」を削除しますか?`, body:'物理削除されます。元に戻せません。', danger:true, confirmLabel:'削除'})) return;
    setTemplates(prev => prev.filter(x => x.id !== tplId));
    try {
      await window.postData('deleteTemplate', { tplId });
    } catch (err) {
      window.location.reload();
    }
  }

  const visible = templates.filter(t => {
    if (filter !== "all" && t.category !== filter) return false;
    if (query) {
      const q = query.toLowerCase();
      return (t.name || '').toLowerCase().includes(q) || (t.preview || '').toLowerCase().includes(q);
    }
    return true;
  });

  return (
    <div className="page" data-page="templates">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>コミュニケーション</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>定型文</span></div>
          <h1>定型文 <i>ライブラリ</i></h1>
          <div className="ph-sub">メール・SNS・チャットのテンプレートを集約管理。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost" disabled><Icon n="upload" s={14}/> インポート</button>
          <button className="btn btn-indigo" onClick={()=>{setEditingT(null); setModalMode("create");}}>
            <Icon n="plus" s={14}/> 新規作成
          </button>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="row mb16">
        {[["all","すべて"],["メール","メール"],["SNS","SNS"],["チャット","チャット"]].map(([k,l]) => (
          <div key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>{l}</div>
        ))}
        <div style={{flex:1}}></div>
        <div className="search-bar" style={{width:260}}>
          <Icon n="search" s={14}/><input className="input" placeholder="検索..." value={query} onChange={e=>setQuery(e.target.value)}/>
        </div>
      </div>

      {!loading && visible.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 40px'}}>
            <Icon n="file" s={28}/>
            <div style={{fontFamily:'var(--serif)',fontSize:20,marginTop:6,color:'var(--ink2)'}}>
              {templates.length === 0 ? 'テンプレートがまだありません' : '該当するテンプレートがありません'}
            </div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
              {templates.length === 0 ? '右上の「新規作成」から最初のテンプレートを登録できます' : '別のフィルタやキーワードでお試しください'}
            </div>
          </div>
        </div>
      ) : (
        <div className="grid-3">
          {visible.map(t => (
            <div key={t.id} className="card" style={{cursor:'pointer'}}>
              <div className="card-body">
                <div className="row between" style={{marginBottom:10}}>
                  <span className={clsx("badge", t.category==="メール"?"badge-indigo":t.category==="SNS"?"badge-coral":"badge-teal")}>{t.category}</span>
                  <div style={{display:'flex',gap:4}}>
                    <button className="btn btn-soft btn-sm btn-icon" title="編集" onClick={(ev)=>{ev.stopPropagation(); setEditingT(t); setModalMode("edit");}}><Icon n="edit" s={11}/></button>
                    <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={(ev)=>{ev.stopPropagation(); handleDelete(t.id);}}><Icon n="trash" s={11}/></button>
                  </div>
                </div>
                <div style={{fontFamily:'var(--serif)',fontSize:18,letterSpacing:'-.015em',marginBottom:6}}>{t.name}</div>
                <div style={{fontSize:12,color:'var(--ink3)',lineHeight:1.6,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden',minHeight:58}}>{t.preview || '(本文なし)'}</div>
                <div className="row between mt12" style={{paddingTop:10,borderTop:'1px dashed var(--line)',fontSize:11,color:'var(--ink4)'}}>
                  <span>{t.uses || 0}回 使用</span>
                  <span className="mono">{t.updatedAt || '—'}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {modalMode && (
        <TemplateModal
          mode={modalMode}
          initialValues={modalMode === "edit" ? editingT : null}
          onSave={handleSave}
          onCancel={()=>{setModalMode(null); setEditingT(null);}}
        />
      )}
    </div>
  );
}

/**
 * 参加者作成・編集モーダル。
 * mode: "create" | "edit"

 * onSave(fields): 保存ハンドラ
 * onCancel(): 閉じるハンドラ
 */
function ParticipantModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [name, setName] = useState(init.name || "");
  const [kana, setKana] = useState(init.kana || "");
  const [email, setEmail] = useState(init.email || "");
  const [age, setAge] = useState(init.age ? String(init.age) : "");
  const [gender, setGender] = useState(init.gender || "");
  const [dept, setDept] = useState(init.dept || "");
  const [tagsInput, setTagsInput] = useState((init.tags || []).join(", "));
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!name.trim() || !kana.trim() || !email.trim()) {
      setError("氏名、カナ、メールは必須です");
      return;
    }
    setSaving(true);
    setError(null);
    const tags = tagsInput.split(',').map(t => t.trim()).filter(Boolean);
    const fields = {
      name: name.trim(),
      kana: kana.trim(),
      email: email.trim(),
      age: Number(age) || 0,
      gender: gender,
      dept: dept,
      tags: tags,
    };
    try {
      await onSave(fields);
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:520,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title">
            <Icon n="user" s={16}/>
            {mode === "create" ? "参加者を追加" : "参加者を編集"}
          </div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel} title="閉じる"><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && (
            <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>
              {error}
            </div>
          )}
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">氏名 <span className="field-req">*</span></label>
              <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="例: 田中 陽子"/>
            </div>
            <div className="field">
              <label className="field-label">カナ <span className="field-req">*</span></label>
              <input className="input" value={kana} onChange={e=>setKana(e.target.value)} placeholder="例: タナカ ヨウコ"/>
            </div>
          </div>
          <div className="field">
            <label className="field-label">メール <span className="field-req">*</span></label>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@example.com"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">年齢</label>
              <input className="input" type="number" min="0" max="150" value={age} onChange={e=>setAge(e.target.value)}/>
            </div>
            <div className="field">
              <label className="field-label">性別</label>
              <div className="select-wrap">
                <select className="input select" value={gender} onChange={e=>setGender(e.target.value)}>
                  <option value="">未指定</option>
                  <option value="女性">女性</option>
                  <option value="男性">男性</option>
                  <option value="その他">その他</option>

function PageParticipants(){
  const [sel, setSel] = useState(null);
  const [filter, setFilter] = useState("全員");
  const [query, setQuery] = useState("");

  // データ層: 初期は空配列、マウント時に API から取得
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  // モーダル制御
  const [modalMode, setModalMode] = useState(null);   // null | "create" | "edit"
  const [editingP, setEditingP] = useState(null);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listParticipants');
        if (!cancelled) setParticipants(Array.isArray(data) ? data : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // 作成 / 編集の保存ハンドラ
  async function handleSave(fields) {
    if (modalMode === "create") {
      await window.postData('createParticipant', fields);
    } else if (modalMode === "edit" && editingP) {
      await window.postData('updateParticipant', { userId: editingP.id, fields });
    }
    // 成功 → リロードで一覧を再取得 (確実)
    window.location.reload();
  }

  // 削除 (論理削除)
  async function handleDelete(userId) {
    const p = participants.find(x => x.id === userId);
    if (!p) return;
    if (!await window.confirmDialog({title:`「${p.name}」をアーカイブしますか?`, body:'行は残り、ステータスが「アーカイブ」に変わります。後で復元できます。', danger:true, confirmLabel:'アーカイブ'})) return;

    // 楽観的UI更新
    setParticipants(prev => prev.map(x => x.id === userId ? {...x, status: 'アーカイブ'} : x));

    try {
      await window.postData('deleteParticipant', { userId });
    } catch (err) {
      // 失敗したら元に戻す
      setParticipants(prev => prev.map(x => x.id === userId ? {...x, status: p.status} : x));
      window.toast.error('削除に失敗しました: ' + err.message);
    }
  }

  // フィルタ済み参加者リスト
  const visible = participants.filter(p => {
    // ステータスフィルタ (タブ)
    if (filter === "全員") {
      // デフォルトはアーカイブ非表示
      if (p.status === "アーカイブ") return false;
    } else if (filter === "アーカイブ") {
      if (p.status !== "アーカイブ") return false;
    } else if (filter === "リーダー" && !(p.tags || []).includes("リーダー")) return false;
    else if (filter === "新規" && !(p.tags || []).includes("新規")) return false;
    else if (filter === "常連" && !(p.tags || []).includes("常連")) return false;

    // 検索
    if (query) {
      const q = query.toLowerCase();
      if (!(p.name || '').toLowerCase().includes(q) && !(p.email || '').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const activeCount = participants.filter(p => p.status !== "アーカイブ").length;
  const archivedCount = participants.filter(p => p.status === "アーカイブ").length;
  const leaderCount = participants.filter(p => (p.tags || []).includes("リーダー") && p.status !== "アーカイブ").length;
  const newCount = participants.filter(p => (p.tags || []).includes("新規") && p.status !== "アーカイブ").length;

  return (
    <div className="page" data-page="participants">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>参加者</span></div>
          <h1>参加者 <i>データベース</i></h1>
          <div className="ph-sub">セグメント作成、タグ管理、履歴閲覧。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost"><Icon n="upload" s={14}/> インポート</button>
          <button className="btn btn-ghost"><Icon n="download" s={14}/> CSV</button>
          <button className="btn btn-indigo" onClick={()=>{setEditingP(null); setModalMode("create");}}>
            <Icon n="plus" s={14}/> 手動追加
          </button>
        </div>

/**
 * Todo 作成モーダル。
 */
function TodoModal({events, onSave, onCancel}){
  const [task, setTask] = useState("");
  const [deadline, setDeadline] = useState("");
  const [priority, setPriority] = useState("中");
  const [assignee, setAssignee] = useState("");
  const [eventId, setEventId] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!task.trim()) {
      setError("タスク名は必須です");
      return;
    }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        task: task.trim(),
        deadline: deadline,
        priority: priority,
        assignee: assignee.trim(),
        eventId: eventId,
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  const visibleEvents = events.filter(e => e.status !== "アーカイブ");

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:480,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>

        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && (
            <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>
              {error}
            </div>
          )}
          <div className="field">
            <label className="field-label">タスク <span className="field-req">*</span></label>
            <input className="input" value={task} onChange={e=>setTask(e.target.value)} placeholder="例: 会場の備品リストを作成"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">期限</label>
              <input className="input" type="date" value={deadline} onChange={e=>setDeadline(e.target.value)}/>
            </div>
            <div className="field">
              <label className="field-label">優先度</label>
              <div className="select-wrap">
                <select className="input select" value={priority} onChange={e=>setPriority(e.target.value)}>

                  <option value="中">中</option>
                  <option value="低">低</option>

              </div>
            </div>
          </div>

            <label className="field-label">担当者</label>

          </div>
          <div className="field">
            <label className="field-label">関連イベント (任意)</label>
            <div className="select-wrap">
              <select className="input select" value={eventId} onChange={e=>setEventId(e.target.value)}>

function PageTodo(){
  const [todos, setTodos] = useState([]);
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [showModal, setShowModal] = useState(false);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [tds, evs] = await Promise.all([
          window.fetchData('listTodos'),
          window.fetchData('listEvents'),
        ]);
        if (cancelled) return;
        setTodos(Array.isArray(tds) ? tds : []);
        setEvents(Array.isArray(evs) ? evs : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  async function handleSave(fields) {
    await window.postData('createTodo', fields);
    window.location.reload();
  }

  // 完了/未完了の切替 (楽観的UI更新)
  async function toggle(id) {
    const t = todos.find(x => x.id === id);
    if (!t) return;
    const newDone = !t.done;
    setTodos(prev => prev.map(x => x.id === id ? {...x, done: newDone} : x));
    try {
      await window.postData('toggleTodo', { todoId: id });
    } catch (err) {
      setTodos(prev => prev.map(x => x.id === id ? {...x, done: !newDone} : x));
      window.toast.error('更新に失敗しました: ' + err.message);
    }
  }

  // 削除 (物理削除)
  async function handleDelete(id) {
    const t = todos.find(x => x.id === id);
    if (!t) return;
    if (!await window.confirmDialog({title:`「${t.task}」を削除しますか?`, body:'Todoは物理削除されます。元に戻せません。', danger:true, confirmLabel:'削除'})) return;

    setTodos(prev => prev.filter(x => x.id !== id));
    try {
      await window.postData('deleteTodo', { todoId: id });
    } catch (err) {
      // 失敗したら元に戻す（再ロード）
      window.location.reload();
    }
  }

  const groups = {高:[], 中:[], 低:[]};
  todos.filter(t => !t.done).forEach(t => {
    const pri = ['高','中','低'].includes(t.priority) ? t.priority : '中';
    groups[pri].push(t);
  });
  const done = todos.filter(t => t.done);

  return (
    <div className="page" data-page="todo">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>Todo</span></div>
          <h1>Todo <i>ボード</i></h1>
          <div className="ph-sub">優先度別の運営タスク。イベント紐付け、担当者アサイン可能。</div>
        </div>
        <div className="ph-right">
          <div className="chip on">リスト</div>
          <div className="chip" style={{opacity:0.5}}>カンバン</div>
          <button className="btn btn-indigo" onClick={()=>setShowModal(true)}>
            <Icon n="plus" s={14}/> タスク追加
          </button>
        </div>
      </div>

      {error && (
        <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}>
          <b>読み込みエラー:</b> {error}
        </div>
      )}

      {!loading && todos.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 40px'}}>
            <Icon n="check2" s={28}/>
            <div style={{fontFamily:'var(--serif)',fontSize:20,marginTop:6,color:'var(--ink2)'}}>
              タスクがまだありません
            </div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
              右上の「タスク追加」ボタンから最初のタスクを登録できます
            </div>
          </div>
        </div>
      ) : (
        <div className="grid-3">
          {[["高","coral"],["中","indigo"],["低","teal"]].map(([pri, c]) => (
            <div key={pri} className="card">
              <div className="card-head">
                <div className="row" style={{gap:8}}>
                  <span style={{width:8,height:8,borderRadius:2,background:`var(--${c})`}}></span>
                  <div className="card-title">優先度 {pri}</div>
                  <span className="badge badge-ink">{groups[pri].length}</span>
                </div>
                <button className="btn btn-soft btn-sm btn-icon" onClick={()=>setShowModal(true)}><Icon n="plus" s={12}/></button>
              </div>
              <div className="card-body stack" style={{gap:8,minHeight:120}}>
                {groups[pri].length === 0 && !loading && (
                  <div style={{padding:'30px 14px',textAlign:'center',color:'var(--ink5)',fontSize:11}}>
                    タスクなし
                  </div>
                )}
                {groups[pri].map(t => (
                  <div key={t.id} style={{padding:12,border:'1px solid var(--line)',borderRadius:10,background:'var(--white)'}}>
                    <div className="row" style={{gap:8,marginBottom:8}}>
                      <span className="ck" onClick={()=>toggle(t.id)} style={{cursor:'pointer'}}></span>
                      <span style={{fontSize:12.5,flex:1,fontWeight:500,lineHeight:1.5}}>{t.task}</span>
                      <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={()=>handleDelete(t.id)} style={{flex:'none'}}>
                        <Icon n="trash" s={11}/>
                      </button>
                    </div>
                    <div className="row between" style={{fontSize:11}}>
                      <div className="row" style={{gap:6,flexWrap:'wrap'}}>
                        {t.eventTitle && (
                          <span className="badge badge-indigo" style={{fontSize:10}}>
                            {t.eventTitle.slice(0, 10)}
                          </span>
                        )}
                        {t.deadline && (
                          <span style={{color:'var(--ink4)',fontWeight:600,display:'flex',gap:3,alignItems:'center'}}>
                            <Icon n="clock" s={10}/> {t.deadline}
                          </span>
                        )}
                      </div>
                      {t.assignee && <div className="avatar sm indigo">{t.assignee[0]}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {done.length > 0 && (
        <div className="card mt16">
          <div className="card-head">
            <div className="card-title"><Icon n="check2" s={16}/> 完了済み</div>
            <span className="badge badge-green">{done.length}</span>
          </div>
          <div className="card-body" style={{padding:0}}>
            {done.map((t, i) => (
              <div key={t.id} style={{padding:"10px 16px",borderTop:i?"1px solid var(--line)":"none",display:'flex',gap:10,alignItems:'center',opacity:.6}}>
                <span className="ck on" onClick={()=>toggle(t.id)} style={{cursor:'pointer'}}></span>
                <span style={{fontSize:12.5,flex:1,textDecoration:'line-through'}}>{t.task}</span>
                <span className="mono" style={{fontSize:11,color:'var(--ink4)'}}>{t.deadline || '—'}</span>
                <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={()=>handleDelete(t.id)}>
                  <Icon n="trash" s={11}/>
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {showModal && (
        <TodoModal
          events={events}
          onSave={handleSave}
          onCancel={()=>setShowModal(false)}
        />
      )}
    </div>
  );
}

/**

function PaymentModal({events, participants, onSave, onCancel}){
  const [eventId, setEventId] = useState("");
  const [userId, setUserId] = useState("");

  const [method, setMethod] = useState("銀行振込");

  useEffect(() => {
    if (eventId) {
      const e = events.find(x => x.id === eventId);
      if (e && e.fee) setAmount(String(e.fee));
    }

  async function handleSubmit() {
    if (!eventId) { setError("イベントを選択してください"); return; }

      setSaving(false);

  const visibleUsers = participants.filter(p => p.status !== "アーカイブ");

              <select className="input select" value={eventId} onChange={e=>setEventId(e.target.value)}>

                <select className="input select" value={method} onChange={e=>setMethod(e.target.value)}>

                  <option>PayPay</option>

            <label className="field-label">ステータス</label>

      </div>

function PagePayments(){
  const [payments, setPayments] = useState([]);
  const [events, setEvents] = useState([]);
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("all");
  const [showModal, setShowModal] = useState(false);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [pays, evs, parts] = await Promise.all([
          window.fetchData('listPayments'),
          window.fetchData('listEvents'),
          window.fetchData('listParticipants'),
        ]);
        if (cancelled) return;
        setPayments(Array.isArray(pays) ? pays : []);
        setEvents(Array.isArray(evs) ? evs : []);
        setParticipants(Array.isArray(parts) ? parts : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  async function handleSave(fields) {
    await window.postData('createPayment', fields);
    window.location.reload();
  }

  async function handleDelete(payId) {
    const p = payments.find(x => x.id === payId);
    if (!p) return;
    if (!await window.confirmDialog({title:`決済記録 ${payId} を削除しますか?`, body:`${p.name} / ${yen(p.amount)} の記録が物理削除されます。`, danger:true, confirmLabel:'削除'})) return;
    setPayments(prev => prev.filter(x => x.id !== payId));
    try {
      await window.postData('deletePayment', { payId });
    } catch (err) {
      window.location.reload();
    }
  }

  // 集計
  const success = payments.filter(p => p.status === "成功");
  const totalRev = success.reduce((s, p) => s + (p.amount || 0), 0);
  const pending = payments.filter(p => p.status === "入金待ち").length;
  const failed = payments.filter(p => p.status === "失敗" || p.status === "返金").length;

  // フィルタ済み
  const visible = payments.filter(p => {
    if (filter === "all") return true;
    return p.status === filter;
  });

  return (
    <div className="page" data-page="payments">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>決済・精算</span></div>
          <h1>決済・<i>精算</i></h1>
          <div className="ph-sub">入金記録の一元管理。Stripe・PayPay・銀行振込・現金に対応。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost" disabled><Icon n="download" s={14}/> 明細出力</button>
          <button className="btn btn-coral" onClick={()=>setShowModal(true)}>
            <Icon n="plus" s={14}/> 決済を追加
          </button>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="kpi-grid">
        <MiniStat label="累計入金額 (成功)" value={loading ? '…' : yen(totalRev)} sub="" icon="yen" color="green"/>
        <MiniStat label="入金件数 (成功)" value={loading ? '…' : String(success.length)} sub="" icon="card" color="indigo"/>
        <MiniStat label="入金待ち" value={loading ? '…' : String(pending)} sub="要対応" icon="clock" color="amber"/>
        <MiniStat label="失敗・返金" value={loading ? '…' : String(failed)} sub="" icon="warn" color="red"/>
      </div>

      <div className="row mb16" style={{gap:6}}>
        {[["all","すべて"],["成功","成功"],["入金待ち","入金待ち"],["失敗","失敗"],["返金","返金"]].map(([k,l]) => (
          <span key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>{l}</span>
        ))}
        <div style={{flex:1}}></div>
        <span style={{fontSize:11,color:'var(--ink4)'}}>{loading ? '読み込み中...' : `${visible.length} 件`}</span>
      </div>

      {!loading && visible.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 40px'}}>
            <Icon n="card" s={28}/>
            <div style={{fontFamily:'var(--serif)',fontSize:20,marginTop:6,color:'var(--ink2)'}}>
              {payments.length === 0 ? '決済記録がありません' : '該当する記録がありません'}
            </div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
              {payments.length === 0 ? '右上の「決済を追加」ボタンから記録できます' : '別のフィルタでお試しください'}
            </div>
          </div>
        </div>
      ) : (
        <div className="card">
          <table className="tbl">
            <thead><tr>
              <th>ID</th><th>申込者</th><th>イベント</th><th>方法</th>
              <th className="right">金額</th><th>状態</th><th>日時</th><th></th>
            </tr></thead>
            <tbody>
              {visible.map(p => {
                const st = p.status === "成功" ? "badge-green"
                         : p.status === "入金待ち" ? "badge-amber"
                         : p.status === "返金" ? "badge-violet"
                         : "badge-red";
                return (
                  <tr key={p.id}>
                    <td className="mono" style={{fontSize:11,color:'var(--ink3)'}}>{p.id}</td>
                    <td style={{fontWeight:600}}>{p.name || '—'}</td>
                    <td>
                      <div style={{display:'flex',gap:6,alignItems:'center'}}>
                        <div style={{width:3,height:18,background:`var(--${p.eventAccent})`,borderRadius:2}}></div>
                        <span style={{fontSize:12}}>{p.eventTitle || '—'}</span>
                      </div>
                    </td>
                    <td><span className="badge badge-ink">{p.method}</span></td>
                    <td className="right num" style={{fontWeight:700}}>{yen(p.amount)}</td>
                    <td><span className={clsx("badge", st)}><span className="badge-dot"></span>{p.status}</span></td>
                    <td className="mono" style={{fontSize:11,color:'var(--ink4)'}}>{p.paidAt || '—'}</td>
                    <td>
                      <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={()=>handleDelete(p.id)}>
                        <Icon n="trash" s={11}/>
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {showModal && (
        <PaymentModal
          events={events}
          participants={participants}
          onSave={handleSave}
          onCancel={()=>setShowModal(false)}
        />
      )}
    </div>
  );
}

/**
 * 部署 / チーム。connec+a の4イニシアチブ + 横断班構成。

/**
 * Member 作成・編集モーダル。
 */
function MemberModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [name, setName] = useState(init.name || "");
  const [email, setEmail] = useState(init.email || "");
  const [dept, setDept] = useState(init.dept || "運営本部");
  const [title, setTitle] = useState(init.title || "メンバー");
  const [role, setRole] = useState(init.role || "編集者");
  const [initial, setInitial] = useState(init.initial || "");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!name.trim()) { setError("氏名は必須です"); return; }
    if (!email.trim()) { setError("メールは必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        name: name.trim(),
        email: email.trim(),
        dept, title, role,
        initial: initial.trim(),
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:520,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="user" s={16}/> {mode === "create" ? "メンバーを追加" : "メンバーを編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">氏名 <span className="field-req">*</span></label>
              <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="例: 山田 太郎"/>
            </div>
            <div className="field">
              <label className="field-label">イニシャル</label>
              <input className="input" value={initial} onChange={e=>setInitial(e.target.value)} maxLength={3} placeholder="自動生成"/>
              <div className="field-hint">空欄で氏名から自動生成</div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">メール <span className="field-req">*</span></label>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@connecta.jp"/>
            <div className="field-hint">在籍中メンバーで重複不可</div>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">部署 <span className="field-req">*</span></label>
              <div className="select-wrap">
                <select className="input select" value={dept} onChange={e=>setDept(e.target.value)}>
                  <option>運営本部</option>
                  <option>IFT班</option>
                  <option>hub班</option>
                  <option>community班</option>
                  <option>order made班</option>
                  <option>広報班</option>
                </select>
              </div>
            </div>
            <div className="field">
              <label className="field-label">役職 <span className="field-req">*</span></label>
              <div className="select-wrap">
                <select className="input select" value={title} onChange={e=>setTitle(e.target.value)}>
                  <option>代表</option>
                  <option>副代表</option>
                  <option>リーダー</option>
                  <option>メンバー</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">ロール (権限) <span className="field-req">*</span></label>
            <div className="select-wrap">
              <select className="input select" value={role} onChange={e=>setRole(e.target.value)}>
                <option>オーナー</option>
                <option>管理者</option>
                <option>リーダー</option>
                <option>編集者</option>
                <option>閲覧者</option>
              </select>
            </div>
            <div className="field-hint">Phase 5新+ で実際の権限制御に使用予定</div>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving}>
            {saving ? '保存中…' : (mode === "create" ? '追加' : '更新')}
          </button>
        </div>
      </div>
    </div>
  );
}

function PageDepartments(){
  const [members, setMembers] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("active");
  const [query, setQuery] = useState("");
  const [deptFilter, setDeptFilter] = useState("all");
  const [modalMode, setModalMode] = useState(null);
  const [editingM, setEditingM] = useState(null);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listMembers');
        if (!cancelled) setMembers(Array.isArray(data) ? data : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  async function handleSave(fields) {
    if (modalMode === "create") {
      await window.postData('createMember', fields);
    } else if (modalMode === "edit" && editingM) {
      await window.postData('updateMember', { memberId: editingM.id, fields });
    }
    window.location.reload();
  }

  async function handleDelete(memberId) {
    const m = members.find(x => x.id === memberId);
    if (!m) return;
    if (!await window.confirmDialog({title:`「${m.name}」を退会扱いにしますか?`, body:'行は残り、退会日がセットされます。後で復元できます。', danger:true, confirmLabel:'退会'})) return;
    setMembers(prev => prev.map(x => x.id === memberId ? {...x, isActive: false, leftAt: 'たった今'} : x));
    try {
      await window.postData('deleteMember', { memberId });
    } catch (err) {
      window.location.reload();
    }
  }

  async function handleRestore(memberId) {
    const m = members.find(x => x.id === memberId);
    if (!m) return;
    if (!await window.confirmDialog({title:`「${m.name}」を在籍中に戻しますか?`, body:'退会日がクリアされ、在籍メンバーに戻ります。'})) return;
    setMembers(prev => prev.map(x => x.id === memberId ? {...x, isActive: true, leftAt: ''} : x));
    try {
      await window.postData('restoreMember', { memberId });
    } catch (err) {
      window.location.reload();
    }
  }

  // フィルタ
  const filtered = members.filter(m => {
    if (filter === "active" && !m.isActive) return false;
    if (filter === "left" && m.isActive) return false;
    if (deptFilter !== "all" && m.dept !== deptFilter) return false;
    if (query) {
      const q = query.toLowerCase();
      return (m.name || '').toLowerCase().includes(q)
          || (m.email || '').toLowerCase().includes(q)
          || (m.id || '').toLowerCase().includes(q);
    }
    return true;
  });

  // 部署別集計 (在籍中のみ)
  const deptList = ["運営本部","IFT班","hub班","community班","order made班","広報班"];
  const deptStats = deptList.map(d => {
    const dm = members.filter(m => m.dept === d && m.isActive);
    const lead = dm.find(m => m.title === "リーダー" || m.title === "代表" || m.title === "副代表");
    return {
      name: d,
      accent: getDefaultAccent(d),
      members: dm,
      lead: lead ? lead.name : '—',
      count: dm.length,
    };
  });

  const activeCount = members.filter(m => m.isActive).length;
  const leftCount = members.filter(m => !m.isActive).length;

  return (
    <div className="page" data-page="departments">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>部署 / チーム</span></div>
          <h1>部署 / <i>チーム</i></h1>
          <div className="ph-sub">運営メンバーの一元管理。部署、役職、ロール (権限) を管理。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-indigo" onClick={()=>{setEditingM(null); setModalMode("create");}}>
            <Icon n="plus" s={14}/> メンバーを追加
          </button>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <MiniStat label="在籍メンバー" value={loading ? '…' : String(activeCount)} sub="" icon="users" color="indigo"/>
        <MiniStat label="退会済み" value={loading ? '…' : String(leftCount)} sub="" icon="user" color="amber"/>
        <MiniStat label="部署数" value={String(deptList.length)} sub="" icon="building" color="violet"/>
        <MiniStat label="ロール種別" value="5" sub="" icon="lock" color="coral"/>
      </div>

      {/* 部署別カード (在籍中のみ表示) */}
      <div className="grid-3">
        {deptStats.map(d => (
          <div key={d.name} className="card">
            <div style={{padding:16,display:'flex',gap:12,alignItems:'center',borderBottom:'1px solid var(--line)'}}>
              <div style={{width:44,height:44,borderRadius:10,background:`var(--${d.accent}-50)`,color:`var(--${d.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--serif)',fontSize:22}}>{d.name[0]}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:'var(--serif)',fontSize:18,letterSpacing:'-.015em'}}>{d.name}</div>
                <div style={{fontSize:11,color:'var(--ink4)'}}>{d.count}名 在籍</div>
              </div>
              <button className="btn btn-soft btn-sm btn-icon" onClick={()=>setDeptFilter(d.name)} title={`${d.name}でフィルタ`}>
                <Icon n="filter" s={12}/>
              </button>
            </div>
            <div className="card-body">
              <div className="row between mb8" style={{fontSize:11}}>
                <span style={{color:'var(--ink4)'}}>リーダー</span>
                <span style={{fontWeight:600}}>{d.lead}</span>
              </div>
              <div style={{display:'flex',marginTop:8}}>
                {d.members.slice(0, 5).map((m, i) => (
                  <div key={m.id} className={`avatar sm ${m.accent}`} style={{marginLeft:i?-6:0,border:'2px solid white'}}>
                    {m.initial}
                  </div>
                ))}
                {d.count > 5 && (
                  <div className="avatar sm" style={{marginLeft:-6,border:'2px solid white',background:'var(--bg3)',color:'var(--ink3)'}}>+{d.count-5}</div>
                )}
                {d.count === 0 && (
                  <span style={{fontSize:11,color:'var(--ink5)'}}>(0名)</span>
                )}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* メンバー一覧テーブル */}
      <div className="card mt16">
        <div className="card-head">
          <div className="card-title"><Icon n="users" s={16}/> メンバー一覧</div>
          <div className="row" style={{gap:6}}>
            {[["active","在籍",activeCount],["left","退会",leftCount],["all","全員",members.length]].map(([k,l,c]) => (
              <span key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>
                {l}<span style={{opacity:.6,marginLeft:4}}>{c}</span>
              </span>
            ))}
          </div>
        </div>
        <div className="row" style={{padding:'10px 14px',gap:8,borderBottom:'1px solid var(--line)'}}>
          <div className="search-bar" style={{flex:1,maxWidth:280}}>
            <Icon n="search" s={14}/><input className="input" placeholder="名前・メール..." value={query} onChange={e=>setQuery(e.target.value)}/>
          </div>
          <div className="select-wrap" style={{minWidth:160}}>
            <select className="input select" value={deptFilter} onChange={e=>setDeptFilter(e.target.value)}>
              <option value="all">すべての部署</option>
              {deptList.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div style={{flex:1}}></div>
          <span style={{fontSize:11,color:'var(--ink4)',padding:'8px 0'}}>{loading ? '...' : `${filtered.length} 件`}</span>
        </div>
        {!loading && filtered.length === 0 ? (
          <div className="empty" style={{padding:'40px 20px'}}>
            <Icon n="users" s={28}/>
            <div>{members.length === 0 ? 'メンバーがまだいません' : '該当するメンバーがいません'}</div>
            <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>{members.length === 0 ? '右上の「メンバーを追加」ボタンから登録できます' : '別のフィルタでお試しください'}</div>
          </div>
        ) : (
          <table className="tbl">
            <thead><tr>
              <th style={{width:32}}></th>
              <th>メンバー</th><th>部署</th><th>役職</th><th>ロール</th><th>入会日</th><th>状態</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.map(m => (
                <tr key={m.id} style={{opacity: m.isActive ? 1 : 0.5}}>
                  <td><div className={`avatar sm ${m.accent}`}>{m.initial}</div></td>
                  <td>
                    <div style={{fontWeight:600}}>{m.name}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>{m.email}</div>
                  </td>
                  <td><span className={`badge badge-${m.accent}`}>{m.dept}</span></td>
                  <td style={{fontSize:12,fontWeight:500}}>{m.title}</td>
                  <td><span className={clsx("badge",
                      m.role==="オーナー"?"badge-coral"
                      : m.role==="管理者"?"badge-indigo"
                      : m.role==="リーダー"?"badge-violet"
                      : m.role==="編集者"?"badge-teal"
                      : "badge-ink")}>{m.role}</span></td>
                  <td className="mono" style={{fontSize:11,color:'var(--ink4)'}}>{m.joinedAt || '—'}</td>
                  <td>
                    {m.isActive ? (
                      <span className="badge badge-green"><span className="badge-dot"></span>在籍</span>
                    ) : (
                      <span className="badge badge-ink"><span className="badge-dot"></span>退会 ({m.leftAt})</span>
                    )}
                  </td>
                  <td>
                    <div className="row-actions">
                      <button className="btn btn-soft btn-sm btn-icon" title="編集" onClick={()=>{setEditingM(m); setModalMode("edit");}}>
                        <Icon n="edit" s={11}/>
                      </button>
                      {m.isActive ? (
                        <button className="btn btn-soft btn-sm btn-icon" title="退会" onClick={()=>handleDelete(m.id)}>
                          <Icon n="trash" s={11}/>
                        </button>
                      ) : (
                        <button className="btn btn-soft btn-sm btn-icon" title="復元" onClick={()=>handleRestore(m.id)}>
                          <Icon n="refresh" s={11}/>
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* 権限マトリクス (Phase 5新+ で実装) */}
      <div className="card mt16">
        <div className="card-head">
          <div className="card-title"><Icon n="lock" s={16}/> 権限マトリクス (Phase 5新+ 実装)</div>
        </div>
        <div className="card-body" style={{padding:0,overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr>
              <th>ロール</th>
              <th className="center">イベント作成</th>
              <th className="center">メール配信</th>
              <th className="center">決済管理</th>
              <th className="center">メンバー編集</th>
              <th className="center">設定変更</th>
            </tr></thead>
            <tbody>
              {[
                {r:"オーナー",  c:"coral",  p:[1,1,1,1,1]},
                {r:"管理者",    c:"indigo", p:[1,1,1,1,0]},
                {r:"リーダー",  c:"violet", p:[1,1,0,0,0]},
                {r:"編集者",    c:"teal",   p:[1,0,0,0,0]},
                {r:"閲覧者",    c:"ink",    p:[0,0,0,0,0]},
              ].map((r, i) => (
                <tr key={i} style={{opacity:0.6}}>
                  <td><span className={`badge badge-${r.c}`}><span className="badge-dot"></span>{r.r}</span></td>
                  {r.p.map((v, j) => (
                    <td key={j} className="center">
                      {v ? <Icon n="check" s={14}/> : <span style={{color:'var(--ink5)'}}>—</span>}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {modalMode && (
        <MemberModal
          mode={modalMode}
          initialValues={modalMode === "edit" ? editingM : null}
          onSave={handleSave}
          onCancel={()=>{setModalMode(null); setEditingM(null);}}
        />
      )}
    </div>
  );
}

<script type="text/babel" data-presets="react">

// -------------------- PageNotifications --------------------

function PageNotifications(){
  const [notifs, setNotifs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("all");

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listNotifications');
        if (!cancelled) setNotifs(Array.isArray(data) ? data : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // 既読/未読トグル (通知をクリックで既読に)
  async function toggleRead(notifId) {
    const n = notifs.find(x => x.id === notifId);
    if (!n) return;
    setNotifs(prev => prev.map(x => x.id === notifId ? {...x, unread: !x.unread} : x));
    try {
      await window.postData('toggleNotification', { notifId });
    } catch (err) {
      setNotifs(prev => prev.map(x => x.id === notifId ? {...x, unread: n.unread} : x));
    }
  }

  // すべて既読にする (1件ずつ APIコール)
  async function markAllRead() {
    const unreadOnes = notifs.filter(n => n.unread);
    if (unreadOnes.length === 0) return;
    if (!await window.confirmDialog({title:`${unreadOnes.length} 件の未読通知をすべて既読にしますか?`, body:'この操作は元に戻せません。'})) return;

    // 楽観的UI
    setNotifs(prev => prev.map(x => ({...x, unread: false})));

    try {
      // 並列で実行
      await Promise.all(unreadOnes.map(n => window.postData('toggleNotification', { notifId: n.id })));
    } catch (err) {
      window.location.reload();
    }
  }

  // 削除
  async function handleDelete(notifId) {
    setNotifs(prev => prev.filter(x => x.id !== notifId));
    try {
      await window.postData('deleteNotification', { notifId });
    } catch (err) {
      window.location.reload();
    }
  }

  const filtered = notifs.filter(n => {
    if (filter === "all") return true;
    if (filter === "unread") return n.unread;
    return n.type === filter;
  });

  const tabs = [
    ["all",     "すべて",   notifs.length],
    ["unread",  "未読",     notifs.filter(n => n.unread).length],
    ["payment", "決済",     notifs.filter(n => n.type === "payment").length],
    ["reg",     "申込",     notifs.filter(n => n.type === "reg").length],
    ["mail",    "配信",     notifs.filter(n => n.type === "mail").length],
    ["task",    "タスク",   notifs.filter(n => n.type === "task").length],
    ["warn",    "警告",     notifs.filter(n => n.type === "warn").length],
    ["system",  "システム", notifs.filter(n => n.type === "system").length],
  ];

  return (
    <div className="page" data-page="notifications">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>通知センター</span></div>
          <h1>通知 <i>センター</i></h1>
          <div className="ph-sub">申込・決済・タスク・メンション。すべての運営アクティビティを時系列で。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost" onClick={markAllRead} disabled={notifs.filter(n=>n.unread).length === 0}>
            <Icon n="check" s={14}/> すべて既読に
          </button>
          <button className="btn btn-ghost" disabled><Icon n="gear" s={14}/> 通知設定</button>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="grid-ab">
        <div className="card">
          <div className="card-head" style={{padding:"10px 14px"}}>
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {tabs.map(([k, l, c]) => (
                <button key={k} onClick={()=>setFilter(k)} className={clsx("chip", filter===k && "on")}>
                  {l}<span style={{opacity:.6,marginLeft:4}}>{c}</span>
                </button>
              ))}
            </div>
          </div>
          <div className="card-body" style={{padding:10}}>
            {filtered.length === 0 ? (
              <div className="empty">
                <Icon n="bell" s={28}/>
                <div>{notifs.length === 0 ? '通知はまだありません' : '該当する通知がありません'}</div>
                <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>運営アクティビティが発生するとここに表示されます (Phase 5新+ で自動生成予定)</div>
              </div>
            ) : (
              <div className="notif-list">
                {filtered.map(n => (
                  <div key={n.id} className={clsx("notif", n.unread && "unread")}
                    style={{cursor:'pointer'}}
                    onClick={()=>toggleRead(n.id)}>
                    <div className="notif-icon" style={{background:`var(--${n.color}-50)`,color:`var(--${n.color})`}}>
                      <Icon n={n.icon} s={16}/>
                    </div>
                    <div>
                      <div className="notif-title">{n.title}</div>
                      <div className="notif-body">{n.body}</div>
                    </div>
                    <div style={{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                      <div className="notif-time">{n.time}</div>
                      {n.unread && <div className="notif-unread-dot"></div>}
                      <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={(ev)=>{ev.stopPropagation(); handleDelete(n.id);}}>
                        <Icon n="trash" s={11}/>
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="info" s={16}/> 通知について</div></div>
            <div className="card-body" style={{fontSize:12,color:'var(--ink3)',lineHeight:1.6}}>
              通知は今のところ手動でしか追加されません。Phase 5新+ で以下を自動化予定:
              <ul style={{marginTop:8,paddingLeft:18,fontSize:11,lineHeight:1.7}}>
                <li>申込が入ったら自動通知</li>
                <li>決済成功/失敗の自動通知</li>
                <li>イベント満員時の自動通知</li>
                <li>開催48h前の自動リマインド</li>
              </ul>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="gear" s={16}/> 通知チャネル (Phase 5新+)</div></div>
            <div className="card-body" style={{padding:0}}>
              {[
                {n:"メール",   d:"connecta.official@gmail.com"},
                {n:"Slack",    d:"#ops-connecta"},
                {n:"LINE通知", d:"運営本部 LINE グループ"},
                {n:"Webhook",  d:"未設定"},
              ].map(c => (
                <div key={c.n} style={{padding:"12px 16px",borderTop:"1px solid var(--line)",display:'flex',alignItems:'center',gap:10,opacity:0.5}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:12.5}}>{c.n}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>{c.d}</div>
                  </div>
                  <span className="badge badge-ink" style={{fontSize:9}}>準備中</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// -------------------- PageEventCreate --------------------

/**
 * イベント作成 5ステップフォーム。
 * 各ステップの内容: 1)基本情報, 2)日程・会場, 3)申込設定, 4)決済, 5)公開
 * Step 1 のみ詳細実装、他は EmptyState で「準備中」。
 */
function PageEventCreate(){
  // URL hash から編集対象 ID を取得 (例: #event-create?id=E-2601)
  const editId = (() => {
    const hash = window.location.hash || '';
    const m = hash.match(/[?&]id=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  })();
  const isEditMode = !!editId;

  // フォーム state
  const [step, setStep] = useState(1);
  const [title, setTitle] = useState("");
  const [category, setCategory] = useState("IFT");
  const [summary, setSummary] = useState("");
  const [date, setDate] = useState("");
  const [time, setTime] = useState("");
  const [venue, setVenue] = useState("");
  const [capacity, setCapacity] = useState("");
  const [fee, setFee] = useState("");
  const [status, setStatus] = useState("下書き");

  // 通信state
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  // カテゴリ別アクセント色
  const accentMap = {"IFT":"indigo","community":"teal","hub":"violet","order made":"amber"};
  const accent = accentMap[category] || "indigo";

  // 編集モードの場合、既存データを取得して入力欄を埋める
  useEffect(() => {
    if (!isEditMode) return;
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const ev = await window.fetchData('getEvent', { eventId: editId });
        if (cancelled) return;
        if (!ev) {
          setError(`イベント ${editId} が見つかりません`);
          return;
        }
        setTitle(ev.title || "");
        setCategory(ev.category || "IFT");
        setDate(ev.date || "");
        setTime(ev.time || "");
        setVenue(ev.venue || "");
        setCapacity(ev.capacity ? String(ev.capacity) : "");
        setFee(ev.fee ? String(ev.fee) : "");
        setStatus(ev.status || "下書き");
      } catch (err) {
        if (!cancelled) setError('読み込みエラー: ' + err.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, [editId]);

  // 保存ハンドラ
  async function handleSave(publishStatus) {
    if (!title.trim()) {
      window.toast.error('イベント名は必須です');
      return;
    }
    setSaving(true);
    setError(null);

    const fields = {
      title: title.trim(),
      category: category,
      accent: accent,
      date: date || '',
      time: time || '',
      venue: venue || '',
      capacity: Number(capacity) || 0,
      fee: Number(fee) || 0,
      status: publishStatus || status || '下書き',
    };

    try {
      let result;
      if (isEditMode) {
        result = await window.postData('updateEvent', { eventId: editId, fields });
      } else {
        result = await window.postData('createEvent', fields);
      }
      // 成功 → 一覧へ強制遷移 + リロード (React の state を確実にリセット、最新データを再取得)
      window.location.href = window.location.pathname + '#events';
      window.location.reload();

      setError('保存に失敗しました: ' + err.message);
      setSaving(false);
    }

<script type="text/babel" data-presets="react">
// ==================== App Root ====================
// 全21画面実装完了 (Phase 1新 + Phase 2新-A/B/C/D-1/D-2)
// PageStub は使われない (全画面が実コンポーネント)。STUB_META はコード参照用に残置。
// このブロック専用に Fragment / useState / useEffect を再 destructure (Babel ブロック境界対策)
const {Fragment: AppFragment, useState: useStateApp, useEffect: useEffectApp} = React;
const PAGES = {
  // ----- 概要 -----
  dashboard:      () => <PageDashboard/>,
  analytics:      () => <PageAnalytics/>,
  notifications:  () => <PageNotifications/>,

  // ----- イベント (Phase 2新-A + D-1) -----
  events:         () => <PageEvents/>,
  "event-create": () => <PageEventCreate/>,
  registrations:  () => <PageRegistrations/>,
  qr:             () => <PageQR/>,
  schedule:       () => <PageSchedule/>,
  satisfaction:   () => <PageSatisfaction/>,

  // ----- コミュニケーション (Phase 2新-B) -----
  mail:           () => <PageMail/>,
  news:           () => <PageNews/>,
  chat:           () => <PageChat/>,
  templates:      () => <PageTemplates/>,

  // ----- 運営 (Phase 2新-C + D-2) -----
  participants:   () => <PageParticipants/>,
  todo:           () => <PageTodo/>,
  photos:         () => <PagePhotos/>,
  payments:       () => <PagePayments/>,
  departments:    () => <PageDepartments/>,
  org:            () => <PageOrg/>,
  ads:            () => <PageAds/>,

  // ----- モバイル (Phase 2新-C) -----
  mobile:         () => <PageMobile/>,
};

function App(){
  // 初期ナビゲーションは URL hash から取得 (例: #events で events 画面)
  // 戻るボタン・ブックマーク・URL共有対応のため hash 方式を採用。
  const getInitial = () => {
    const k = window.__getInitialNav__();
    return PAGES[k] ? k : "dashboard";
  };
  const [nav, setNav] = useStateApp(getInitial);

  // hash 変更を監視 (戻るボタン・タブ間同期 + サイドバーリンクのクリック)
  // サイドバーは <a href="#xxx"> なので、ブラウザが標準で hash を更新する。
  // それを hashchange で検知して React の state を同期する。
  useEffectApp(() => {
    const onHashChange = () => {
      const k = window.__getInitialNav__();
      if (PAGES[k]) setNav(k);
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  // nav 変更時にサイドバーの active クラスを同期。
  // nav-item は React 外の静的 HTML なので、querySelectorAll で classList を更新する。
  // (これは表示上の active 強調だけで、クリック動作は href が担うため壊れない)
  useEffectApp(() => {
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.nav === nav);
    });
    // 通知ベル等の Topbar の data-goto も hash 遷移にフォールバック
    document.querySelectorAll('[data-goto]').forEach(el => {
      if (!el.dataset.gotoBound) {
        el.dataset.gotoBound = "1";
        el.addEventListener('click', (e) => {
          e.preventDefault();
          const k = el.dataset.goto;
          if (PAGES[k]) window.__setNav__(k);
        });
      }
    });
    window.scrollTo(0, 0);
  }, [nav]);

  const Comp = PAGES[nav] || PAGES.dashboard;
  const ToastContainerComp = window.ToastContainer;
  const ConfirmDialogHostComp = window.ConfirmDialogHost;
  return (
    <AppFragment>
      <Comp/>
      <ToastContainerComp/>
      <ConfirmDialogHostComp/>
    </AppFragment>
  );
}

ReactDOM.createRoot(document.getElementById('main')).render(<App/>);
</script>
